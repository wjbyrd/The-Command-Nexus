<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
    
<!-- Title can be changed to whatever the game needs -->
<title>The Command Nexus</title>
   
<style>
/* =========================================
   1. VISUAL DESIGN — SAFE TO EDIT

You can change:
- Colors
- Background images
- Fonts
- Glow effects

Do NOT rename IDs (#gameBox, #mazeTrack, etc.)
or you will break JavaScript connections.
========================================= */
/* =========================================
   1. VISUAL DESIGN — THE COMMAND NEXUS
========================================= */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    color: #e6ecf5;
    background: url('question_background_image.png');
    background-size: cover;
    background-position: center;
}

/* Macro Review overlay — onyx, ivory, restrained gold */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center,
            rgba(245, 214, 130, 0.09),
            rgba(30, 24, 18, 0.34) 48%,
            rgba(3, 5, 12, 0.82) 100%);
    pointer-events:none;
    z-index:-1;
}

.dungeon-container {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
}

/* CENTER BLOCK */
.start-content{
    width: 100%;
    max-width: 460px;
    display:flex;
    flex-direction:column;
    align-items:center;   
    text-align:center;
    padding: 28px 30px;
    border-radius: 18px;
}

/* TITLE — sharper, colder */
.title{
  font-size:64px;
  letter-spacing:4px;
  margin-bottom:10px;
  color:#f0c86a;
  text-align:center;
  text-shadow:
    0 0 10px rgba(240,200,106,0.7),
    0 0 25px rgba(40,90,160,0.5),
    0 3px 8px rgba(0,0,0,0.9);
}

/* SUBTITLE — shift to blue tone */
.subtitle{
  font-size:34px;
  margin-bottom:35px;
  letter-spacing:2px;
  text-align:center;
  color:#7fa8d6;
  text-shadow:
    0 0 12px rgba(80,130,200,0.45),
    0 0 34px rgba(64,96,142,0.55),
    0 3px 8px rgba(0,0,0,0.9);
}

/* TAGLINE */
.tagline{
  margin-bottom:30px;
  font-style:italic;
  opacity:0.9;
  text-align:center;
  color:#c9d4e6;
  text-shadow: 
	  0 2px 6px rgba(0,0,0,0.85),
      0 2px 6px rgba(0,0,0,0.88);
}

/* INPUT — looks like a console panel now */
.name-input{
  width:100%;
  max-width:320px;
  text-align:center;
  padding:15px;
  border-radius:10px;
  border:1px solid rgba(120,170,255,0.45);   
  background: rgba(8,14,28,0.9);          
  color:#e6ecf5;

  margin-bottom:20px;
  outline:none;
  box-shadow:
    0 0 12px rgba(80,130,200,0.35),
    inset 0 0 12px rgba(0,0,0,0.7);
}

.name-input:focus{
  border-color: rgba(140,190,255,0.8);
  box-shadow:
    0 0 18px rgba(120,180,255,0.6),
    0 0 35px rgba(40,90,160,0.5),
    inset 0 0 12px rgba(0,0,0,0.8);
}

.start-btn{
  width:100%;
  max-width:320px;
}

.secondary-start-btn{
  margin-top: 10px;
  background: linear-gradient(180deg, #1b5b98, #09213d);
  border-color: rgba(240,200,106,0.56);

/* PLACEHOLDER */
#emailInput::placeholder,
#username::placeholder{
    color: rgba(180,200,230,0.55);
    font-style: italic;
    letter-spacing: 0.5px;
    text-align: center;

/* =========================================
   2. CORE GAME CONTAINER (#gameBox) — SAFE TO STYLE
========================================= */

#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    margin: 0;
    padding: 18px 20px;
    text-align: center;

    background:
        radial-gradient(circle at center,
            rgba(80,140,220,0.18) 0%,
            rgba(25,70,120,0.42) 46%,
            rgba(8,16,32,0.94) 74%,
            rgba(2,4,10,0.99) 100%);

    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-sizing: border-box;

    box-shadow:
        0 0 22px rgba(80,140,220,0.22),
        0 0 58px rgba(240,200,106,0.10),
        0 0 72px rgba(10,45,95,0.46),
        inset 0 0 42px rgba(0,0,0,0.78);

    border: 1px solid rgba(240,200,106,0.34);
    animation: torchFlicker 6s infinite;
    transition: box-shadow .3s ease, border-color .3s ease;
    position: relative;
}

/* Boss state styling — triggered during boss fights (DO NOT REMOVE) */	
#gameBox.boss-mode {
    border: 2px solid #f0c86a;
    box-shadow:
        0 0 32px rgba(240,200,106,0.52),
        0 0 64px rgba(60,130,220,0.45),
        inset 0 0 42px rgba(0,0,0,0.82);
}

.boss-icon{
    width: 28px;
    height: 28px;
    object-fit: contain;
    pointer-events: none;
}

/* Tier 1 — Demand Cartographer */
.boss10 .boss-icon{
    filter:
        drop-shadow(0 0 6px rgba(240,200,106,0.85))
        drop-shadow(0 0 12px rgba(70,140,220,0.55));
}

/* Tier 2 — Rate Engineer */
.boss20 .boss-icon{
    filter:
        drop-shadow(0 0 8px rgba(110,180,255,0.9))
        drop-shadow(0 0 18px rgba(240,200,106,0.55));
}

/* Tier 3 — Shock Forecaster */
.boss30 .boss-icon{
    filter:
        drop-shadow(0 0 10px rgba(240,200,106,1))
        drop-shadow(0 0 24px rgba(127,29,29,0.85));
}

/* Damage effect when boss/player is hit (visual feedback) */	
.hit {
    box-shadow:
        0 0 60px rgba(127,29,29,0.95),
        0 0 28px rgba(240,200,106,0.35),
        inset 0 0 42px rgba(80,10,18,0.85) !important;
    animation: hitshake 0.4s ease;
}

/* Autosave indicator — positioned relative to gameBox */	
#autosave {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 11px;
    opacity: 0.5;
    font-style: italic;
    color: #c9d4e6;
    text-shadow: 0 0 6px rgba(100,170,255,0.38);
}

/* Adds a graph box for questions with graphs */	
#questionImageBox{
  margin: 0 auto 12px auto;
  text-align: center;
  display: none;
}

#questionImageBox img{
  max-width: 100%;
  width: min(100%, 640px);
  max-height: 42vh;
  height: auto;
  object-fit: contain;
  border-radius: 10px;
  border: 1px solid rgba(240,200,106,0.24);
  box-shadow:
    0 0 14px rgba(80,140,220,0.22),
    0 0 28px rgba(0,0,0,0.68);
  cursor: zoom-in;
}

#questionImageBox.zoomed{
  position: fixed;
  inset: 0;
  z-index: 4000;
  display: flex !important;
  align-items: center;
  justify-content: center;
  padding: 22px;
  box-sizing: border-box;
  background: rgba(2,5,12,0.88);
  backdrop-filter: blur(4px);
}

#questionImageBox.zoomed img{
  width: min(96vw, 1120px);
  max-height: 88vh;
  cursor: zoom-out;
}

	
/* =========================================
   3. TEXT & TYPOGRAPHY SYSTEM — SAFE TO CUSTOMIZE
========================================= */

h2 {
    text-shadow:
        0 0 10px rgba(180,210,255,0.24),

    color: #e6ecf5;

/* Boss/summary title — high emphasis text */	
.boss-title {
    font-size: 28px;

    margin-bottom: 15px;

    color: #f0c86a;
    text-shadow:

}

/* Area/zone label — subtle contextual info */

}

/* Boss summary text — left-aligned for readability */	
.boss-q {

    padding-left: 15px;

/* Temporary feedback text (auto fades out) */	
.fade-out-text {
    animation: fadeOut 5s forwards;

/* Add styling to Custodian text */	
#message {
    margin-top: 10px;
    font-style: italic;

    color: #c9d4e6;

    text-shadow:

    margin-top: 12px;

    text-shadow:

/* =========================================
   4. BUTTONS & INTERACTION — SAFE TO CUSTOMIZE
========================================= */

/* Base button styling — applies to all buttons */
button {
    padding: 12px 22px;
    margin: 6px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(180deg, #12345a, #07111f);
    color: #e6ecf5;
    border: 1px solid rgba(240,200,106,0.38);
    border-radius: 8px;
    box-shadow:
       0 0 12px rgba(80,140,220,0.28),
       0 0 24px rgba(10,45,95,0.22),
       inset 0 0 10px rgba(0,0,0,0.68);
    transition: all 0.15s ease;
}

/* Hover feedback — improves interactivity */
button:hover {
    background: linear-gradient(180deg, #1b4f86, #0b1f38);
    border-color: rgba(240,200,106,0.72);
    box-shadow:
        0 0 18px rgba(100,170,255,0.5),
        0 0 34px rgba(240,200,106,0.22),
        inset 0 0 12px rgba(0,0,0,0.7);
    transform: translateY(-2px) scale(1.02);
}

/* Click feedback — simulates button press */	
button:active {
    transform: scale(0.96);
}

/* Answer container — controls layout of choices */	
.answers {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
    width: 100%;
}

/* Individual answer buttons — flexible sizing */		
.answers button {
    flex: 1 1 100%;
    min-height: 60px;
    max-width: 100%;
    padding: 15px;
    font-size: 18px;
    margin: 0;
    background: linear-gradient(180deg,
        rgba(18,54,92,0.98),
        rgba(7,18,34,0.98));
    color: #e6ecf5;
    border: 1px solid rgba(120,180,255,0.34);
    box-shadow:
        0 0 10px rgba(80,140,220,0.18),
        0 0 18px rgba(240,200,106,0.12),
        inset 0 0 14px rgba(0,0,0,0.74);
}

/* Answer hover — a little brighter than base */	
.answers button:hover {
    background: linear-gradient(180deg,
        rgba(28,82,135,0.98),
        rgba(10,34,62,0.98));
    border-color: rgba(240,200,106,0.68);
    box-shadow:
        0 0 18px rgba(100,170,255,0.42),
        0 0 34px rgba(240,200,106,0.22),
        inset 0 0 14px rgba(0,0,0,0.7);
}
	
/* Utility button (fullscreen toggle) — safe to restyle or move */
.fullscreenBtn {

}

.fullscreenBtn:hover {
    background: linear-gradient(180deg, #1a4d82, #0b1d34);
    border-color: rgba(240,200,106,0.62);
    box-shadow:
        0 0 16px rgba(100,170,255,0.44),
        inset 0 0 8px rgba(0,0,0,0.74);

.fullscreenBtn:active {
    transform: scale(0.95);
    box-shadow:
        0 0 8px rgba(80,140,220,0.3),
        inset 0 0 10px rgba(0,0,0,0.86);
}

.return-menu-btn{

.continue-btn {

/* =========================================
   5. PROGRESS & MAZE TRACK — SAFE TO CUSTOMIZE (WITH RULES)
========================================= */

/* Progress bar container — background track */	
#progressBar {
    width: 100%;
    height: 22px;
    background: linear-gradient(180deg,
        rgba(6,14,28,0.96),
        rgba(2,5,12,0.98));
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    border: 1px solid rgba(120,180,255,0.24);
    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.84),
        0 0 10px rgba(80,140,220,0.18);
}

/* Progress fill — width controlled by JS */		
#progressFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,
        #123a66,
        #4f9fe8,
        #f0c86a);
    box-shadow:
        0 0 12px rgba(100,170,255,0.46),
        0 0 22px rgba(240,200,106,0.26);
    transition: width 0.4s ease;
}

/* Maze grid layout — 10 columns = 30 total rooms */		
#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 36px);
    justify-content: center;
    gap: 10px;
    margin: 25px auto;
}

/* Individual room cell — default state */		
.maze-box {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 6px;
    background: linear-gradient(180deg,
        rgba(10,24,46,0.76),
        rgba(3,8,18,0.9));
    border: 1px solid rgba(120,180,255,0.18);
    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.76),
        0 0 5px rgba(80,140,220,0.1);
    transition: all 0.3s ease;
}

/* Current room highlight — animated pulse */		
.maze-box.active {
    background: radial-gradient(circle,
        rgba(100,170,255,0.48),
        rgba(18,58,102,0.42),
        rgba(3,8,18,0.94));
    border: 2px solid #f0c86a;
    box-shadow:
        0 0 12px rgba(100,170,255,0.78),
        0 0 24px rgba(240,200,106,0.36),
        inset 0 0 12px rgba(0,0,0,0.66);
    z-index: 10;
    animation: activePulse 1s infinite alternate;
}

/* Completed tile */		
.maze-box.completed {
    background: linear-gradient(180deg,
        rgba(24,82,135,0.62),
        rgba(8,24,44,0.9));
    border-color: rgba(240,200,106,0.36);
    box-shadow:
        0 0 8px rgba(80,140,220,0.32),
        inset 0 0 10px rgba(0,0,0,0.72);
}

/* Boss room highlights: 10 Demand, 20 Rate, 30 Shock */
.maze-box:nth-child(10) {
    text-shadow:
        0 0 8px #f0c86a,
        0 0 18px rgba(80,140,220,0.78);
}

.maze-box:nth-child(20) {
    text-shadow:
        0 0 8px #6eb4ff,
        0 0 18px rgba(240,200,106,0.58);
}

.maze-box:nth-child(30) {
    text-shadow:
        0 0 10px #f0c86a,
        0 0 24px rgba(127,29,29,0.9),
        0 0 34px rgba(80,140,220,0.35);
}

/* Streak styling — Command Nexus */
.streak {
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    letter-spacing:0.5px;
    color: rgba(230,236,245,0.95);
    text-shadow:
        0 0 7px rgba(100,170,255,0.34),
        0 2px 5px rgba(0,0,0,0.85);
}

.streak-icon {
    width:22px;
    height:22px;
    object-fit:contain;
    border-radius:50%;
    filter:
        drop-shadow(0 0 8px rgba(100,170,255,0.76))
        drop-shadow(0 0 15px rgba(240,200,106,0.42));
    background: radial-gradient(circle,
        rgba(100,170,255,0.48) 0%,
        rgba(240,200,106,0.28) 42%,
        transparent 72%);
    animation: pulseControl 2.2s ease-in-out infinite;
}

   6. ARTIFACT SYSTEM (REWARDS) — SAFE TO CUSTOMIZE

        rgba(6,14,28,0.96) 58%,

    border: 1px solid rgba(120,180,255,0.28);

/* Layout container for artifact slots */

    justify-content: center;

}

/* =========================================
   9. ANIMATION SYSTEM — SAFE TO CUSTOMIZE (WITH CARE)
========================================= */

/* Ambient civic-light flicker */	
@keyframes torchFlicker {
  0%, 100% {
    filter: brightness(1);
  }
  25% {
    filter: brightness(1.05) saturate(1.05);
  }
  50% {
    filter: brightness(0.96) saturate(0.98);
  }
  75% {
    filter: brightness(1.04) saturate(1.04);
  }
}

/* Damage feedback */	
@keyframes hitshake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* Boss-specific hit feedback (stronger shake) */    	
@keyframes bossShake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}

/* Current room highlight animation (maze tracker) */   	
@keyframes activePulse {
  0% {
    transform: scale(1.06);
    box-shadow:
      0 0 8px rgba(100,170,255,0.68),
      inset 0 0 10px rgba(0,0,0,0.62);
  }
  45% {
    transform: scale(1.13);
    box-shadow:
      0 0 18px rgba(100,170,255,0.92),
      0 0 32px rgba(240,200,106,0.42),
      0 0 42px rgba(24,82,135,0.3),
      inset 0 0 12px rgba(0,0,0,0.66);
  }
  70% {
    transform: scale(1.09);
    box-shadow:
      0 0 12px rgba(100,170,255,0.78),
      0 0 24px rgba(240,200,106,0.22),
      inset 0 0 11px rgba(0,0,0,0.66);
  }
  100% {
    transform: scale(1.11);
    box-shadow:
      0 0 15px rgba(100,170,255,0.72),
      0 0 30px rgba(240,200,106,0.32),
      inset 0 0 12px rgba(0,0,0,0.68);
  }
}



	
/* Victory text animation (end screen emphasis) */   
@keyframes victoryGlow {
  0%, 100% {
    transform: scale(1);
    text-shadow:
      0 0 10px rgba(240,200,106,0.72),
      0 0 18px rgba(100,170,255,0.24),
      0 2px 6px rgba(0,0,0,0.9);
  }
  50% {
    transform: scale(1.08);
    text-shadow:
      0 0 24px rgba(240,200,106,0.95),
      0 0 42px rgba(100,170,255,0.58),
      0 0 52px rgba(24,82,135,0.38),
      0 3px 8px rgba(0,0,0,0.9);
  }
}

/* Idle boss movement */	
@keyframes bossFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* Temporary feedback text fade-out */   
@keyframes fadeOut {
  0%, 70% { opacity: 1; }
  100% { opacity: 0; }
}

/* Wizard idle animation (subtle movement) */  
@keyframes wizardFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}


@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* General pulse animation for relics */   	
@keyframes relicPulse {
  0%,100% {
    transform: scale(1.05);
    filter:
      drop-shadow(0 0 8px rgba(100,170,255,0.68))
      drop-shadow(0 0 18px rgba(240,200,106,0.32))
      drop-shadow(0 0 24px rgba(0,0,0,0.58));
  }
  50% {
    transform: scale(1.1);
    filter:
      drop-shadow(0 0 16px rgba(100,170,255,0.94))
      drop-shadow(0 0 30px rgba(240,200,106,0.48))
      drop-shadow(0 0 38px rgba(24,82,135,0.26));
  }
}

/* Streak icon pulse */
@keyframes pulseControl {
  0%,100% {
    transform: scale(1);
    opacity: 0.9;
  }
  50% {
    transform: scale(1.08);
    opacity: 1;
  }
}

/* =========================================
   12. MOBILE RESPONSIVE SYSTEM — SAFE TO EDIT (WITH LIMITS)
=========================================

This section controls how the game behaves on phones.

GOAL:
- Fit gameplay into a single screen as much as possible
- Reduce vertical scrolling
- Keep buttons thumb-friendly

-----------------------------------------
SAFE TO EDIT:
- font sizes (clamp values)
- spacing (gap, padding, margin)
- grid layout (answers: 1fr 1fr vs 1fr)
- wizard size (make smaller/larger)

-----------------------------------------
USE CAUTION:
- removing elements entirely (may break flow)
- changing flex direction randomly
- making buttons too small (hurts usability)

-----------------------------------------
DO NOT MODIFY:
- IDs (#gameShell, #gameBox, #wizardBox)
- core layout structure

-----------------------------------------
COMMON CUSTOM CHANGES:
- Want bigger buttons? Increase min-height
- Want less scrolling? Reduce padding/gaps
- Want simpler UI? Hide artifact labels

-----------------------------------------
TIP:
Mobile design is about SPACE, not style.
Every pixel matters.

========================================= */

function getScoreAttackSpeedBonus(responseTime){
    const bonus = SCORE_ATTACK_CONFIG.speedBonuses.find(item => responseTime <= item.maxMs);
    return bonus ? bonus.points : 0;
}

function getScoreAttackStreakBonus(currentStreak){
    const bonus = SCORE_ATTACK_CONFIG.streakBonuses.find(item => currentStreak >= item.minStreak);
    return bonus ? bonus.points : 0;
}

function applyScoreAttackEvent(label, amount){
    if(!modeUsesScoreAttack()) return;

    const numericAmount = Number(amount || 0);
    if(!Number.isFinite(numericAmount) || numericAmount === 0) return;

    scoreAttackScore += numericAmount;

    // No negative scoreboard. Punishment hurts, but it does not turn into comedy.
    if(scoreAttackScore < 0){
        scoreAttackScore = 0;
    }

    scoreAttackEvents.push({
        label,
        amount: numericAmount,
        scoreAfter: scoreAttackScore,
        room,
        questionId: currentQuestion?.id || 0,
        time: Date.now()
    });

    if(scoreAttackEvents.length > 120){
        scoreAttackEvents.shift();
    }

    if(scoreAttackScore > scoreAttackBestScore){
        scoreAttackBestScore = scoreAttackScore;
        localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`, String(scoreAttackBestScore));
    }

    updateScoreAttackHud();
    showScoreAttackFloat(label, numericAmount);
}

function applyScoreAttackForAnswer(isCorrect, responseTime){
    if(!modeUsesScoreAttack()) return;

    if(isCorrect){
        applyScoreAttackEvent("Correct", SCORE_ATTACK_CONFIG.correct);

        const speedBonus = getScoreAttackSpeedBonus(responseTime);
        if(speedBonus > 0){
            applyScoreAttackEvent("Speed", speedBonus);
        }

        const streakBonus = getScoreAttackStreakBonus(streak);
        if(streakBonus > 0){
            applyScoreAttackEvent("Streak", streakBonus);
        }

        return;
    }

    const penalty = responseTime < 4000
        ? SCORE_ATTACK_CONFIG.rapidMissPenalty
        : SCORE_ATTACK_CONFIG.wrongPenalty;

    applyScoreAttackEvent(responseTime < 4000 ? "Rapid Miss" : "Wrong", penalty);
}

function applyScoreAttackRapidGuessPenalty(){
    if(!modeUsesScoreAttack()) return;

    applyScoreAttackEvent("Rapid Guess", SCORE_ATTACK_CONFIG.rapidMissPenalty);
}

// SCORE ATTACK MODE ADDITION:
// This creates the tiny arcade-style "score resolve" beat.
// It lets +100 / Speed / Streak / Wrong penalties breathe before feedback appears.
function getScoreAttackResolveDelay(isCorrect){
    if(!modeUsesScoreAttack()) return 0;

    return isCorrect
        ? SCORE_ATTACK_CONFIG.resolveDelayCorrectMs
        : SCORE_ATTACK_CONFIG.resolveDelayWrongMs;
}

function waitForScoreAttackResolve(isCorrect){
    const delay = getScoreAttackResolveDelay(isCorrect);

    if(!delay || delay <= 0){
        return Promise.resolve();
    }

    return new Promise(resolve => setTimeout(resolve, delay));
}

    const typeClass = amount > 0 ? "positive" : amount < 0 ? "negative" : "neutral";

    activeScoreFloatCount++;
    const stackOffset = Math.min(activeScoreFloatCount - 1, 4) * 30;

    item.className = `score-float ${typeClass}`;
    item.style.setProperty("--score-float-top", `calc(38% + ${stackOffset}px)`);

function generatePseudonymFromEmail(email) {
    const prefixes = [
        "Nominal", "Real", "Indexed", "Fiscal", "Monetary", "Aggregate",
        "Capital", "Labor", "Inflation", "Output", "Reserve", "Cyclical",
        "Structural", "Productive", "National", "Treasury", "Deflator", "Ledger"
    ];

    const roles = [
        "Registrar", "Comptroller", "Forecaster", "Auditor", "Indexer", "Calibrator",
        "Engineer", "Archivist", "Surveyor", "Inspector", "Operator", "Analyst",
        "Custodian", "Mechanist", "Steward", "Technician", "Keeper", "Marshal"
    ];

    let hash = 0;
    const cleanEmail = email.trim().toLowerCase();

    for (let i = 0; i < cleanEmail.length; i++) {
        hash = ((hash << 5) - hash) + cleanEmail.charCodeAt(i);
        hash |= 0;
    }

    const positiveHash = Math.abs(hash);

    const prefix = prefixes[positiveHash % prefixes.length];
    const role = roles[Math.floor(positiveHash / prefixes.length) % roles.length];
    const number = 1000 + (positiveHash % 9000);

    return `${prefix}${role}${number}`;
}

function getObjectiveBucket(question){
    const objectiveKey = inferObjective(question);
    if(!masteryState.byObjective[objectiveKey]){
        masteryState.byObjective[objectiveKey] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };
    }
    return masteryState.byObjective[objectiveKey];
}

function getObjectiveAccuracy(question){
    return getAccuracy(getObjectiveBucket(question));
}

function getObjectiveFluency(question){
    return getFluency(getObjectiveBucket(question), question?.type || "default");
}

function updateBucket(bucket, isCorrect, responseTime){
    if(!bucket) return;
    bucket.attempts++;
    if(isCorrect) bucket.correct++;
    bucket.avgTime = bucket.avgTime === 0
        ? responseTime
        : Math.round((bucket.avgTime * 0.7) + (responseTime * 0.3));
}

function getAccuracy(bucket){
    if(!bucket || !bucket.attempts) return null;
    return bucket.correct / bucket.attempts;
}

function getTimeRatio(bucket, type){
    if(!bucket || !bucket.attempts || !bucket.avgTime) return 1;
    return bucket.avgTime / getTypeTargetMs(type);
}

function getFluency(bucket, type){
    const acc = getAccuracy(bucket);
    if(acc === null) return 0;
    const timeRatio = getTimeRatio(bucket, type);
    return acc - clamp((timeRatio - 1) * 0.25, 0, 0.35);
}

function getTagAccuracy(tag){
    return getAccuracy(getTagBucket(tag));
}

function getTagTypeAccuracy(tag, type){
    return getAccuracy(getTypeBucket(tag, type));
}

function getTagFluency(tag){
    return getFluency(getTagBucket(tag), "default");
}

function getTagTypeFluency(tag, type){
    return getFluency(getTypeBucket(tag, type), type || "default");
}

function recordAdaptiveAttempt(question, isCorrect, responseTime){
    if(!question || !question.tag) return;

    const tagBucket = getTagBucket(question.tag);
    const typeBucket = getTypeBucket(question.tag, question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const skillBucket = getSkillBucket(question);

    updateBucket(tagBucket, isCorrect, responseTime);
    updateBucket(typeBucket, isCorrect, responseTime);
    updateBucket(objectiveBucket, isCorrect, responseTime);
    updateBucket(skillBucket, isCorrect, responseTime);

    masteryState.recent.push({
        correct: !!isCorrect,
        responseTime,
        tag: question.tag,
        type: question.type || "default",
        objective: currentQuestion.objective || inferObjective(currentQuestion),
        skill: getSkillKey(question)
    });

    if(masteryState.recent.length > 20){
        masteryState.recent.shift();
    }
}

function getRecentPerformance(windowSize = 8){
    const recent = masteryState.recent.slice(-windowSize);
    if(recent.length === 0){
        return { accuracy: 0, avgCorrectRatio: 1.2, count: 0 };
    }

    const correct = recent.filter(x => x.correct);
    const avgCorrectRatio = correct.length
        ? correct.reduce((sum, item) => sum + (item.responseTime / getTypeTargetMs(item.type)), 0) / correct.length
        : 2;

    return {
        accuracy: recent.filter(x => x.correct).length / recent.length,
        avgCorrectRatio,
        count: recent.length
    };
}

function getWeakestTag(){
    const entries = Object.keys(masteryState.byTag);

    if(entries.length === 0){
        const fallback = Object.entries(conceptMemory || {}).sort((a,b) => b[1]-a[1])[0];
        return fallback ? fallback[0] : null;
    }

    let weakestTag = null;
    let weakestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const weakness = (conceptMemory[tag] || 0) + (1 - (fluency ?? 0));

        if(weakness > weakestScore){
            weakestScore = weakness;
            weakestTag = tag;
        }
    });

    return weakestTag;
}

function getStrongestTag(){
    const entries = Object.keys(masteryState.byTag);
    if(entries.length === 0) return null;

    let strongestTag = null;
    let strongestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const strength = (fluency === null ? 0 : fluency) - ((conceptMemory[tag] || 0) * 0.15);
        if(strength > strongestScore){
            strongestScore = strength;
            strongestTag = tag;
        }
    });

    return strongestTag;
}

function getSelectionProfile(){
    const recent = getRecentPerformance(8);
    const strongestTag = getStrongestTag();
    const strongestFluency = strongestTag ? getTagFluency(strongestTag) : 0;

    return {
        recentAccuracy: recent.accuracy,
        avgCorrectRatio: recent.avgCorrectRatio,
        strongestTag,
        strongestFluency,
        mediumReady: streak >= 5 && recent.count >= 5 && recent.accuracy >= 0.8,
        hardReady: streak >= 8 && recent.count >= 6 && recent.accuracy >= 0.88 && recent.avgCorrectRatio <= 1.2 && strongestFluency >= 0.72,
        eliteReady: streak >= 14 && recent.count >= 8 && recent.accuracy >= 0.92 && recent.avgCorrectRatio <= 1.05 && strongestFluency >= 0.82
    };
}

function determineSelectionPurpose(profile){
    if(profile.recentAccuracy === 0 && getRecentPerformance(8).count === 0) return "support";
    if(profile.eliteReady) return "stretch";
    if(profile.recentAccuracy < 0.65) return "repair";
    if(profile.recentAccuracy < 0.8) return "confirm";
    if(profile.hardReady) return "challenge";
    return "diversify";
}

function shouldTriggerDetour(question){
    if(!question || !question.tag) return false;
    const tagWeakness = conceptMemory[question.tag] || 0;
    const typeBucket = getTypeBucket(question.tag, question.type);
    const typeAccuracy = getAccuracy(typeBucket);
    const objectiveAccuracy = getObjectiveAccuracy(question);

    return tagWeakness >= 2.2
        || (typeBucket && typeBucket.attempts >= 2 && typeAccuracy !== null && typeAccuracy < 0.6)
        || (objectiveAccuracy !== null && objectiveAccuracy < 0.5 && getObjectiveBucket(question).attempts >= 2);
}

function resetRemediationState(){
    remediationState = {
        active: false,
        stage: null,
        tag: null,
        objective: null,
        skill: null,
        commonError: null,
        sourceType: null,
        returnRoom: null,

        careless: false
    };
    detourActive = false;
    detourReturnRoom = null;
}

function planRemediation(question, responseTime){
    if(!question || !question.tag) return null;

    const expected = getTypeTargetMs(question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const objectiveAccuracy = getAccuracy(objectiveBucket);
    const objectiveAttempts = objectiveBucket?.attempts || 0;
    const carelessMiss = responseTime < expected * 0.55 && (objectiveAccuracy === null || objectiveAccuracy >= 0.45);
    const repeatedObjectiveMiss = objectiveAttempts >= 2 && objectiveAccuracy !== null && objectiveAccuracy < 0.6;
    const slowStruggle = responseTime > expected * 1.2;
    const skill = getSkillKey(question);

    return {
        active: true,
        stage: carelessMiss ? "bridge" : "repair",
        tag: question.tag,
        objective: currentQuestion.objective || inferObjective(currentQuestion),
        skill: skill,
        commonError: question.commonError || null,
        sourceType: question.type || "default",
        returnRoom: room,
        originQuestionId: question.id || null,
        careless: carelessMiss,
        repeatedObjectiveMiss,
        slowStruggle
    };
}

function getRemediationStageLabel(stage){
    if(stage === "repair") return "Concept Repair";
    if(stage === "bridge") return "Bridge Repair";
    return "Recovery Retest";
}

function getQuestionsMatchingNeed(pool, objectiveKey, tag, excludeIds = [], skillKey = null){
    if(!Array.isArray(pool) || pool.length === 0) return [];

    let candidates = pool.filter(q => !excludeIds.includes(q.id));

    if(skillKey){
        let skillMatches = candidates.filter(q =>
            q.primarySkill === skillKey || q.repairSkill === skillKey || inferSkill(q) === skillKey
        );
        if(skillMatches.length > 0) return skillMatches;
    }

    let objectiveMatches = candidates.filter(q => inferObjective(q) === objectiveKey);
    if(objectiveMatches.length > 0) return objectiveMatches;

    let tagMatches = candidates.filter(q => q.tag === tag);
    if(tagMatches.length > 0) return tagMatches;

    return candidates;
}

function getRetestPoolName(){
    if(room <= 9) return "easy";
    if(room <= 19) return "medium";
    if(room <= 25) return "hard";
    if(room <= 29) return "hard";
    return "elite";
}

function pickRemediationFromBank(poolName, objectiveKey, tag, purpose = "confirm", skillKey = null){
    const pool = questionBanks[poolName] || [];
    const recentIds = (questionHistory[poolName] || []).slice(-10);
    let candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, recentIds, skillKey);

    if(candidates.length === 0){
        candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, [], skillKey);
    }

    if(candidates.length === 0) return null;

    const picked = weightedPick(candidates, {
        mode: purpose === "challenge" ? "challenge" : "support",
        preferredTypes: purpose === "challenge" ? ELITE_PREFERRED_TYPES : [],
        purpose
    });

    if(!questionHistory[poolName]) questionHistory[poolName] = [];
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15) questionHistory[poolName].shift();

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10) tagHistory.shift();
    }

    return picked;
}

function getRemediationQuestion(state){
    if(!state || !state.active) return null;

    const excludeIds = [state.originQuestionId].filter(Boolean);

    if(state.stage === "repair"){
        if(state.skill && microSkillRepairPools[state.skill]){
            const skillRepairPool = microSkillRepairPools[state.skill] || [];
            const skillRepairCandidates = getQuestionsMatchingNeed(
                skillRepairPool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillRepairCandidates.length > 0){
                return weightedPick(skillRepairCandidates, {
                    mode: "support",
                    purpose: "repair"
                });
            }
        }

        const repairPool = microSkillRepairPools[state.skill] || [];
        const repairCandidates = getQuestionsMatchingNeed(
            repairPool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(repairCandidates.length > 0){
            return weightedPick(repairCandidates, {
                mode: "support",
                purpose: "repair"
            });
        }
    }

    if(state.stage === "bridge"){
        if(state.skill && microSkillBridgePools[state.skill]){
            const skillBridgePool = microSkillBridgePools[state.skill] || [];
            const skillBridgeCandidates = getQuestionsMatchingNeed(
                skillBridgePool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillBridgeCandidates.length > 0){
                return weightedPick(skillBridgeCandidates, {
                    mode: "support",
                    purpose: "confirm"
                });
            }
        }

        const bridgePool = microSkillBridgePools[state.skill] || [];
        const allBridgePool = Object.values(microSkillBridgePools || {})
            .reduce((all, pool) => all.concat(pool), []);

        const bridgeCandidates = getQuestionsMatchingNeed(
            allBridgePool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(bridgeCandidates.length > 0){
            return weightedPick(bridgeCandidates, {
                mode: "support",
                purpose: "confirm"
            });
        }
    }

    const retestPoolName = getRetestPoolName();

    return pickRemediationFromBank(
        retestPoolName,
        state.objective,
        state.tag,
        state.stage === "retest" ? "challenge" : "confirm",
        state.skill
    );
}
function weightedPick(pool, options = {}){
    const {
        mode = "support",
        preferredTypes = [],
        purpose = "diversify"
    } = options;

    let totalWeight = 0;

    let weights = pool.map(q => {
        let w = 1;
        const tagAccuracy = q.tag ? getTagAccuracy(q.tag) : null;
        const typeAccuracy = (q.tag && q.type) ? getTagTypeAccuracy(q.tag, q.type) : null;
        const objectiveAccuracy = getObjectiveAccuracy(q);
        const tagFluency = q.tag ? getTagFluency(q.tag) : 0;
        const typeFluency = (q.tag && q.type) ? getTagTypeFluency(q.tag, q.type) : 0;
        const objectiveFluency = getObjectiveFluency(q);
        const conceptWeakness = q.tag ? (conceptMemory[q.tag] || 0) : 0;

        let recentCount = tagHistory.filter(t => t === q.tag).length;

        if(mode === "challenge"){
            w += clamp(tagFluency || 0, 0, 1.2) * 0.9;
            w += clamp(typeFluency || 0, 0, 1.0) * 0.6;
            w += clamp(objectiveFluency || 0, 0, 1.0) * 0.5;
            w += getTypePressure(q.type || "default");
            if(preferredTypes.includes(q.type)) w += 1.1;
            if(purpose === "stretch") w += 0.8;
        } else {
            const tagNeed = tagAccuracy === null ? 0.45 : (1 - tagAccuracy);
            const typeNeed = typeAccuracy === null ? 0.35 : (1 - typeAccuracy);
            const objectiveNeed = objectiveAccuracy === null ? 0.35 : (1 - objectiveAccuracy);
            const slowPenalty = clamp((getTimeRatio(getTypeBucket(q.tag, q.type), q.type) - 1), 0, 1.2);

            w += Math.min(conceptWeakness, 2.2);
            w += tagNeed * 0.7;
            w += typeNeed * 0.55;
            w += objectiveNeed * 0.85;
            w += slowPenalty * 0.35;

            if(purpose === "repair" && objectiveNeed > 0.35) w += 0.9;
            if(purpose === "confirm" && typeNeed > 0.25) w += 0.5;
        }

        // Coverage boost
        if(recentCount === 0){
            w += purpose === "diversify" ? 0.7 : 0.4;
        }

        w = Math.min(w, mode === "challenge" ? 5.5 : 4.5);
        totalWeight += w;
        return { q, w };
    });

    let r = Math.random() * totalWeight;

    for(let item of weights){
        r -= item.w;
        if(r <= 0){
            return item.q;
        }
    }

    return weights[weights.length - 1].q;
}

function getAdaptiveQuestion(poolName, targetTag = null, options = {}){
    let pool = questionBanks[poolName] || questionBanks.hard || questionBanks.medium || questionBanks.easy || [];
    const { mode = "support", preferredTypes = [], purpose = "diversify" } = options;

    if(!pool || pool.length === 0){
        return {
            id: 999999,
            q: "No question pool is available for this room. Check the questionBanks configuration.",
            options: ["Continue", "Continue", "Continue", "Continue"],
            a: 0,
            tag: "system",
            type: "default",
            objective: "system_check",
            feedback: "A question pool is missing."
        };
    }

    // --- 🎯 TARGET SPECIFIC TAG IF PROVIDED ---
    if(targetTag){
        let filtered = pool.filter(q => q.tag === targetTag);

        if(filtered.length >= Math.max(4, pool.length * 0.2)){
            pool = filtered;
        }
    }

    let recent = questionHistory[poolName].slice(-10);

    let available = pool.filter(q => !recent.includes(q.id));

    if(available.length < 3){
        available = pool.filter(q => !questionHistory[poolName].slice(-5).includes(q.id));
    }

    if(available.length === 0){
        available = pool.filter(q => !questionHistory[poolName].slice(-3).includes(q.id));
    }

    if(available.length === 0){
        available = pool;
    }

    let lastTags = tagHistory.slice(-2);

    let tagFiltered = available.filter(q => {
        return !(lastTags.length === 2 && lastTags.every(t => t === q.tag));
    });

    if(tagFiltered.length >= 3){
        available = tagFiltered;
    }

    console.log("AVAILABLE:", available.map(q => q.id));

    let picked = weightedPick(available, { mode, preferredTypes, purpose });

    console.log("PICKED:", picked.id);
    console.log("RECENT:", questionHistory[poolName]);

    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15){
        questionHistory[poolName].shift();
    }

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }

    return picked;
}

function getCommandNexusBossLine({ isCorrect, tag, type, objective, streak, bossHealth, responseTime }){
  const bossName = getCommandNexusBossName();

  if(isCorrect && streak >= 5){
    return `${bossName}: The model holds. Now prove the command was not luck.`;
  }

  if(isCorrect && bossHealth <= 2){
    return `${bossName}: Clean signal. The command layer is cracking.`;
  }

  if(!isCorrect && responseTime < 5000){
    return `${bossName}: Fast command. Bad command. The Nexus does not reward button mashing.`;
  }

  if(!isCorrect && (tag === "is" || tag === "lm" || tag === "is_lm" || tag === "fiscal" || tag === "monetary" || tag === "aggregate_demand" || tag === "depression")){
    return `${bossName}: Wrong curve, wrong system. Recalibrate before you wreck the model.`;
  }

  if(!isCorrect && tag){
    return `${bossName}: Weakness logged: ${tag}. The Nexus will circle back.`;
  }

  if(isCorrect){
    return `${bossName}: Correct. One clean command does not stabilize the system.`;
  }

  return `${bossName}: The checkpoint holds. Try again.`;
}

function startTimedModeClock(){
    timedModeEndTime = Date.now() + timedModeDurationMs;

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "flex";

    updateTimedModeClock();

    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
    }

    timedModeTimerInterval = setInterval(updateTimedModeClock, 250);
}

function stopTimedModeClock(){
    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
        timedModeTimerInterval = null;
    }

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "none";

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.classList.remove("timer-warning");
        timerDisplay.innerText = "10:00";
    }
}

function updateTimedModeClock(){
    if(gameMode !== "timed" || !timedModeEndTime) return;

    const remainingMs = Math.max(0, timedModeEndTime - Date.now());
    const totalSeconds = Math.ceil(remainingMs / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.innerText = `${minutes}:${String(seconds).padStart(2, "0")}`;
        timerDisplay.classList.toggle("timer-warning", remainingMs <= 60 * 1000);
    }

    if(remainingMs <= 0){
        endTimedModeRun();
    }
}

function endTimedModeRun(){

    stopTimedModeClock();
    gameMode = "timed-complete";

    if(gameMode === "legendary"){

            ? "legendaryBoss"

    }

    if(gameMode === "bossRush"){
        return (room <= 10) ? "easyBoss"
            : (room <= 20) ? "mediumBoss"
            : "finalBoss";
    }

    return (room <= 9) ? "easy"
         : (room === 10) ? "easyBoss"
         : (room <= 19) ? "medium"
         : (room === 20) ? "mediumBoss"
         : (room <= 25) ? "hard"
         : (room <= 29) ? "calculation"
         : "finalBoss";

// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    let q = {
        id: question.id,
        q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type,
        objective: question.objective,
        image: question.image,
        primarySkill: question.primarySkill,
        repairSkill: question.repairSkill,
        commonError: question.commonError
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

function getMoneyDemandTargetCalc(){ let intercept = rand(180, 320); let slope = rand(20, 60); let r = rand(2, 6); let P = rand(5, 20); let real = intercept - slope * r; if(real <= 0){ real = 100; intercept = real + slope * r; } let M = real * P; let pack = shuffleCalcOptions(`$${M}`, [`$${real}`, `$${M + slope * P}`, `$${Math.max(P * (real - slope), 0)}`]); return {id:10000,q:`Money demand is L(r) = ${intercept} - ${slope}r and P = ${P}. If the Fed wants r = ${r}, what nominal money supply is needed?`,options:pack.options,a:pack.a,tag:"monetary_policy",type:"calculation",objective:"LO13.3",primarySkill:"monetary_policy_lm_shift",feedback:"Use the target interest rate to find real money demand, then multiply by the price level to get nominal money supply.",hint:"Find M/P first, then multiply by P."}; }
function getMoneySupplyChangeCalc(){ let intercept = rand(240, 420); let slope = rand(20, 50); let P = rand(5, 20); let r1 = rand(2, 6); let r2 = Math.max(1, r1 - 1); let M1 = (intercept - slope * r1) * P; let M2 = (intercept - slope * r2) * P; let change = M2 - M1; let pack = shuffleCalcOptions(`increase the money supply by $${change}`, [`decrease the money supply by $${change}`, `increase the money supply by $${Math.abs(change - slope)}`, `leave the money supply unchanged`]); return {id:10001,q:`Money demand is L(r) = ${intercept} - ${slope}r and P = ${P}. To move the interest rate from ${r1}% to ${r2}%, the Fed must do what?`,options:pack.options,a:pack.a,tag:"monetary_policy",type:"calculation",objective:"LO13.3",primarySkill:"monetary_policy_lm_shift",feedback:"A lower target interest rate requires more real balances. Compute M/P at both rates, then multiply by P and compare.",hint:"Lower r means higher money demand."}; }
function getKeynesianCrossCalc(){ let mpcChoices = [0.5, 0.6, 0.75, 0.8]; let mpc = mpcChoices[rand(0, mpcChoices.length - 1)]; let deltaG = rand(10, 40); let mult = 1 / (1 - mpc); let deltaY = Math.round(deltaG * mult * 10) / 10; let pack = shuffleCalcOptions(`planned expenditure rises by $${deltaG} billion; equilibrium income rises by $${deltaY} billion`, [`planned expenditure rises by $${deltaY} billion; equilibrium income rises by $${deltaG} billion`, `planned expenditure rises by $${deltaG} billion; equilibrium income rises by $${deltaG} billion`, `planned expenditure falls by $${deltaG} billion; equilibrium income falls by $${deltaY} billion`]); return {id:10002,q:`In the Keynesian-cross model, MPC = ${mpc}. A $${deltaG} billion increase in government purchases changes planned expenditure and equilibrium income by how much?`,options:pack.options,a:pack.a,tag:"fiscal_policy",type:"calculation",objective:"LO13.2",primarySkill:"fiscal_policy_is_shift",feedback:"Government purchases enter planned expenditure dollar-for-dollar, then the multiplier raises equilibrium income by 1/(1 - MPC) times the spending change.",hint:"Spending change first, multiplier second."}; }
function getPlannedExpenditureEquilibriumCalc(){ let A = rand(300, 700); let mpcChoices = [0.5, 0.6, 0.75, 0.8]; let mpc = mpcChoices[rand(0, mpcChoices.length - 1)]; let T = rand(50, 250); let I = rand(100, 400); let G = rand(150, 500); let numerator = A - mpc * T + I + G; let Y = Math.round((numerator / (1 - mpc)) * 10) / 10; let pack = shuffleCalcOptions(`$${Y}`, [`$${Math.round(numerator * 10) / 10}`, `$${Math.round((A + I + G) * 10) / 10}`, `$${Math.round((Y * (1 - mpc)) * 10) / 10}`]); return {id:10003,q:`Planned expenditure is PE = ${A} + ${mpc}(Y - T) + I + G, where T = ${T}, I = ${I}, and G = ${G}. At what income does actual expenditure equal planned expenditure?`,options:pack.options,a:pack.a,tag:"is_curve",type:"calculation",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"Set Y = PE, collect the Y terms on the left, and solve. The tax term reduces autonomous spending by MPC times T.",hint:"Set Y equal to PE."}; }
function getISLMSystemCalc(){ let r = rand(2, 6); let Y = rand(800, 1600); let isSlope = rand(20, 80); let lmSlope = rand(50, 120); let isIntercept = Y + isSlope * r; let lmIntercept = Y - lmSlope * r; let pack = shuffleCalcOptions(`Y = ${Y} and r = ${r}`, [`Y = ${Y + 100} and r = ${r}`, `Y = ${Y} and r = ${r + 1}`, `Y = ${Math.max(Y - 100, 0)} and r = ${Math.max(r - 1, 0)}`]); return {id:10004,q:`Suppose the IS curve is Y = ${isIntercept} - ${isSlope}r and the LM curve is Y = ${lmIntercept} + ${lmSlope}r. What are equilibrium income and the interest rate?`,options:pack.options,a:pack.a,tag:"is_lm_equilibrium",type:"calculation",objective:"LO12.3",primarySkill:"is_lm_equilibrium",feedback:"Set the IS equation equal to the LM equation, solve for r, then plug r into either equation to get Y.",hint:"Set IS equal to LM."}; }
function getADRealBalancesCalc(){ let M = rand(1500, 4000); let P1 = rand(8, 12); let P2 = Math.max(4, P1 - rand(1, 3)); let real1 = Math.round((M / P1) * 10) / 10; let real2 = Math.round((M / P2) * 10) / 10; let pack = shuffleCalcOptions(`real balances rise from ${real1} to ${real2}, shifting LM right and raising income`, [`real balances fall from ${real2} to ${real1}, shifting LM left and lowering income`, `real balances stay at ${real1}, so AD is vertical`, `real balances rise, shifting IS left and lowering income`]); return {id:10005,q:`Nominal money is M = ${M}. If the price level falls from ${P1} to ${P2}, what happens to real balances and why does this help derive AD?`,options:pack.options,a:pack.a,tag:"aggregate_demand",type:"calculation",objective:"LO13.4",primarySkill:"aggregate_demand_from_islm",feedback:"A lower price level raises M/P. Higher real balances shift LM right, lowering the interest rate and raising income, which gives the downward slope of AD.",hint:"Compute M/P before and after."}; }

// RANDOMIZATION SYSTEM — DO NOT MODIFY CORE LOGIC
// =============================================
// Controls fair, non-repeating selection of:
// - calculation generators
// - question pools
//
// Uses "shuffle + bag" system to ensure:
// - no immediate repeats
// - full coverage before reuse
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding new generators (calculationGenerators)
// - modifying pool content
//
// DO NOT MODIFY:
// - shuffle logic
// - bag system (calcBag, _remaining)
// - pop() usage
//
// Breaking this WILL cause:
// - repeated questions
// - uneven distribution
// - predictable patterns
//
// This ensures randomness WITHOUT repetition.
// =============================================     

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Bag system for calculation generators
// Ensures all generators are used before repeating
let calcBag = [];

// Pulls one calculation generator from the bag
// Refills bag when empty (reshuffled)
function pickCalcGenerator(){
    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }
    return calcBag.pop();
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

function displayQuestion() {
    const optionsElement = document.getElementById("answers");
    optionsElement.innerHTML = "";

    currentQuestion.options.forEach((option, index) => { 
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.setAttribute("aria-label", `Answer option: ${option}`);

        btn.onclick = () => {
            btn.blur();
            answer(index);
        };

        btn.addEventListener("touchend", () => {
            btn.blur();
        }, { passive: true });

        optionsElement.appendChild(btn);
    });
}

function checkRapidGuessing(isCorrect, responseTime){
    rapidGuessHistory.push({
        correct: isCorrect ? 1 : 0,
        responseTime: responseTime
    });

    if(rapidGuessHistory.length > RAPID_GUESS_CONFIG.windowSize){
        rapidGuessHistory.shift();
    }

    if(rapidGuessHistory.length < RAPID_GUESS_CONFIG.minAttempts){
        return {
            triggered: false,
            avgTime: responseTime,
            accuracy: isCorrect ? 1 : 0
        };
    }

    const recent = rapidGuessHistory.slice(-RAPID_GUESS_CONFIG.windowSize);

    const avgTime = recent.reduce((sum, item) => sum + item.responseTime, 0) / recent.length;
    const accuracy = recent.reduce((sum, item) => sum + item.correct, 0) / recent.length;

    return {
        triggered: avgTime < RAPID_GUESS_CONFIG.avgTimeMs && accuracy < RAPID_GUESS_CONFIG.maxAccuracy,
        avgTime,
        accuracy
    };
}

// =============================================
// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|ARCHIVE42)
// - hashing logic
// - return format ("ARCH-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|NEXUS99`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "NEXUS-" + Math.abs(hash).toString(36).toUpperCase();
}

// =============================================
// POST-BATTLE MASTERY REPORT
// Student-facing diagnostic built from masteryState.
// Uses existing tag, objective, skill, type, accuracy, and response-time data.
// No answer keys. No question IDs. No nonsense.
// =============================================
let latestResultsScreenHTML = "";

const COMMAND_NEXUS_OBJECTIVE_LABELS = (typeof objectiveLabels !== "undefined") ? objectiveLabels : {};

function escapeHTML(value){
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function titleCase(value){
    return String(value || "")
        .replace(/_/g, " ")
        .replace(/-/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, letter => letter.toUpperCase());
}

function formatMasteryLabel(key){
    if(!key) return "Unlabeled Concept";

    const text = String(key);
    const exactLabel = COMMAND_NEXUS_OBJECTIVE_LABELS[text];

    if(exactLabel){
        return /^LO\d+\.\d+$/.test(text)
            ? `${text} — ${exactLabel}`
            : exactLabel;
    }

    const objectiveMatch = text.match(/^(LO\d+\.\d+)/);
    if(objectiveMatch && COMMAND_NEXUS_OBJECTIVE_LABELS[objectiveMatch[1]]){
        const suffix = text
            .replace(objectiveMatch[1], "")
            .replace(/^_+/, "")
            .replace(/_/g, " ")
            .trim();

        return suffix
            ? `${objectiveMatch[1]} — ${COMMAND_NEXUS_OBJECTIVE_LABELS[objectiveMatch[1]]}: ${titleCase(suffix)}`
            : `${objectiveMatch[1]} — ${COMMAND_NEXUS_OBJECTIVE_LABELS[objectiveMatch[1]]}`;
    }

    return titleCase(text);
}

function formatPercent(value){
    if(value === null || value === undefined || !Number.isFinite(Number(value))) return "—";
    return `${Math.round(Number(value) * 100)}%`;
}

function formatSeconds(ms){
    const numeric = Number(ms || 0);
    if(!Number.isFinite(numeric) || numeric <= 0) return "—";
    return `${Math.round(numeric / 1000)}s`;
}

function getBucketEntry(key, bucket, category = "concept"){
    if(!bucket || !bucket.attempts){
        return null;
    }

    const attempts = Number(bucket.attempts || 0);
    const correct = Number(bucket.correct || 0);
    const accuracy = attempts ? correct / attempts : null;
    const typeForTiming = category === "type" ? key : "default";
    const target = getTypeTargetMs(typeForTiming);
    const avgTime = Number(bucket.avgTime || 0);
    const timeRatio = avgTime && target ? avgTime / target : 1;
    const fluency = accuracy === null
        ? 0
        : accuracy - clamp((timeRatio - 1) * 0.25, 0, 0.35);

    return {
        key,
        label: formatMasteryLabel(key),
        category,
        attempts,
        correct,
        accuracy,
        avgTime,
        timeRatio,
        fluency
    };
}

function getEntriesFromBuckets(source, category = "concept"){
    return Object.entries(source || {})
        .map(([key, bucket]) => getBucketEntry(key, bucket, category))
        .filter(Boolean);
}

function getTypeMasteryEntries(){
    const typeBuckets = {};

    Object.values(masteryState.byTag || {}).forEach(tagBucket => {
        Object.entries(tagBucket.byType || {}).forEach(([type, bucket]) => {
            if(!typeBuckets[type]){
                typeBuckets[type] = { attempts: 0, correct: 0, avgTime: 0 };
            }

            const oldAttempts = typeBuckets[type].attempts;
            const newAttempts = oldAttempts + Number(bucket.attempts || 0);

            typeBuckets[type].correct += Number(bucket.correct || 0);
            typeBuckets[type].avgTime = newAttempts
                ? ((typeBuckets[type].avgTime * oldAttempts) + (Number(bucket.avgTime || 0) * Number(bucket.attempts || 0))) / newAttempts
                : 0;
            typeBuckets[type].attempts = newAttempts;
        });
    });

    return getEntriesFromBuckets(typeBuckets, "type");
}

function sortStrongest(entries){
    return [...entries]
        .filter(entry => entry.attempts >= 2)
        .sort((a,b) => (b.accuracy - a.accuracy) || (b.fluency - a.fluency) || (b.attempts - a.attempts));
}

function sortWeakest(entries){
    const enoughData = entries.filter(entry => entry.attempts >= 2);
    const pool = enoughData.length ? enoughData : entries;

    return [...pool]
        .sort((a,b) => (a.accuracy - b.accuracy) || (a.fluency - b.fluency) || (b.avgTime - a.avgTime));
}

function hasMeaningfulWeakness(entries, accuracyThreshold = 0.85){
    return (entries || []).some(entry => {
        if(!entry || entry.attempts < 2) return false;

        const accuracy = entry.accuracy === null || entry.accuracy === undefined
            ? 1
            : Number(entry.accuracy);

        return accuracy < accuracyThreshold || entry.timeRatio > 1.35;
    });
}

function renderMasteryRows(entries, emptyText){
    if(!entries || entries.length === 0){
        return `<p class="mastery-empty">${escapeHTML(emptyText)}</p>`;
    }

    return entries.map(entry => {
        const pct = Math.max(0, Math.min(100, Math.round((entry.accuracy || 0) * 100)));
        const pace = entry.timeRatio > 1.25
            ? "Slow response pattern"
            : entry.timeRatio < 0.65
                ? "Fast response pattern"
                : "Stable pace";

        return `
            <div class="mastery-row">
                <div class="mastery-row-main">
                    <span class="mastery-row-name">${escapeHTML(entry.label)}</span>
                    <span class="mastery-row-score">${formatPercent(entry.accuracy)} · ${entry.correct}/${entry.attempts}</span>
                </div>
                <span class="mastery-row-meta">Average response: ${formatSeconds(entry.avgTime)} · ${pace}</span>
                <div class="mastery-bar"><div class="mastery-bar-fill" style="width:${pct}%"></div></div>
            </div>
        `;
    }).join("");
}

function renderMasteryDiagnosticSection({
    weaknessTitle,
    signalTitle,
    entries,
    hasWeakness,
    weaknessEmptyText,
    cleanText
}){
    const title = hasWeakness ? weaknessTitle : signalTitle;
    const body = hasWeakness
        ? renderMasteryRows(entries, weaknessEmptyText)
        : `<p class="mastery-empty">${escapeHTML(cleanText)}</p>`;

    return `
        <div class="mastery-section">
            <h3>${escapeHTML(title)}</h3>
            ${body}
        </div>
    `;
}

function getRecentBehaviorSignals(){
    const recent = masteryState.recent || [];
    let fastMisses = 0;
    let slowCorrects = 0;
    let recentCorrect = 0;
    let recentTimeTotal = 0;

    recent.forEach(item => {
        const target = getTypeTargetMs(item.type || "default");
        const responseTime = Number(item.responseTime || 0);

        if(item.correct) recentCorrect++;
        if(responseTime) recentTimeTotal += responseTime;

        if(!item.correct && responseTime > 0 && responseTime < target * 0.55){
            fastMisses++;
        }

        if(item.correct && responseTime > target * 1.20){
            slowCorrects++;
        }
    });

    return {
        count: recent.length,
        accuracy: recent.length ? recentCorrect / recent.length : null,
        avgTime: recent.length ? recentTimeTotal / recent.length : 0,
        fastMisses,
        slowCorrects
    };
}


function getMasteryReportModeName(){
    if(gameMode === "timed-complete") return "Timed Trial";
    if(gameMode === "score") return "Score Attack";
    if(gameMode === "legendary") return "Legendary Mode";
    if(gameMode === "exam") return "Exam Drill";
    return getModeDisplayName();
}

function getMasteryReportData(){
    const totalTimeMs = startTime ? (Date.now() - startTime) : 0;
    const accuracy = totalAttempts > 0 ? correctAnswers / totalAttempts : 0;
    const tagEntries = getEntriesFromBuckets(masteryState.byTag || {}, "tag");
    const objectiveEntries = getEntriesFromBuckets(masteryState.byObjective || {}, "objective");
    const skillEntries = getEntriesFromBuckets(masteryState.bySkill || {}, "skill");
    const typeEntries = getTypeMasteryEntries();
    const behavior = getRecentBehaviorSignals();

    const strongest = sortStrongest([...objectiveEntries, ...tagEntries]).slice(0, 4);
    const weakestObjectives = sortWeakest(objectiveEntries).slice(0, 4);
    const weakestTypes = sortWeakest(typeEntries).slice(0, 3);
    const weakestSkills = sortWeakest(skillEntries).slice(0, 3);

    const hasObjectiveWeakness = hasMeaningfulWeakness(objectiveEntries, 0.85);
    const hasTypeWeakness = hasMeaningfulWeakness(typeEntries, 0.85);
    const hasSkillWeakness = hasMeaningfulWeakness(skillEntries, 0.85);
    const hasBehaviorWeakness = behavior.fastMisses >= 2 || behavior.slowCorrects >= 3;
    const noMajorWeakness = totalAttempts >= 8
        && accuracy >= 0.85
        && !hasObjectiveWeakness
        && !hasTypeWeakness
        && !hasSkillWeakness
        && !hasBehaviorWeakness;

    let verdict = "The Custodian found enough signal to build a report. Use it. Ignoring it would be malpractice with extra steps.";

    if(totalAttempts < 5){
        verdict = "The report is limited because this run has very few attempts. The Nexus needs more evidence before it can judge mastery with confidence.";
    } else if(noMajorWeakness){
        verdict = "No major weakness detected. That does not mean the Nexus is done with you. It means the next useful signal comes from harder pressure: Legendary Mode first, Score Attack after that.";
    } else if(accuracy >= 0.90){
        verdict = "Strong command. You cleared the Nexus with high accuracy. The weak signals below show where the next pressure test should focus.";
    } else if(accuracy >= 0.75){
        verdict = "Battle-ready, but not bulletproof. The weak areas below are where points will leak on an exam.";
    } else {
        verdict = "Unstable command. You finished, but the Nexus exposed weak signals. Hit the listed areas before chasing speed or Legendary Mode.";
    }

    const nextSteps = [];

    if(noMajorWeakness){
        nextSteps.push("Enter Legendary Mode next. The current run did not expose a major weak point, so harder multi-step and trap-heavy questions are the right next test.");
        nextSteps.push("Use Score Attack after Legendary Mode feels stable. Speed pressure is useful only after mastery survives harder questions.");
    } else {
        if(hasObjectiveWeakness && weakestObjectives[0]){
            nextSteps.push(`Review ${weakestObjectives[0].label}. That objective showed the weakest mastery signal.`);
        }

        if(hasTypeWeakness && weakestTypes[0]){
            nextSteps.push(`Practice ${weakestTypes[0].label} questions. That question form caused the most trouble.`);
        }

        if(hasSkillWeakness && weakestSkills[0]){
            nextSteps.push(`Drill ${weakestSkills[0].label}. That skill needs cleaner repetition.`);
        }

        if(behavior.fastMisses >= 2){
            nextSteps.push("Slow down on traps and graph-style items. Fast misses are not fluency. They are just wrong answers with confidence.");
        } else if(behavior.slowCorrects >= 3){
            nextSteps.push("You can get answers right, but some correct responses were slow. Build speed only after the reasoning is automatic.");
        }
    }

    if(nextSteps.length === 0){
        nextSteps.push("Run a harder mode next. The current evidence does not show a major weak point. Make the Nexus earn its paycheck.");
    }

    return {
        mode: getMasteryReportModeName(),
        accuracy,
        totalTimeMs,
        timeString: formatTime(totalTimeMs),
        totalAttempts,
        correctAnswers,
        maxStreak,
        score: modeUsesScoreAttack() ? scoreAttackScore : null,
        strongest,
        weakestObjectives,
        weakestTypes,
        weakestSkills,
        hasObjectiveWeakness,
        hasTypeWeakness,
        hasSkillWeakness,
        noMajorWeakness,
        behavior,
        verdict,
        nextSteps
    };
}

function restoreResultsScreen(){
    const gameBox = document.getElementById("gameBox");
    if(!gameBox || !latestResultsScreenHTML) return;

    gameBox.innerHTML = latestResultsScreenHTML;

    const line = document.getElementById("archivistLine");
    if(line){
        line.style.opacity = 1;
    }
}

function copyMasteryReport(){
    const report = getMasteryReportData();

    const lines = [
        "The Command Nexus — Custodian's Mastery Report",
        `Student: ${username}`,
        `Mode: ${report.mode}`,
        `Accuracy: ${formatPercent(report.accuracy)} (${report.correctAnswers}/${report.totalAttempts})`,
        `Best Streak: ${report.maxStreak}`,
        `Time: ${report.timeString}`,
        report.score !== null ? `Score: ${report.score}` : null,
        "",
        "Strongest Signals:",
        ...(report.strongest.length ? report.strongest.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No clear strength signal yet."]),
        "",
        report.hasObjectiveWeakness ? "Weakest Learning Objectives:" : "Objective Signals:",
        ...(report.hasObjectiveWeakness && report.weakestObjectives.length ? report.weakestObjectives.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major objective weakness detected. Try Legendary Mode next."]),
        "",
        report.hasTypeWeakness ? "Weakest Question Forms:" : "Question Form Signals:",
        ...(report.hasTypeWeakness && report.weakestTypes.length ? report.weakestTypes.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major question-form weakness detected."]),
        "",
        report.hasSkillWeakness ? "Weakest Skills:" : "Skill Signals:",
        ...(report.hasSkillWeakness && report.weakestSkills.length ? report.weakestSkills.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major skill weakness detected."]),
        "",
        "Next Moves:",
        ...report.nextSteps.map(step => `- ${step}`)
    ].filter(line => line !== null);

    const text = lines.join("\n");

    function markCopied(){
        const btn = Array.from(document.querySelectorAll("button"))
            .find(button => button.innerText === "Copy Report" || button.innerText === "Copied!");

        if(!btn) return;
        const original = btn.innerText;
        btn.innerText = "Copied!";
        setTimeout(() => { btn.innerText = original; }, 1800);
    }

    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(markCopied);
        return;
    }

    const temp = document.createElement("textarea");
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    temp.remove();
    markCopied();
}




// =============================
// UTILITIES
// =============================
     
// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================     
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}     

// =============================================
// HIGH SCORE TRACKING — OPTIONAL FEATURE
// =============================================
// Stores top completion times in browser (localStorage)
//
// - Saves name, time, and date
// - Sorts fastest → slowest
// - Keeps top 5 results only
//
// SAFE TO EDIT:
// - number of scores kept (slice)
// - displayed fields (name/date)
//
// WARNING:
// Clearing browser data will erase scores.
// =============================================
function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

// =============================================
// TIME FORMATTER — SAFE UTILITY
// =============================================
// Converts milliseconds → readable format (Xm Ys)
//
// Used for:
// - victory screen
// - performance tracking
//
// Safe to modify format if desired.
// =============================================     
function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

// =============================================
// RESULT SHARING — SAFE TO CUSTOMIZE
// =============================================
// Copies player performance summary to clipboard.
//
// Includes:
// - name
// - time
// - accuracy
// - streak
// - verification code
//
// SAFE TO EDIT:
// - text format
// - labels ("Adventurer", etc.)
// - button feedback message
//
// WARNING:
// Requires element IDs:
// - "vCode"
// - "shareBtn"
//
// Removing those will break this function.
// =============================================     
function copyResults() {
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const code = document.getElementById("vCode").innerText;
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);

    const shareText = `Adventurer: ${username}
        Time: ${timeString}
        Accuracy: ${accuracy}%
        Best Streak: ${maxStreak}
        Total Questions: ${totalAttempts}
        Code: ${code}
        Verified by The Anaylst`;

    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        const originalColor = btn.style.background;

        btn.innerText = "✅ Copied!";
        btn.style.background = "#059669";

        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = originalColor;
        }, 2000);
    });
}
