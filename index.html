        {"id":9012,"q":"A central bank wants to cut r from 6 to 4. Money demand is 1,000 − 60r and P=5. How much must nominal M change?","options":["increase by 600","increase by 120","decrease by 600","decrease by 120"],"a":0,"tag":"lm_curve","type":"calculation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Real demand rises from 640 to 760, so real balances must rise by 120. Nominal M rises by 120×5=600.","hint":"Lower r requires people to hold more real balances."},
        {"id":9013,"q":"A fall in P shifts LM right, but expectations of deflation reduce investment demand. What is ambiguous?","options":["the direction of LM","the final change in Y","the definition of real balances","whether money demand exists"],"a":1,"tag":"lm_curve","type":"integration","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"LM-right raises Y, while IS-left from weaker investment lowers Y; the net output effect depends on size."},
        {"id":9014,"q":"Which statement incorrectly interprets an interest-rate peg?","options":["the Fed must change M to defend the target","money demand can change at the target rate","the LM curve becomes irrelevant since the Fed chooses r","output can change while the Fed accommodates"],"a":2,"tag":"lm_curve","type":"trap","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"A rate target is implemented through money supply adjustments; money-market logic still matters.","commonError":"thinking a rate target eliminates money-market equilibrium"},
        {"id":9015,"q":"Using the LM graph, which comparison isolates a money-supply expansion?","options":["same LM curve, higher Y and higher r","higher r on a leftward LM curve","same point with a new label","same Y, lower r on a rightward LM curve"],"a":3,"tag":"lm_curve","type":"graph","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"At a fixed income, monetary expansion lowers the interest rate by shifting LM right."},
        {"id":9016,"q":"If Y rises because IS shifted right and the Fed does nothing, what happens to r and why?","options":["r rises because money demand increases","r falls because investment rises","r is unchanged because LM shifts right automatically","r falls because taxes rise"],"a":0,"tag":"lm_curve","type":"multi-step","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"With M/P fixed, higher income pulls the economy upward along LM."},
        {"id":9017,"q":"If money demand becomes less interest-sensitive, what happens to LM and monetary policy transmission?","options":["LM gets flatter and r moves less","LM gets steeper & a money shift moves r more","IS gets steeper and Y cannot move","AD becomes vertical by definition"],"a":1,"tag":"lm_curve","type":"application","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Less interest sensitivity means the interest rate must adjust more to clear money markets."},
        {"id":9018,"q":"Why does the price-level channel behind AD run through LM rather than IS first?","options":["P directly changes government purchases","P fixes investment at zero","P changes real balances M/P","P changes taxes automatically"],"a":2,"tag":"lm_curve","type":"interpretation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"A lower P raises M/P, shifts LM right, lowers r, and raises Y along AD."},
        {"id":9019,"q":"A student says higher P raises nominal money demand, so LM shifts right. What is the best correction?","options":["higher P always shifts IS right","higher P raises real balances one-for-one","higher P leaves M/P unchanged","higher P lowers M/P when M is fixed, so LM left"],"a":3,"tag":"lm_curve","type":"trap","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"In the basic model, LM is drawn with real balances. Fixed M and higher P reduce M/P.","commonError":"wrong sign on the price-level effect"},
        {"id":9020,"q":"Money demand is L = 0.3Y + 200 − 20r. At Y=2,000 and r=10, what nominal M is needed if P=4?","options":["2,400","600","3,200","1,600"],"a":0,"tag":"lm_curve","type":"calculation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Real money demand is 600+200−200=600. Nominal M=600×4=2,400.","hint":"Compute real money demand first."},
        {"id":9021,"q":"Which policy keeps LM from shifting left after a higher price level?","options":["raise taxes in proportion to P","increase nominal M in proportion to P","lower G by the change in P","reduce investment demand"],"a":1,"tag":"lm_curve","type":"integration","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"To hold real balances steady when P rises, M must rise as well."},
        {"id":9022,"q":"C=200+0.75(Y−200), I=600−50r, G=525, and LM is r=0.01Y−12. What is equilibrium Y?","options":["2,400","2,200","2,600","2,800"],"a":0,"tag":"is_lm_equilibrium","type":"calculation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Goods market gives Y=4,700−200r. Substitute r=0.01Y−12: Y=4,700−2Y+2,400, so 3Y=7,200 and Y=2,400.","hint":"Derive IS, then substitute LM."},
        {"id":9023,"q":"IS: Y=5,000−250r. LM: r=0.004Y−4. A money expansion changes LM to r=0.004Y−6. What is ΔY?","options":["+500","+250","−250","−500"],"a":1,"tag":"is_lm_equilibrium","type":"calculation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Old: Y=5,000−250(0.004Y−4)=6,000−Y, so Y=3,000. New: Y=5,000−250(0.004Y−6)=6,500−Y, so Y=3,250."},
        {"id":9024,"q":"IS shifts right, LM shifts left, and Y is unchanged. What must happen to r?","options":["r falls","r is unchanged","r rises","r becomes negative by necessity"],"a":2,"tag":"is_lm_equilibrium","type":"integration","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Both shifts raise the interest rate; equal output effects can leave Y unchanged."},
        {"id":9025,"q":"Which answer mistakes a new equilibrium for a disequilibrium path?","options":["the economy moves to the intersection","r and Y are read at the crossing point","curve shifts are compared by old and new intersections","the economy stays between the curves after adjustment is complete"],"a":3,"tag":"is_lm_equilibrium","type":"trap","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"The model solution is the new intersection, not a permanent off-curve position.","commonError":"stopping before the new intersection"},
        {"id":9026,"q":"On the IS-LM graph, which move shows fiscal expansion followed by monetary tightening that leaves Y at Y3?","options":["A to D","A to B","D to G","H to E"],"a":0,"tag":"is_lm_equilibrium","type":"graph","objective":"LO12.3","image":"is_lm_curves.png","primarySkill":"is_lm_equilibrium","feedback":"A to D combines IS moving right and LM moving left, ending at the same Y but higher r."},
        {"id":9027,"q":"A spending boom raises Y and r. If the central bank wants the original Y restored, what curve movement can do it?","options":["LM shifts right further","LM left enough to offset IS-right","IS shifts right again","AD moves down with no curve shift"],"a":1,"tag":"is_lm_equilibrium","type":"multi-step","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Tighter money can counter the demand expansion by raising r and lowering investment."},
        {"id":9028,"q":"Why can stabilizing r fail to stabilize Y after an IS shock?","options":["Y depends only on LM","IS shocks cannot change spending","the IS shift can change Y even at the old r","r determines natural output"],"a":2,"tag":"is_lm_equilibrium","type":"application","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Holding r constant removes one channel but does not erase the direct spending shift."},
        {"id":9029,"q":"What should be reported when both curves shift and one variable is ambiguous?","options":["only the old equilibrium","nothing because ambiguity means failure","only the first variable mentioned","the definite variable & the condition for the ambiguous one"],"a":3,"tag":"is_lm_equilibrium","type":"interpretation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"A good IS-LM answer separates what is determinate from what depends on relative shift size."},
        {"id":9030,"q":"A student says IS-right plus LM-left must raise Y because one curve shifts right. What is missing?","options":["LM-left pushes Y down & may dominate","IS-right always lowers Y","LM-left always raises Y","the graph has no income axis"],"a":0,"tag":"is_lm_equilibrium","type":"trap","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Opposing output effects make Y ambiguous unless the relative magnitudes are known."},
        {"id":9031,"q":"IS is Y=6,000−300r and LM is Y=1,500+450r. If IS shifts left by 750, what is the new equilibrium r?","options":["4","5","6","7"],"a":1,"tag":"is_lm_equilibrium","type":"calculation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"New IS: Y=5,250−300r. Set equal to 1,500+450r: 3,750=750r, so r=5.","hint":"Shift the IS intercept, then solve."},
        {"id":9032,"q":"Which statement best handles a two-policy mix in IS-LM?","options":["average the two policy names","ignore the smaller-looking curve","state each curve shift, then read the net effect on Y & r","assume all policy mixes raise Y"],"a":2,"tag":"is_lm_equilibrium","type":"integration","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Mixed policy analysis starts with separate curve shifts and then compares their effects."},
        {"id":9033,"q":"A recession follows two forces: autonomous spending falls, but the price level also falls. What is ambiguous in IS-LM?","options":["r, because both forces raise it","the LM shift, because P has no effect","the IS shift, because spending cannot fall","Y, because IS-left and LM-right oppose"],"a":3,"tag":"shocks","type":"application","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Lower spending shifts IS left; lower P raises real balances and shifts LM right."},
        {"id":9034,"q":"A policy response raises G while a banking panic raises money demand. What is the sure effect on r?","options":["r rises","r falls","r is unchanged","r disappears from the model"],"a":0,"tag":"shocks","type":"application","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Fiscal expansion and LM-left both push r upward; Y is ambiguous."},
        {"id":9035,"q":"On the IS-LM graph, which move keeps Y at Y3 but raises r?","options":["D to G","H to D","A to F","B to C"],"a":1,"tag":"shocks","type":"graph","objective":"LO13.1","image":"is_lm_curves.png","primarySkill":"shock_transmission","feedback":"H and D share Y3, but D has a higher interest rate."},
        {"id":9036,"q":"A student sees lower P during a slump and says falling prices always fix the shock. What is missing?","options":["lower P cannot affect real balances","falling prices always shift IS right","deflation can raise real rs & reduce spending","money demand must be zero"],"a":2,"tag":"shocks","type":"trap","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Real-balance effects can help, but expected deflation can depress IS.","commonError":"assuming one channel dominates without evidence"},
        {"id":9037,"q":"Autonomous spending falls by 60 with MPC=0.75, while monetary expansion independently raises demand by 120 in Y-units. What is net ΔY before further feedback?","options":["−240","−60","+120","−120"],"a":3,"tag":"shocks","type":"calculation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The spending shock is −60×4=−240. Add +120 from monetary support for net −120.","hint":"Compute each force separately, then add."},
        {"id":9038,"q":"Money demand rises by 80 real units. P=5. The Fed raises M by 250. What is the remaining real shortage?","options":["30","0","50","80"],"a":0,"tag":"shocks","type":"calculation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The Fed supplies 250/5=50 real units, leaving 80−50=30.","hint":"Convert nominal M into real balances."},
        {"id":9039,"q":"Which two-shock case makes Y definitely fall but r ambiguous?","options":["IS-right plus LM-right","IS-left plus LM-left","IS-right plus LM-left","IS-left plus LM-right"],"a":1,"tag":"shocks","type":"integration","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Both leftward shifts reduce Y, but IS-left lowers r while LM-left raises r."},
        {"id":9040,"q":"Which two-shock case makes r definitely fall but Y ambiguous?","options":["IS-right plus LM-left","IS-left plus LM-left","IS-left plus LM-right","IS-right plus LM-right"],"a":2,"tag":"shocks","type":"integration","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Both shifts lower r, but their output effects oppose."},
        {"id":9041,"q":"A crisis raises money demand, then higher r lowers investment, then Y falls. Which market transmits the first step?","options":["the goods market through G","the labor market through wages","the long-run supply side","the money market"],"a":3,"tag":"shocks","type":"multi-step","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The first step is a liquidity-preference disturbance on LM."},
        {"id":9042,"q":"Why should a shock answer include both curve and variable movement?","options":["curve movement identifies cause; variables describe outcome","variables alone identify every cause","curve movement replaces the need for outcomes","neither matters if a graph is present"],"a":0,"tag":"shocks","type":"interpretation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Good diagnosis separates mechanism from result."},
        {"id":9043,"q":"Which response is too confident without shift sizes?","options":["IS-right plus LM-left means r rises","IS-right plus LM-left means Y must rise","IS-left plus LM-left means Y falls","IS-left plus LM-right means r falls"],"a":1,"tag":"shocks","type":"trap","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"With opposing output effects, Y needs relative magnitudes."},
        {"id":9044,"q":"MPC=0.75. G rises by 60, T rises by 20, and investment later falls by 50. What is net ΔY using simple multiplier logic?","options":["190","240","130","310"],"a":2,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"G effect=240; tax effect=−60; investment offset=−50; net=130.","hint":"Apply each component once."},
        {"id":9045,"q":"MPC=0.8. A tax rebate of 100 has only 60% spent in the first round. What is the simple-cross ΔY?","options":["500","400","60","300"],"a":3,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"First-round spending is 60; multiplier is 5; total is 300.","hint":"Use actual first-round spending, not the full rebate."},
        {"id":9046,"q":"Fiscal expansion plus central-bank tightening has what certain effect?","options":["r rises","Y rises","Y falls","r falls"],"a":0,"tag":"fiscal_policy","type":"integration","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"IS-right and LM-left both raise r; output is ambiguous."},
        {"id":9047,"q":"Which conclusion is unjustified without knowing LM slope?","options":["G shifts IS right","the fiscal multiplier in IS-LM equals the simple-cross multiplier","tax cuts work through consumption","higher Y can raise money demand"],"a":1,"tag":"fiscal_policy","type":"trap","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"The IS-LM multiplier depends on the interest-rate feedback.","commonError":"assuming no crowding out"},
        {"id":9048,"q":"On the IS-LM graph, A to D combines which forces?","options":["IS left and LM right","IS right and LM right","IS right and LM left","IS left and LM left"],"a":2,"tag":"fiscal_policy","type":"graph","objective":"LO13.2","image":"is_lm_curves.png","primarySkill":"fiscal_policy_is_shift","feedback":"A to D has higher r at the same Y, consistent with fiscal expansion offset by monetary contraction."},
        {"id":9049,"q":"A temporary G increase occurs when consumers expect future taxes. What should be checked before predicting the IS shift size?","options":["LM must shift left first","money supply must rise automatically","LRAS must change before IS","private C may fall from expected tax burdens"],"a":3,"tag":"fiscal_policy","type":"multi-step","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Expectations can reduce the net demand effect of fiscal expansion."},
        {"id":9050,"q":"If policymakers want maximum short-run Y from fiscal expansion, which supporting policy helps?","options":["monetary accommodation","monetary contraction","higher money demand","lower transfers"],"a":0,"tag":"fiscal_policy","type":"application","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Accommodation limits r increases and investment crowding out."},
        {"id":9051,"q":"Why does fiscal policy have both direct and indirect effects in IS-LM?","options":["it directly changes money supply and indirectly changes G","it directly spending & indirectly changes r through Md","it directly moves LRAS and indirectly moves taxes","it directly sets inflation expectations only"],"a":1,"tag":"fiscal_policy","type":"interpretation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Goods-market policy spills into money markets through income."},
        {"id":9052,"q":"Which answer double counts a tax cut?","options":["derive the IS shift from the tax multiplier","solve the new IS-LM intersection","shift IS right & then add the tax multiplier again after solving","separate policy shock from equilibrium result"],"a":2,"tag":"fiscal_policy","type":"trap","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Once the IS shift is built into the curve, do not add it again.","commonError":"double-counting fiscal effects"},
        {"id":9053,"q":"MPC=0.6. A balanced-budget increase of 90 changes simple-cross Y by how much?","options":["0","135","225","90"],"a":3,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"The balanced-budget multiplier is 1 in this simple model, so ΔY=90.","hint":"G effect minus tax effect."},
        {"id":9054,"q":"Which policy mix can raise Y while leaving investment roughly unchanged?","options":["fiscal expansion with enough monetary accommodation to hold r steady","fiscal expansion with monetary contraction","tax increases with money contraction","G cuts with higher money demand"],"a":0,"tag":"fiscal_policy","type":"integration","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"If r is held steady, the interest-sensitive investment offset is muted."},
        {"id":9055,"q":"Money demand is 900+0.2Y−60r. Y=3,000, P=8. The Fed wants r=15. What M is required?","options":["600","4,800","7,200","3,600"],"a":1,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Real demand is 900+600−900=600. Nominal M=600×8=4,800.","hint":"Compute real demand at target r."},
        {"id":9056,"q":"M rises 20%, P rises 10%, and initial M/P is 500. What is new M/P?","options":["550","600","about 545.5","500"],"a":2,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"New real balances are 500×1.20/1.10 ≈ 545.5.","hint":"Scale M/P by the ratio of growth factors."},
        {"id":9057,"q":"Monetary expansion and expected deflation occur together. What is ambiguous?","options":["the direction of the money-supply change","whether M/P appears in LM","the definition of output","I response if nominal r falls but real r may rise"],"a":3,"tag":"monetary_policy","type":"integration","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Borrowing decisions depend on real rates, not just nominal rates."},
        {"id":9058,"q":"Which answer double counts monetary policy?","options":["shift LM right & then separately add another I increase after solving","shift LM right from higher M","solve the new intersection","explain lower r raises investment"],"a":0,"tag":"monetary_policy","type":"trap","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"The investment response is already reflected in movement along IS to the new equilibrium.","commonError":"double-counting monetary transmission"},
        {"id":9059,"q":"On the IS-LM graph, which move shows monetary contraction after fiscal expansion from B?","options":["B to E","B to D","A to B","D to H"],"a":1,"tag":"monetary_policy","type":"graph","objective":"LO13.3","image":"is_lm_curves.png","primarySkill":"monetary_policy_lm_shift","feedback":"B to D shifts LM left while holding IS2 fixed."},
        {"id":9060,"q":"A rate target is lowered while money demand also rises. What must happen to nominal M?","options":["it must fall because r is lower","it can stay fixed if P is fixed","it must rise by enough to cover both forces","it must change taxes first"],"a":2,"tag":"monetary_policy","type":"multi-step","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Lower r requires more real balances, and higher money demand requires still more."},
        {"id":9061,"q":"If the Fed expands M but banks hoard reserves in a richer setting, what weakens transmission?","options":["IS must shift right fully","tax multipliers become infinite","P must fall by law","the money multiplier & lending channel may weaken"],"a":3,"tag":"monetary_policy","type":"application","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Policy implementation can fail to translate into broader money and credit growth."},
        {"id":9062,"q":"Why is “the Fed cut rates” incomplete in IS-LM mechanics?","options":["the model should show how M adjusts to support that rate","rates are not part of IS-LM","rate cuts are fiscal policy","investment cannot respond to rates"],"a":0,"tag":"monetary_policy","type":"interpretation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"A lower target rate is implemented by supplying more money balances."},
        {"id":9063,"q":"A student says monetary expansion raises Y because people are richer from holding money. What is the standard IS-LM correction?","options":["the main channel is higher taxes","the main channel is lower r & higher I","the main channel is lower G","the main channel is lower LRAS"],"a":1,"tag":"monetary_policy","type":"trap","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"The standard transmission mechanism is the interest-rate channel.","commonError":"using a wealth story instead of LM transmission"},
        {"id":9064,"q":"At target r, real money demand rises from 250 to 310. P rises from 8 to 10. How much must nominal M change?","options":["increase by 60","increase by 620","increase by 1,100","decrease by 1,100"],"a":2,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Old M=250×8=2,000. New M=310×10=3,100. Increase=1,100.","hint":"Compute old and new nominal money."},
        {"id":9065,"q":"Which monetary policy offsets an AD-left shock from lower investment without raising G?","options":["sell bonds to shift LM left","raise taxes to shift IS left","cut transfers to reduce C","expand money to shift LM right"],"a":3,"tag":"monetary_policy","type":"integration","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"LM-right can lower r and support investment without fiscal expansion."},
        {"id":9066,"q":"M=6,000. P falls from 12 to 10. Money demand is 700−50r. What happens to r?","options":["falls from 4 to 2","rises from 2 to 4","falls from 5 to 4","stays at 4"],"a":0,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"M/P rises from 500 to 600. Set 700−50r equal to each value.","hint":"Solve money-market equilibrium twice."},
        {"id":9067,"q":"At P1, M/P=250 and Y=1,400. At P2, M/P=300 and Y=1,550. What is the implied ΔY per extra real balance?","options":["1.5","3","5","50"],"a":1,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Real balances rise by 50 and Y rises by 150, so 150/50=3.","hint":"Compute slope of the response, not the AD slope."},
        {"id":9068,"q":"A monetary expansion and a fall in business confidence occur together. What is ambiguous for AD?","options":["the direction of the M change","whether IS-LM can be solved","the net AD shift","the meaning of P"],"a":2,"tag":"aggregate_demand","type":"integration","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Monetary expansion shifts AD right; lower confidence shifts AD left."},
        {"id":9069,"q":"Which conclusion is invalid from seeing a lower P and higher Y?","options":["movement along AD could explain it","lower P raises M/P","LM-right can raise Y","AD must have shifted right"],"a":3,"tag":"aggregate_demand","type":"trap","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Lower P and higher Y may simply be movement along a fixed downward-sloping AD.","commonError":"mistaking movement for shift"},
        {"id":9070,"q":"On the AD graph, which move shows AD shifting right at constant P2?","options":["5 to 6","2 to 5","1 to 4","6 to 3"],"a":0,"tag":"aggregate_demand","type":"graph","objective":"LO13.4","image":"is_lm_ad.png","primarySkill":"aggregate_demand_from_islm","feedback":"At P2, moving from AD2 to AD3 raises Y from Y3 to Y4."},
        {"id":9071,"q":"To compare two AD curves at the same P, what should be held fixed?","options":["the nominal money supply always","the price level","the IS curve always","the output value always"],"a":1,"tag":"aggregate_demand","type":"multi-step","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Holding P fixed isolates the shift in demand at that price level."},
        {"id":9072,"q":"If the Fed increases M but money demand also rises, when does AD shift right?","options":["whenever money demand rises","only if taxes rise","when the M increase dominates the money-demand increase","never, because AD cannot shift"],"a":2,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Opposing LM forces determine the net AD movement."},
        {"id":9073,"q":"Why does expected deflation complicate the simple AD derivation?","options":["it eliminates M/P","it makes P irrelevant","it shifts LRAS right automatically","it may shift IS left through higher real rs"],"a":3,"tag":"aggregate_demand","type":"interpretation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"The basic real-balance channel may be offset by spending effects from expected deflation."},
        {"id":9074,"q":"Which answer treats AD as long-run supply?","options":["higher AD means the economy can produce more at every price forever","higher AD means more demanded output at each P","AD can shift from fiscal policy","AD can shift from monetary policy"],"a":0,"tag":"aggregate_demand","type":"trap","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"AD is demand, not permanent productive capacity.","commonError":"confusing demand with capacity"},
        {"id":9075,"q":"M rises from 4,000 to 4,800 while P rises from 10 to 12. What happens to M/P?","options":["it rises to 480","it stays at 400","it falls to 333.3","it rises to 800"],"a":1,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Old M/P=400; new M/P=4,800/12=400.","hint":"Compute real balances before interpreting AD."},
        {"id":9076,"q":"Which statement correctly separates movement and shift?","options":["P changes shift AD; policy moves along AD","all changes are movements along AD","P changes move along AD; non-price demand determinants shift AD","all changes are shifts of AD"],"a":2,"tag":"aggregate_demand","type":"integration","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"That distinction is the whole point of the AD derivation."},
        {"id":9077,"q":"Nominal r is 0.5% and expected inflation is −7%. What is the approximate real rate?","options":["−6.5%","0.5%","6.5%","7.5%"],"a":3,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Real r ≈ 0.5 − (−7)=7.5%.","hint":"Subtract expected inflation."},
        {"id":9078,"q":"M falls 30% and P falls 20%. If initial M/P is 500, what is new M/P?","options":["437.5","500","625","350"],"a":0,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"New M/P = 500×0.70/0.80 = 437.5.","hint":"Use growth factors for M and P."},
        {"id":9079,"q":"Deflation raises M/P but also raises real debt burdens. What is the net effect on Y?","options":["always positive","ambiguous without knowing which channel dominates","always negative","always zero"],"a":1,"tag":"great_depression","type":"integration","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Real balances can stimulate demand; debt-deflation can contract it."},
        {"id":9080,"q":"Which answer incorrectly treats Depression recovery as only a movement along AD?","options":["reflation expectations can shift IS right","monetary expansion can shift AD right","higher demand from reflation is just a lower-P movement","bank stabilization can raise spending"],"a":2,"tag":"great_depression","type":"trap","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Recovery mechanisms often shift curves; they are not merely price-level movements.","commonError":"mistaking recovery policy for movement along AD"},
        {"id":9081,"q":"On the AD-SRAS panel, which movement shows recovery from Y1 toward Y2 with a higher P?","options":["B to A","C to A","C to B","A to B"],"a":3,"tag":"great_depression","type":"graph","objective":"LO13.5","image":"is_lm_lras.png","primarySkill":"depression_crisis_mechanisms","feedback":"A to B moves output from Y1 to Y2 and price level from P3 to P2 on the displayed labels."},
        {"id":9082,"q":"Expected deflation raises real rates, investment falls, defaults increase, banks contract lending. What curve movement best summarizes demand?","options":["IS left, possibly reinforced by LM-left","IS shifts right only","LM shifts right only","LRAS shifts right"],"a":0,"tag":"great_depression","type":"multi-step","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"The spending and credit channels can reinforce each other."},
        {"id":9083,"q":"If deposit insurance reduces panic, which Depression channel is weakened?","options":["government-purchase multiplier","liquidity hoarding & bank-run pressure","technology growth in LRAS","tax collection from imports"],"a":1,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Stabilizing banks reduces the money-demand and credit-crunch forces."},
        {"id":9084,"q":"Why can monetary recovery work even before full price flexibility?","options":["it requires LRAS to shift first","it works only by raising taxes","it LM right & can improve expectations","it eliminates debt instantly"],"a":2,"tag":"great_depression","type":"interpretation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Short-run demand can recover through money and expectations channels."},
        {"id":9085,"q":"Which answer pollutes a Depression diagnostic tag?","options":["using real-rate calculation from deflation","using M/P under money contraction","using debt/P under deflation","using a generic G multiplier with no Depression mechanism"],"a":3,"tag":"great_depression","type":"trap","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"A Depression item should test a Depression mechanism, not a random macro calculation.","commonError":"cross-topic calculation leakage"},
        {"id":9086,"q":"Real debt burden rises from 12.5 to 20. What percent increase is that?","options":["60%","37.5%","50%","75%"],"a":0,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"The increase is 7.5/12.5 = 60%.","hint":"Change divided by original."},
        {"id":9087,"q":"Which answer best combines monetary and debt-deflation theories?","options":["higher G lowers debt burdens through LM","falling M tightens LM while falling P can raise real debt burdens","tax cuts directly raise M/P","LRAS shifts right when banks fail"],"a":1,"tag":"great_depression","type":"integration","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"The two mechanisms can jointly depress demand and finance."}
    ],
    "easyBoss": [
        {"id":2000,"q":"Which market equilibrium creates the IS curve?","options":["money-market equilibrium","labor-market equilibrium","goods-market equilibrium","foreign-exchange equilibrium"],"a":2,"tag":"is_curve","type":"definition","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"IS is the goods-market schedule."},
        {"id":2001,"q":"A rise in autonomous investment shifts IS how?","options":["left","nowhere","into LM","right"],"a":3,"tag":"is_curve","type":"application","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Higher planned investment raises Y at each r."},
        {"id":2002,"q":"MPC=0.75 and G rises by 20. Simple-cross ΔY?","options":["80","20","60","26.7"],"a":0,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Multiplier is 4."},
        {"id":2003,"q":"LM shows combinations where what clears?","options":["planned spending equals output","M equals Md","LRAS equals AD","taxes equal transfers"],"a":1,"tag":"lm_curve","type":"definition","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"LM is money-market equilibrium."},
        {"id":2004,"q":"Higher nominal M with fixed P shifts LM how?","options":["left","nowhere","right","into IS"],"a":2,"tag":"lm_curve","type":"application","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Real balances rise."},
        {"id":2005,"q":"M=1800 and P=9. What is M/P?","options":["20","180","16200","200"],"a":3,"tag":"lm_curve","type":"calculation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Divide M by P."},
        {"id":2006,"q":"What does the IS-LM intersection solve?","options":["Y and r","P and LRAS","G and T","C and S"],"a":0,"tag":"is_lm_equilibrium","type":"definition","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"The model solves income and interest rate."},
        {"id":2007,"q":"IS-right with fixed LM changes Y and r how?","options":["both fall","both rise","Y rises and r falls","Y falls and r rises"],"a":1,"tag":"is_lm_equilibrium","type":"application","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"IS-right moves up along LM."},
        {"id":2008,"q":"IS Y=1200−50r and LM Y=700+50r. What is r?","options":["4","6","5","10"],"a":2,"tag":"is_lm_equilibrium","type":"calculation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Set equations equal."},
        {"id":2009,"q":"What is exogenous in shock analysis?","options":["the solved interest rate","the new output level","the old intersection","the initial outside change"],"a":3,"tag":"shocks","type":"definition","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The shock is the cause."},
        {"id":2010,"q":"A rise in money demand shifts which curve?","options":["LM left","IS left","LM right","IS right"],"a":0,"tag":"shocks","type":"application","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"More money demand raises r at each Y."},
        {"id":2011,"q":"Why is a fall in Y alone not diagnostic?","options":["only IS affects Y","IS-left & LM-left can both lower Y","only LM affects Y","r never moves"],"a":1,"tag":"shocks","type":"trap","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Use r and the curve shift too."},
        {"id":2012,"q":"Fiscal policy directly changes which part of the model?","options":["real money supply only","money demand only","PE through G, T, or transfers","natural output only"],"a":2,"tag":"fiscal_policy","type":"definition","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Fiscal policy begins in the goods market."},
        {"id":2013,"q":"Higher G with fixed LM usually does what to r?","options":["lowers r","leaves r fixed","removes r","raises r"],"a":3,"tag":"fiscal_policy","type":"application","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Higher Y raises money demand."},
        {"id":2014,"q":"MPC=0.6 and G rises by 50. Simple-cross ΔY?","options":["125","50","80","30"],"a":0,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Multiplier is 2.5."},
        {"id":2015,"q":"Monetary policy first changes which schedule?","options":["IS","LM","LRAS","PPF"],"a":1,"tag":"monetary_policy","type":"definition","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Money supply changes real balances."},
        {"id":2016,"q":"Open-market sales are contractionary because they shift LM how?","options":["right","nowhere","left","into IS"],"a":2,"tag":"monetary_policy","type":"application","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Sales reduce money supply."},
        {"id":2017,"q":"L=300−30r and M/P=210. What is r?","options":["2","4","7","3"],"a":3,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"300−30r=210."},
        {"id":2018,"q":"AD is derived by changing what in IS-LM?","options":["the price level","government labels","natural output only","tax brackets only"],"a":0,"tag":"aggregate_demand","type":"definition","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Different P values imply different M/P and Y."},
        {"id":2019,"q":"Lower P with fixed M moves the economy how on AD?","options":["AD shifts left","down along AD toward higher Y","AD shifts right","LRAS shifts left"],"a":1,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Changing P moves along a fixed AD curve."},
        {"id":2020,"q":"M=2400 and P falls from 12 to 8. M/P changes how?","options":["300 to 200","200 to 240","200 to 300","stays 200"],"a":2,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Real balances rise."},
        {"id":2021,"q":"Debt-deflation focuses on what?","options":["higher G crowding out I","tax cuts raising LM","LRAS shifting right","falling P raising real debt burdens"],"a":3,"tag":"great_depression","type":"definition","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Deflation makes nominal debts heavier."},
        {"id":2022,"q":"Expected deflation affects investment mainly through what?","options":["higher real interest rates","lower real debt burdens","higher government purchases","lower money demand"],"a":0,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Expected deflation raises real borrowing costs."},
        {"id":2023,"q":"Nominal r=2% and expected inflation=−4%. Approximate real r?","options":["−2%","6%","2%","4%"],"a":1,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"2−(−4)=6."}
    ],
    "mediumBoss": [
        {"id":3000,"q":"Which mistake exaggerates a tax cut?","options":["using MPC in consumption","shifting IS right","using the G multiplier instead of the tax multiplier","allowing r to rise"],"a":2,"tag":"is_curve","type":"trap","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Tax changes first affect consumption by MPC×ΔT."},
        {"id":3001,"q":"On the IS graph, IS1 to IS3 at the same r means what?","options":["lower real balances","movement along IS1","higher P only","higher auto. spending"],"a":3,"tag":"is_curve","type":"graph","objective":"LO12.1","image":"is_curves.png","primarySkill":"is_curve_goods_market","feedback":"A new IS curve means a spending shift."},
        {"id":3002,"q":"C=200+0.8(Y−100), I=300, G=400. Equilibrium Y?","options":["4,100","3,600","4,500","900"],"a":0,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Y=200+0.8Y−80+300+400=820+0.8Y, so Y=4100."},
        {"id":3003,"q":"Which change is not an LM shifter?","options":["M rises","Y rises","P rises","money demand rises"],"a":1,"tag":"lm_curve","type":"trap","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Y is on the axis; it moves along LM."},
        {"id":3004,"q":"On the LM graph, LM2 to LM1 at same Y means what?","options":["easier money and lower r","higher G","tighter M/P & higher r","lower taxes"],"a":2,"tag":"lm_curve","type":"graph","objective":"LO12.2","image":"lm_curves.png","primarySkill":"lm_curve_money_market","feedback":"Leftward LM raises r at a given Y."},

// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    let q = {
        id: question.id,
        q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type,
        objective: question.objective,
        image: question.image,
        primarySkill: question.primarySkill,
        repairSkill: question.repairSkill,
        commonError: question.commonError
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

// ---------------------------------------------

// This ensures randomness WITHOUT repetition.

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Bag system for calculation generators
// Ensures all generators are used before repeating
let calcBag = [];

// Pulls one calculation generator from the bag
// Refills bag when empty (reshuffled)
function pickCalcGenerator(){
    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }
    return calcBag.pop();
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

function displayQuestion() {

    currentQuestion.options.forEach((option, index) => { 
        const btn = document.createElement("button");
        btn.innerText = option;
        btn.setAttribute("aria-label", `Answer option: ${option}`);

        }, { passive: true });

        optionsElement.appendChild(btn);
    });

function checkRapidGuessing(isCorrect, responseTime){
    rapidGuessHistory.push({
        correct: isCorrect ? 1 : 0,
        responseTime: responseTime
    });

    if(rapidGuessHistory.length > RAPID_GUESS_CONFIG.windowSize){
        rapidGuessHistory.shift();
    }

    if(rapidGuessHistory.length < RAPID_GUESS_CONFIG.minAttempts){
        return {
            triggered: false,
            avgTime: responseTime,
            accuracy: isCorrect ? 1 : 0
        };
    }

    const recent = rapidGuessHistory.slice(-RAPID_GUESS_CONFIG.windowSize);

    const avgTime = recent.reduce((sum, item) => sum + item.responseTime, 0) / recent.length;
    const accuracy = recent.reduce((sum, item) => sum + item.correct, 0) / recent.length;

    return {
        triggered: avgTime < RAPID_GUESS_CONFIG.avgTimeMs && accuracy < RAPID_GUESS_CONFIG.maxAccuracy,
        avgTime,
        accuracy
    };
}

// =============================================
// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|ARCHIVE42)
// - hashing logic
// - return format ("ARCH-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|NEXUS99`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "NEXUS-" + Math.abs(hash).toString(36).toUpperCase();
}

// =============================================
// POST-BATTLE MASTERY REPORT
// Student-facing diagnostic built from masteryState.
// Uses existing tag, objective, skill, type, accuracy, and response-time data.
// No answer keys. No question IDs. No nonsense.
// =============================================
let latestResultsScreenHTML = "";

const COMMAND_NEXUS_OBJECTIVE_LABELS = (typeof objectiveLabels !== "undefined") ? objectiveLabels : {};

function escapeHTML(value){
    return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function titleCase(value){
    return String(value || "")
        .replace(/_/g, " ")
        .replace(/-/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, letter => letter.toUpperCase());
}

function formatMasteryLabel(key){
    if(!key) return "Unlabeled Concept";

    const text = String(key);
    const exactLabel = COMMAND_NEXUS_OBJECTIVE_LABELS[text];

    if(exactLabel){
        return /^LO\d+\.\d+$/.test(text)
            ? `${text} — ${exactLabel}`
            : exactLabel;
    }

    const objectiveMatch = text.match(/^(LO\d+\.\d+)/);
    if(objectiveMatch && COMMAND_NEXUS_OBJECTIVE_LABELS[objectiveMatch[1]]){
        const suffix = text
            .replace(objectiveMatch[1], "")
            .replace(/^_+/, "")
            .replace(/_/g, " ")
            .trim();

        return suffix
            ? `${objectiveMatch[1]} — ${COMMAND_NEXUS_OBJECTIVE_LABELS[objectiveMatch[1]]}: ${titleCase(suffix)}`
            : `${objectiveMatch[1]} — ${COMMAND_NEXUS_OBJECTIVE_LABELS[objectiveMatch[1]]}`;
    }

    return titleCase(text);
}

function formatPercent(value){
    if(value === null || value === undefined || !Number.isFinite(Number(value))) return "—";
    return `${Math.round(Number(value) * 100)}%`;
}

function formatSeconds(ms){
    const numeric = Number(ms || 0);
    if(!Number.isFinite(numeric) || numeric <= 0) return "—";
    return `${Math.round(numeric / 1000)}s`;
}

function getBucketEntry(key, bucket, category = "concept"){
    if(!bucket || !bucket.attempts){
        return null;
    }

    const attempts = Number(bucket.attempts || 0);
    const correct = Number(bucket.correct || 0);
    const accuracy = attempts ? correct / attempts : null;
    const typeForTiming = category === "type" ? key : "default";
    const target = getTypeTargetMs(typeForTiming);
    const avgTime = Number(bucket.avgTime || 0);
    const timeRatio = avgTime && target ? avgTime / target : 1;
    const fluency = accuracy === null
        ? 0
        : accuracy - clamp((timeRatio - 1) * 0.25, 0, 0.35);

    return {
        key,
        label: formatMasteryLabel(key),
        category,
        attempts,
        correct,
        accuracy,
        avgTime,
        timeRatio,
        fluency
    };
}

function getEntriesFromBuckets(source, category = "concept"){
    return Object.entries(source || {})
        .map(([key, bucket]) => getBucketEntry(key, bucket, category))
        .filter(Boolean);
}

function getTypeMasteryEntries(){
    const typeBuckets = {};

    Object.values(masteryState.byTag || {}).forEach(tagBucket => {
        Object.entries(tagBucket.byType || {}).forEach(([type, bucket]) => {
            if(!typeBuckets[type]){
                typeBuckets[type] = { attempts: 0, correct: 0, avgTime: 0 };
            }

            const oldAttempts = typeBuckets[type].attempts;
            const newAttempts = oldAttempts + Number(bucket.attempts || 0);

            typeBuckets[type].correct += Number(bucket.correct || 0);
            typeBuckets[type].avgTime = newAttempts
                ? ((typeBuckets[type].avgTime * oldAttempts) + (Number(bucket.avgTime || 0) * Number(bucket.attempts || 0))) / newAttempts
                : 0;
            typeBuckets[type].attempts = newAttempts;
        });
    });

    return getEntriesFromBuckets(typeBuckets, "type");
}

function sortStrongest(entries){
    return [...entries]
        .filter(entry => entry.attempts >= 2)
        .sort((a,b) => (b.accuracy - a.accuracy) || (b.fluency - a.fluency) || (b.attempts - a.attempts));
}

function sortWeakest(entries){
    const enoughData = entries.filter(entry => entry.attempts >= 2);
    const pool = enoughData.length ? enoughData : entries;

    return [...pool]
        .sort((a,b) => (a.accuracy - b.accuracy) || (a.fluency - b.fluency) || (b.avgTime - a.avgTime));
}

function hasMeaningfulWeakness(entries, accuracyThreshold = 0.85){
    return (entries || []).some(entry => {
        if(!entry || entry.attempts < 2) return false;

        const accuracy = entry.accuracy === null || entry.accuracy === undefined
            ? 1
            : Number(entry.accuracy);

        return accuracy < accuracyThreshold || entry.timeRatio > 1.35;
    });
}

function renderMasteryRows(entries, emptyText){
    if(!entries || entries.length === 0){
        return `<p class="mastery-empty">${escapeHTML(emptyText)}</p>`;
    }

    return entries.map(entry => {
        const pct = Math.max(0, Math.min(100, Math.round((entry.accuracy || 0) * 100)));
        const pace = entry.timeRatio > 1.25
            ? "Slow response pattern"
            : entry.timeRatio < 0.65
                ? "Fast response pattern"
                : "Stable pace";

        return `
            <div class="mastery-row">
                <div class="mastery-row-main">
                    <span class="mastery-row-name">${escapeHTML(entry.label)}</span>
                    <span class="mastery-row-score">${formatPercent(entry.accuracy)} · ${entry.correct}/${entry.attempts}</span>
                </div>
                <span class="mastery-row-meta">Average response: ${formatSeconds(entry.avgTime)} · ${pace}</span>
                <div class="mastery-bar"><div class="mastery-bar-fill" style="width:${pct}%"></div></div>
            </div>
        `;
    }).join("");
}

function renderMasteryDiagnosticSection({
    weaknessTitle,
    signalTitle,
    entries,
    hasWeakness,
    weaknessEmptyText,
    cleanText
}){
    const title = hasWeakness ? weaknessTitle : signalTitle;
    const body = hasWeakness
        ? renderMasteryRows(entries, weaknessEmptyText)
        : `<p class="mastery-empty">${escapeHTML(cleanText)}</p>`;

    return `
        <div class="mastery-section">
            <h3>${escapeHTML(title)}</h3>
            ${body}
        </div>
    `;
}

function getRecentBehaviorSignals(){
    const recent = masteryState.recent || [];
    let fastMisses = 0;
    let slowCorrects = 0;
    let recentCorrect = 0;
    let recentTimeTotal = 0;

    recent.forEach(item => {
        const target = getTypeTargetMs(item.type || "default");
        const responseTime = Number(item.responseTime || 0);

        if(item.correct) recentCorrect++;
        if(responseTime) recentTimeTotal += responseTime;

        if(!item.correct && responseTime > 0 && responseTime < target * 0.55){
            fastMisses++;
        }

        if(item.correct && responseTime > target * 1.20){
            slowCorrects++;
        }
    });

    return {
        count: recent.length,
        accuracy: recent.length ? recentCorrect / recent.length : null,
        avgTime: recent.length ? recentTimeTotal / recent.length : 0,
        fastMisses,
        slowCorrects
    };
}


function getMasteryReportModeName(){
    if(gameMode === "timed-complete") return "Timed Trial";
    if(gameMode === "score") return "Score Attack";
    if(gameMode === "legendary") return "Legendary Mode";
    if(gameMode === "exam") return "Exam Drill";
    return getModeDisplayName();
}

function getMasteryReportData(){
    const totalTimeMs = startTime ? (Date.now() - startTime) : 0;
    const accuracy = totalAttempts > 0 ? correctAnswers / totalAttempts : 0;
    const tagEntries = getEntriesFromBuckets(masteryState.byTag || {}, "tag");
    const objectiveEntries = getEntriesFromBuckets(masteryState.byObjective || {}, "objective");
    const skillEntries = getEntriesFromBuckets(masteryState.bySkill || {}, "skill");
    const typeEntries = getTypeMasteryEntries();
    const behavior = getRecentBehaviorSignals();

    const strongest = sortStrongest([...objectiveEntries, ...tagEntries]).slice(0, 4);
    const weakestObjectives = sortWeakest(objectiveEntries).slice(0, 4);
    const weakestTypes = sortWeakest(typeEntries).slice(0, 3);
    const weakestSkills = sortWeakest(skillEntries).slice(0, 3);

    const hasObjectiveWeakness = hasMeaningfulWeakness(objectiveEntries, 0.85);
    const hasTypeWeakness = hasMeaningfulWeakness(typeEntries, 0.85);
    const hasSkillWeakness = hasMeaningfulWeakness(skillEntries, 0.85);
    const hasBehaviorWeakness = behavior.fastMisses >= 2 || behavior.slowCorrects >= 3;
    const noMajorWeakness = totalAttempts >= 8
        && accuracy >= 0.85
        && !hasObjectiveWeakness
        && !hasTypeWeakness
        && !hasSkillWeakness
        && !hasBehaviorWeakness;

    let verdict = "The Custodian found enough signal to build a report. Use it. Ignoring it would be malpractice with extra steps.";

    if(totalAttempts < 5){
        verdict = "The report is limited because this run has very few attempts. The Nexus needs more evidence before it can judge mastery with confidence.";
    } else if(noMajorWeakness){
        verdict = "No major weakness detected. That does not mean the Nexus is done with you. It means the next useful signal comes from harder pressure: Legendary Mode first, Score Attack after that.";
    } else if(accuracy >= 0.90){
        verdict = "Strong command. You cleared the Nexus with high accuracy. The weak signals below show where the next pressure test should focus.";
    } else if(accuracy >= 0.75){
        verdict = "Battle-ready, but not bulletproof. The weak areas below are where points will leak on an exam.";
    } else {
        verdict = "Unstable command. You finished, but the Nexus exposed weak signals. Hit the listed areas before chasing speed or Legendary Mode.";
    }

    const nextSteps = [];

    if(noMajorWeakness){
        nextSteps.push("Enter Legendary Mode next. The current run did not expose a major weak point, so harder multi-step and trap-heavy questions are the right next test.");
        nextSteps.push("Use Score Attack after Legendary Mode feels stable. Speed pressure is useful only after mastery survives harder questions.");
    } else {
        if(hasObjectiveWeakness && weakestObjectives[0]){
            nextSteps.push(`Review ${weakestObjectives[0].label}. That objective showed the weakest mastery signal.`);
        }

        if(hasTypeWeakness && weakestTypes[0]){
            nextSteps.push(`Practice ${weakestTypes[0].label} questions. That question form caused the most trouble.`);
        }

        if(hasSkillWeakness && weakestSkills[0]){
            nextSteps.push(`Drill ${weakestSkills[0].label}. That skill needs cleaner repetition.`);
        }

        if(behavior.fastMisses >= 2){
            nextSteps.push("Slow down on traps and graph-style items. Fast misses are not fluency. They are just wrong answers with confidence.");
        } else if(behavior.slowCorrects >= 3){
            nextSteps.push("You can get answers right, but some correct responses were slow. Build speed only after the reasoning is automatic.");
        }
    }

    if(nextSteps.length === 0){
        nextSteps.push("Run a harder mode next. The current evidence does not show a major weak point. Make the Nexus earn its paycheck.");
    }

    return {
        mode: getMasteryReportModeName(),
        accuracy,
        totalTimeMs,
        timeString: formatTime(totalTimeMs),
        totalAttempts,
        correctAnswers,
        maxStreak,
        score: modeUsesScoreAttack() ? scoreAttackScore : null,
        strongest,
        weakestObjectives,
        weakestTypes,
        weakestSkills,
        hasObjectiveWeakness,
        hasTypeWeakness,
        hasSkillWeakness,
        noMajorWeakness,
        behavior,
        verdict,
        nextSteps
    };
}

function copyMasteryReport(){
    const report = getMasteryReportData();

    const lines = [
        "The Command Nexus — Custodian's Mastery Report",
        `Student: ${username}`,
        `Mode: ${report.mode}`,
        `Accuracy: ${formatPercent(report.accuracy)} (${report.correctAnswers}/${report.totalAttempts})`,
        `Best Streak: ${report.maxStreak}`,
        `Time: ${report.timeString}`,
        report.score !== null ? `Score: ${report.score}` : null,
        "",
        "Strongest Signals:",
        ...(report.strongest.length ? report.strongest.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No clear strength signal yet."]),
        "",
        report.hasObjectiveWeakness ? "Weakest Learning Objectives:" : "Objective Signals:",
        ...(report.hasObjectiveWeakness && report.weakestObjectives.length ? report.weakestObjectives.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major objective weakness detected. Try Legendary Mode next."]),
        "",
        report.hasTypeWeakness ? "Weakest Question Forms:" : "Question Form Signals:",
        ...(report.hasTypeWeakness && report.weakestTypes.length ? report.weakestTypes.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major question-form weakness detected."]),
        "",
        report.hasSkillWeakness ? "Weakest Skills:" : "Skill Signals:",
        ...(report.hasSkillWeakness && report.weakestSkills.length ? report.weakestSkills.map(item => `- ${item.label}: ${formatPercent(item.accuracy)} (${item.correct}/${item.attempts})`) : ["- No major skill weakness detected."]),
        "",
        "Next Moves:",
        ...report.nextSteps.map(step => `- ${step}`)
    ].filter(line => line !== null);

    const text = lines.join("\n");

    function markCopied(){
        const btn = Array.from(document.querySelectorAll("button"))
            .find(button => button.innerText === "Copy Report" || button.innerText === "Copied!");

        if(!btn) return;
        const original = btn.innerText;
        btn.innerText = "Copied!";
        setTimeout(() => { btn.innerText = original; }, 1800);
    }

    if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(markCopied);
        return;
    }

    const temp = document.createElement("textarea");
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand("copy");
    temp.remove();
    markCopied();
}




// =============================
// UTILITIES
// =============================
     
// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================     
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}     

// =============================================
// HIGH SCORE TRACKING — OPTIONAL FEATURE
// =============================================
// Stores top completion times in browser (localStorage)
//
// - Saves name, time, and date
// - Sorts fastest → slowest
// - Keeps top 5 results only
//
// SAFE TO EDIT:
// - number of scores kept (slice)
// - displayed fields (name/date)
//
// WARNING:
// Clearing browser data will erase scores.
// =============================================
function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

// =============================================
// TIME FORMATTER — SAFE UTILITY
// =============================================
// Converts milliseconds → readable format (Xm Ys)
//
// Used for:
// - victory screen
// - performance tracking
//
// Safe to modify format if desired.
// =============================================     
function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}

// =============================================
// RESULT SHARING — SAFE TO CUSTOMIZE
// =============================================
// Copies player performance summary to clipboard.
//
// Includes:
// - name
// - time
// - accuracy
// - streak
// - verification code
//
// SAFE TO EDIT:
// - text format
// - labels ("Adventurer", etc.)
// - button feedback message
//
// WARNING:
// Requires element IDs:
// - "vCode"
// - "shareBtn"
//
// Removing those will break this function.
// =============================================     
function copyResults() {
    const totalTimeMs = Date.now() - startTime;
    const timeString = formatTime(totalTimeMs);
    const code = document.getElementById("vCode").innerText;
    const accuracy = Math.round((correctAnswers / totalAttempts) * 100);

    const shareText = `Adventurer: ${username}
        Time: ${timeString}
        Accuracy: ${accuracy}%
        Best Streak: ${maxStreak}
        Total Questions: ${totalAttempts}
        Code: ${code}
        Verified by The Anaylst`;

    navigator.clipboard.writeText(shareText).then(() => {
        const btn = document.getElementById("shareBtn");
        const originalText = btn.innerText;
        const originalColor = btn.style.background;

        btn.innerText = "✅ Copied!";
        btn.style.background = "#059669";

        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = originalColor;
        }, 2000);
    });
}
