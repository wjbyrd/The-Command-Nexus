/* =========================================
   1. VISUAL DESIGN — THE COMMAND NEXUS
========================================= */
body {

    background: url('question_background_image.png');

    background-position: center;
}

/* =========================================
   2. CORE GAME CONTAINER (#gameBox) — SAFE TO STYLE
========================================= */

#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    margin: 0;
    padding: 18px 20px;
    text-align: center;

/* =========================================
   4. BUTTONS & INTERACTION — SAFE TO CUSTOMIZE
========================================= */

/* Base button styling — applies to all buttons */
button {
    padding: 12px 22px;
    margin: 6px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(180deg, #12345a, #07111f);
    color: #e6ecf5;
    border: 1px solid rgba(240,200,106,0.38);
    border-radius: 8px;
    box-shadow:
       0 0 12px rgba(80,140,220,0.28),
       0 0 24px rgba(10,45,95,0.22),
       inset 0 0 10px rgba(0,0,0,0.68);
    transition: all 0.15s ease;
}

/* Hover feedback — improves interactivity */
button:hover {
    background: linear-gradient(180deg, #1b4f86, #0b1f38);
    border-color: rgba(240,200,106,0.72);
    box-shadow:
        0 0 18px rgba(100,170,255,0.5),
        0 0 34px rgba(240,200,106,0.22),
        inset 0 0 12px rgba(0,0,0,0.7);
    transform: translateY(-2px) scale(1.02);
}

/* Click feedback — simulates button press */	
button:active {
    transform: scale(0.96);
}

/* Answer container — controls layout of choices */	
.answers {

/* =========================================
   5. PROGRESS & MAZE TRACK — SAFE TO CUSTOMIZE (WITH RULES)
========================================= */

/* Progress bar container — background track */	
#progressBar {
    width: 100%;
    height: 22px;
    background: linear-gradient(180deg,
        rgba(6,14,28,0.96),
        rgba(2,5,12,0.98));
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    border: 1px solid rgba(120,180,255,0.24);
    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.84),
        0 0 10px rgba(80,140,220,0.18);
}

/* Progress fill — width controlled by JS */		
#progressFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,
        #123a66,
        #4f9fe8,
        #f0c86a);
    box-shadow:
        0 0 12px rgba(100,170,255,0.46),
        0 0 22px rgba(240,200,106,0.26);
    transition: width 0.4s ease;
}

/* Maze grid layout — 10 columns = 30 total rooms */		
#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 36px);
    justify-content: center;
    gap: 10px;
    margin: 25px auto;
}

/* Individual room cell — default state */		
.maze-box {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 6px;
    background: linear-gradient(180deg,
        rgba(10,24,46,0.76),
        rgba(3,8,18,0.9));
    border: 1px solid rgba(120,180,255,0.18);
    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.76),
        0 0 5px rgba(80,140,220,0.1);
    transition: all 0.3s ease;
}

/* Current room highlight — animated pulse */		
.maze-box.active {
    background: radial-gradient(circle,
        rgba(100,170,255,0.48),
        rgba(18,58,102,0.42),
        rgba(3,8,18,0.94));
    border: 2px solid #f0c86a;
    box-shadow:
        0 0 12px rgba(100,170,255,0.78),
        0 0 24px rgba(240,200,106,0.36),
        inset 0 0 12px rgba(0,0,0,0.66);
    z-index: 10;
    animation: activePulse 1s infinite alternate;
}

/* Completed tile */		
.maze-box.completed {
    background: linear-gradient(180deg,
        rgba(24,82,135,0.62),
        rgba(8,24,44,0.9));
    border-color: rgba(240,200,106,0.36);
    box-shadow:
        0 0 8px rgba(80,140,220,0.32),
        inset 0 0 10px rgba(0,0,0,0.72);
}

/* Boss room highlights: 10 Demand, 20 Rate, 30 Shock */
.maze-box:nth-child(10) {
    text-shadow:
        0 0 8px #f0c86a,
        0 0 18px rgba(80,140,220,0.78);
}

.maze-box:nth-child(20) {
    text-shadow:
        0 0 8px #6eb4ff,
        0 0 18px rgba(240,200,106,0.58);
}

.maze-box:nth-child(30) {
    text-shadow:
        0 0 10px #f0c86a,
        0 0 24px rgba(127,29,29,0.9),
        0 0 34px rgba(80,140,220,0.35);
}

/* Streak styling — Command Nexus */
.streak {
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    letter-spacing:0.5px;
    color: rgba(230,236,245,0.95);
    text-shadow:
        0 0 7px rgba(100,170,255,0.34),
        0 2px 5px rgba(0,0,0,0.85);
}

.streak-icon {
    width:22px;
    height:22px;
    object-fit:contain;
    border-radius:50%;
    filter:
        drop-shadow(0 0 8px rgba(100,170,255,0.76))
        drop-shadow(0 0 15px rgba(240,200,106,0.42));
    background: radial-gradient(circle,
        rgba(100,170,255,0.48) 0%,
        rgba(240,200,106,0.28) 42%,
        transparent 72%);
    animation: pulseControl 2.2s ease-in-out infinite;
}

        rgba(2,5,12,0.98));
    border: 1px solid rgba(120,180,255,0.28);

/* Layout container for artifact slots */	
.vaultRow {

    justify-content: center;

========================================= */

/* Hit animation — triggered when boss takes damage */		
.boss-shake {

}

/* Boss image display — includes floating animation */		
.bossIcon {

/* =========================================
   9. ANIMATION SYSTEM — SAFE TO CUSTOMIZE (WITH CARE)
========================================= */

/* Ambient civic-light flicker */	
@keyframes torchFlicker {
  0%, 100% {
    filter: brightness(1);
  }
  25% {
    filter: brightness(1.05) saturate(1.05);
  }
  50% {
    filter: brightness(0.96) saturate(0.98);
  }
  75% {
    filter: brightness(1.04) saturate(1.04);
  }
}

/* Damage feedback */	
@keyframes hitshake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* Boss-specific hit feedback (stronger shake) */    	
@keyframes bossShake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}

/* Current room highlight animation (maze tracker) */   	
@keyframes activePulse {
  0% {
    transform: scale(1.06);
    box-shadow:
      0 0 8px rgba(100,170,255,0.68),
      inset 0 0 10px rgba(0,0,0,0.62);
  }
  45% {
    transform: scale(1.13);
    box-shadow:
      0 0 18px rgba(100,170,255,0.92),
      0 0 32px rgba(240,200,106,0.42),
      0 0 42px rgba(24,82,135,0.3),
      inset 0 0 12px rgba(0,0,0,0.66);
  }
  70% {
    transform: scale(1.09);
    box-shadow:
      0 0 12px rgba(100,170,255,0.78),
      0 0 24px rgba(240,200,106,0.22),
      inset 0 0 11px rgba(0,0,0,0.66);
  }
  100% {
    transform: scale(1.11);
    box-shadow:
      0 0 15px rgba(100,170,255,0.72),
      0 0 30px rgba(240,200,106,0.32),
      inset 0 0 12px rgba(0,0,0,0.68);
  }
}



	
/* Victory text animation (end screen emphasis) */   
@keyframes victoryGlow {
  0%, 100% {
    transform: scale(1);
    text-shadow:
      0 0 10px rgba(240,200,106,0.72),
      0 0 18px rgba(100,170,255,0.24),
      0 2px 6px rgba(0,0,0,0.9);
  }
  50% {
    transform: scale(1.08);
    text-shadow:
      0 0 24px rgba(240,200,106,0.95),
      0 0 42px rgba(100,170,255,0.58),
      0 0 52px rgba(24,82,135,0.38),
      0 3px 8px rgba(0,0,0,0.9);
  }
}

/* Idle boss movement */	
@keyframes bossFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* Temporary feedback text fade-out */   
@keyframes fadeOut {
  0%, 70% { opacity: 1; }
  100% { opacity: 0; }
}

/* Wizard idle animation (subtle movement) */  
@keyframes wizardFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}


@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* General pulse animation for relics */   	
@keyframes relicPulse {
  0%,100% {
    transform: scale(1.05);
    filter:
      drop-shadow(0 0 8px rgba(100,170,255,0.68))
      drop-shadow(0 0 18px rgba(240,200,106,0.32))
      drop-shadow(0 0 24px rgba(0,0,0,0.58));
  }
  50% {
    transform: scale(1.1);
    filter:
      drop-shadow(0 0 16px rgba(100,170,255,0.94))
      drop-shadow(0 0 30px rgba(240,200,106,0.48))
      drop-shadow(0 0 38px rgba(24,82,135,0.26));
  }
}

/* Streak icon pulse */
@keyframes pulseControl {
  0%,100% {
    transform: scale(1);
    opacity: 0.9;
  }
  50% {
    transform: scale(1.08);
    opacity: 1;
  }
}

/* =========================================
   12. MOBILE RESPONSIVE SYSTEM — SAFE TO EDIT (WITH LIMITS)
=========================================

This section controls how the game behaves on phones.

GOAL:
- Fit gameplay into a single screen as much as possible
- Reduce vertical scrolling
- Keep buttons thumb-friendly

-----------------------------------------
SAFE TO EDIT:
- font sizes (clamp values)
- spacing (gap, padding, margin)
- grid layout (answers: 1fr 1fr vs 1fr)
- wizard size (make smaller/larger)

-----------------------------------------
USE CAUTION:
- removing elements entirely (may break flow)
- changing flex direction randomly
- making buttons too small (hurts usability)

-----------------------------------------
DO NOT MODIFY:
- IDs (#gameShell, #gameBox, #wizardBox)
- core layout structure

-----------------------------------------
COMMON CUSTOM CHANGES:
- Want bigger buttons? Increase min-height
- Want less scrolling? Reduce padding/gaps
- Want simpler UI? Hide artifact labels

-----------------------------------------
TIP:
Mobile design is about SPACE, not style.
Every pixel matters.

========================================= */

function getScoreAttackSpeedBonus(responseTime){
    const bonus = SCORE_ATTACK_CONFIG.speedBonuses.find(item => responseTime <= item.maxMs);
    return bonus ? bonus.points : 0;
}

function getScoreAttackStreakBonus(currentStreak){
    const bonus = SCORE_ATTACK_CONFIG.streakBonuses.find(item => currentStreak >= item.minStreak);
    return bonus ? bonus.points : 0;
}

function applyScoreAttackEvent(label, amount){
    if(!modeUsesScoreAttack()) return;

    const numericAmount = Number(amount || 0);
    if(!Number.isFinite(numericAmount) || numericAmount === 0) return;

    scoreAttackScore += numericAmount;

    // No negative scoreboard. Punishment hurts, but it does not turn into comedy.
    if(scoreAttackScore < 0){
        scoreAttackScore = 0;
    }

    scoreAttackEvents.push({
        label,
        amount: numericAmount,
        scoreAfter: scoreAttackScore,
        room,
        questionId: currentQuestion?.id || 0,
        time: Date.now()
    });

    if(scoreAttackEvents.length > 120){
        scoreAttackEvents.shift();
    }

    if(scoreAttackScore > scoreAttackBestScore){
        scoreAttackBestScore = scoreAttackScore;
        localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`, String(scoreAttackBestScore));
    }

    updateScoreAttackHud();
    showScoreAttackFloat(label, numericAmount);
}

function applyScoreAttackForAnswer(isCorrect, responseTime){
    if(!modeUsesScoreAttack()) return;

    if(isCorrect){
        applyScoreAttackEvent("Correct", SCORE_ATTACK_CONFIG.correct);

        const speedBonus = getScoreAttackSpeedBonus(responseTime);
        if(speedBonus > 0){
            applyScoreAttackEvent("Speed", speedBonus);
        }

        const streakBonus = getScoreAttackStreakBonus(streak);
        if(streakBonus > 0){
            applyScoreAttackEvent("Streak", streakBonus);
        }

        return;
    }

    const penalty = responseTime < 4000
        ? SCORE_ATTACK_CONFIG.rapidMissPenalty
        : SCORE_ATTACK_CONFIG.wrongPenalty;

    applyScoreAttackEvent(responseTime < 4000 ? "Rapid Miss" : "Wrong", penalty);
}

function applyScoreAttackRapidGuessPenalty(){
    if(!modeUsesScoreAttack()) return;

    applyScoreAttackEvent("Rapid Guess", SCORE_ATTACK_CONFIG.rapidMissPenalty);
}

// SCORE ATTACK MODE ADDITION:
// This creates the tiny arcade-style "score resolve" beat.
// It lets +100 / Speed / Streak / Wrong penalties breathe before feedback appears.
function getScoreAttackResolveDelay(isCorrect){
    if(!modeUsesScoreAttack()) return 0;

    return isCorrect
        ? SCORE_ATTACK_CONFIG.resolveDelayCorrectMs
        : SCORE_ATTACK_CONFIG.resolveDelayWrongMs;
}

function waitForScoreAttackResolve(isCorrect){
    const delay = getScoreAttackResolveDelay(isCorrect);

    if(!delay || delay <= 0){
        return Promise.resolve();
    }

    return new Promise(resolve => setTimeout(resolve, delay));
}

    const typeClass = amount > 0 ? "positive" : amount < 0 ? "negative" : "neutral";

    activeScoreFloatCount++;
    const stackOffset = Math.min(activeScoreFloatCount - 1, 4) * 30;

    item.className = `score-float ${typeClass}`;
    item.style.setProperty("--score-float-top", `calc(38% + ${stackOffset}px)`);

function generatePseudonymFromEmail(email) {
    const prefixes = [
        "Nominal", "Real", "Indexed", "Fiscal", "Monetary", "Aggregate",
        "Capital", "Labor", "Inflation", "Output", "Reserve", "Cyclical",
        "Structural", "Productive", "National", "Treasury", "Deflator", "Ledger"
    ];

    const roles = [
        "Registrar", "Comptroller", "Forecaster", "Auditor", "Indexer", "Calibrator",
        "Engineer", "Archivist", "Surveyor", "Inspector", "Operator", "Analyst",
        "Custodian", "Mechanist", "Steward", "Technician", "Keeper", "Marshal"
    ];

    let hash = 0;
    const cleanEmail = email.trim().toLowerCase();

    for (let i = 0; i < cleanEmail.length; i++) {
        hash = ((hash << 5) - hash) + cleanEmail.charCodeAt(i);
        hash |= 0;
    }

    const positiveHash = Math.abs(hash);

    const prefix = prefixes[positiveHash % prefixes.length];
    const role = roles[Math.floor(positiveHash / prefixes.length) % roles.length];
    const number = 1000 + (positiveHash % 9000);

    return `${prefix}${role}${number}`;
}

function getObjectiveBucket(question){
    const objectiveKey = inferObjective(question);
    if(!masteryState.byObjective[objectiveKey]){
        masteryState.byObjective[objectiveKey] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };
    }
    return masteryState.byObjective[objectiveKey];
}

function getObjectiveAccuracy(question){
    return getAccuracy(getObjectiveBucket(question));
}

function getObjectiveFluency(question){
    return getFluency(getObjectiveBucket(question), question?.type || "default");
}

function updateBucket(bucket, isCorrect, responseTime){
    if(!bucket) return;
    bucket.attempts++;
    if(isCorrect) bucket.correct++;
    bucket.avgTime = bucket.avgTime === 0
        ? responseTime
        : Math.round((bucket.avgTime * 0.7) + (responseTime * 0.3));
}

function getAccuracy(bucket){
    if(!bucket || !bucket.attempts) return null;
    return bucket.correct / bucket.attempts;
}

function getTimeRatio(bucket, type){
    if(!bucket || !bucket.attempts || !bucket.avgTime) return 1;
    return bucket.avgTime / getTypeTargetMs(type);
}

function getFluency(bucket, type){
    const acc = getAccuracy(bucket);
    if(acc === null) return 0;
    const timeRatio = getTimeRatio(bucket, type);
    return acc - clamp((timeRatio - 1) * 0.25, 0, 0.35);
}

function getTagAccuracy(tag){
    return getAccuracy(getTagBucket(tag));
}

function getTagTypeAccuracy(tag, type){
    return getAccuracy(getTypeBucket(tag, type));
}

function getTagFluency(tag){
    return getFluency(getTagBucket(tag), "default");
}

function getTagTypeFluency(tag, type){
    return getFluency(getTypeBucket(tag, type), type || "default");
}

function recordAdaptiveAttempt(question, isCorrect, responseTime){
    if(!question || !question.tag) return;

    const tagBucket = getTagBucket(question.tag);
    const typeBucket = getTypeBucket(question.tag, question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const skillBucket = getSkillBucket(question);

    updateBucket(tagBucket, isCorrect, responseTime);
    updateBucket(typeBucket, isCorrect, responseTime);
    updateBucket(objectiveBucket, isCorrect, responseTime);
    updateBucket(skillBucket, isCorrect, responseTime);

    masteryState.recent.push({
        correct: !!isCorrect,
        responseTime,
        tag: question.tag,
        type: question.type || "default",
        objective: currentQuestion.objective || inferObjective(currentQuestion),
        skill: getSkillKey(question)
    });

    if(masteryState.recent.length > 20){
        masteryState.recent.shift();
    }
}

function getRecentPerformance(windowSize = 8){
    const recent = masteryState.recent.slice(-windowSize);
    if(recent.length === 0){
        return { accuracy: 0, avgCorrectRatio: 1.2, count: 0 };
    }

    const correct = recent.filter(x => x.correct);
    const avgCorrectRatio = correct.length
        ? correct.reduce((sum, item) => sum + (item.responseTime / getTypeTargetMs(item.type)), 0) / correct.length
        : 2;

    return {
        accuracy: recent.filter(x => x.correct).length / recent.length,
        avgCorrectRatio,
        count: recent.length
    };
}

function getWeakestTag(){
    const entries = Object.keys(masteryState.byTag);

    if(entries.length === 0){
        const fallback = Object.entries(conceptMemory || {}).sort((a,b) => b[1]-a[1])[0];
        return fallback ? fallback[0] : null;
    }

    let weakestTag = null;
    let weakestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const weakness = (conceptMemory[tag] || 0) + (1 - (fluency ?? 0));

        if(weakness > weakestScore){
            weakestScore = weakness;
            weakestTag = tag;
        }
    });

    return weakestTag;
}

function getStrongestTag(){
    const entries = Object.keys(masteryState.byTag);
    if(entries.length === 0) return null;

    let strongestTag = null;
    let strongestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const strength = (fluency === null ? 0 : fluency) - ((conceptMemory[tag] || 0) * 0.15);
        if(strength > strongestScore){
            strongestScore = strength;
            strongestTag = tag;
        }
    });

    return strongestTag;
}

function getSelectionProfile(){
    const recent = getRecentPerformance(8);
    const strongestTag = getStrongestTag();
    const strongestFluency = strongestTag ? getTagFluency(strongestTag) : 0;

    return {
        recentAccuracy: recent.accuracy,
        avgCorrectRatio: recent.avgCorrectRatio,
        strongestTag,
        strongestFluency,
        mediumReady: streak >= 5 && recent.count >= 5 && recent.accuracy >= 0.8,
        hardReady: streak >= 8 && recent.count >= 6 && recent.accuracy >= 0.88 && recent.avgCorrectRatio <= 1.2 && strongestFluency >= 0.72,
        eliteReady: streak >= 14 && recent.count >= 8 && recent.accuracy >= 0.92 && recent.avgCorrectRatio <= 1.05 && strongestFluency >= 0.82
    };
}

function determineSelectionPurpose(profile){
    if(profile.recentAccuracy === 0 && getRecentPerformance(8).count === 0) return "support";
    if(profile.eliteReady) return "stretch";
    if(profile.recentAccuracy < 0.65) return "repair";
    if(profile.recentAccuracy < 0.8) return "confirm";
    if(profile.hardReady) return "challenge";
    return "diversify";
}

function shouldTriggerDetour(question){
    if(!question || !question.tag) return false;
    const tagWeakness = conceptMemory[question.tag] || 0;
    const typeBucket = getTypeBucket(question.tag, question.type);
    const typeAccuracy = getAccuracy(typeBucket);
    const objectiveAccuracy = getObjectiveAccuracy(question);

    return tagWeakness >= 2.2
        || (typeBucket && typeBucket.attempts >= 2 && typeAccuracy !== null && typeAccuracy < 0.6)
        || (objectiveAccuracy !== null && objectiveAccuracy < 0.5 && getObjectiveBucket(question).attempts >= 2);
}

function resetRemediationState(){
    remediationState = {
        active: false,
        stage: null,
        tag: null,
        objective: null,
        skill: null,
        commonError: null,
        sourceType: null,
        returnRoom: null,

        careless: false
    };
    detourActive = false;
    detourReturnRoom = null;
}

function planRemediation(question, responseTime){
    if(!question || !question.tag) return null;

    const expected = getTypeTargetMs(question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const objectiveAccuracy = getAccuracy(objectiveBucket);
    const objectiveAttempts = objectiveBucket?.attempts || 0;
    const carelessMiss = responseTime < expected * 0.55 && (objectiveAccuracy === null || objectiveAccuracy >= 0.45);
    const repeatedObjectiveMiss = objectiveAttempts >= 2 && objectiveAccuracy !== null && objectiveAccuracy < 0.6;
    const slowStruggle = responseTime > expected * 1.2;
    const skill = getSkillKey(question);

    return {
        active: true,
        stage: carelessMiss ? "bridge" : "repair",
        tag: question.tag,
        objective: currentQuestion.objective || inferObjective(currentQuestion),
        skill: skill,
        commonError: question.commonError || null,
        sourceType: question.type || "default",
        returnRoom: room,
        originQuestionId: question.id || null,
        careless: carelessMiss,
        repeatedObjectiveMiss,
        slowStruggle
    };
}

function getRemediationStageLabel(stage){
    if(stage === "repair") return "Concept Repair";
    if(stage === "bridge") return "Bridge Repair";
    return "Recovery Retest";
}

function getQuestionsMatchingNeed(pool, objectiveKey, tag, excludeIds = [], skillKey = null){
    if(!Array.isArray(pool) || pool.length === 0) return [];

    let candidates = pool.filter(q => !excludeIds.includes(q.id));

    if(skillKey){
        let skillMatches = candidates.filter(q =>
            q.primarySkill === skillKey || q.repairSkill === skillKey || inferSkill(q) === skillKey
        );
        if(skillMatches.length > 0) return skillMatches;
    }

    let objectiveMatches = candidates.filter(q => inferObjective(q) === objectiveKey);
    if(objectiveMatches.length > 0) return objectiveMatches;

    let tagMatches = candidates.filter(q => q.tag === tag);
    if(tagMatches.length > 0) return tagMatches;

    return candidates;
}

function getRetestPoolName(){
    if(room <= 9) return "easy";
    if(room <= 19) return "medium";
    if(room <= 25) return "hard";
    if(room <= 29) return "hard";
    return "elite";
}

function pickRemediationFromBank(poolName, objectiveKey, tag, purpose = "confirm", skillKey = null){
    const pool = questionBanks[poolName] || [];
    const recentIds = (questionHistory[poolName] || []).slice(-10);
    let candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, recentIds, skillKey);

    if(candidates.length === 0){
        candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, [], skillKey);
    }

    if(candidates.length === 0) return null;

    const picked = weightedPick(candidates, {
        mode: purpose === "challenge" ? "challenge" : "support",
        preferredTypes: purpose === "challenge" ? ELITE_PREFERRED_TYPES : [],
        purpose
    });

    if(!questionHistory[poolName]) questionHistory[poolName] = [];
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15) questionHistory[poolName].shift();

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10) tagHistory.shift();
    }

    return picked;
}

function getRemediationQuestion(state){
    if(!state || !state.active) return null;

    const excludeIds = [state.originQuestionId].filter(Boolean);

    if(state.stage === "repair"){
        if(state.skill && microSkillRepairPools[state.skill]){
            const skillRepairPool = microSkillRepairPools[state.skill] || [];
            const skillRepairCandidates = getQuestionsMatchingNeed(
                skillRepairPool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillRepairCandidates.length > 0){
                return weightedPick(skillRepairCandidates, {
                    mode: "support",
                    purpose: "repair"
                });
            }
        }

        const repairPool = microSkillRepairPools[state.skill] || [];
        const repairCandidates = getQuestionsMatchingNeed(
            repairPool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(repairCandidates.length > 0){
            return weightedPick(repairCandidates, {
                mode: "support",
                purpose: "repair"
            });
        }
    }

    if(state.stage === "bridge"){
        if(state.skill && microSkillBridgePools[state.skill]){
            const skillBridgePool = microSkillBridgePools[state.skill] || [];
            const skillBridgeCandidates = getQuestionsMatchingNeed(
                skillBridgePool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillBridgeCandidates.length > 0){
                return weightedPick(skillBridgeCandidates, {
                    mode: "support",
                    purpose: "confirm"
                });
            }
        }

        const bridgePool = microSkillBridgePools[state.skill] || [];
        const allBridgePool = Object.values(microSkillBridgePools || {})
            .reduce((all, pool) => all.concat(pool), []);

        const bridgeCandidates = getQuestionsMatchingNeed(
            allBridgePool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(bridgeCandidates.length > 0){
            return weightedPick(bridgeCandidates, {
                mode: "support",
                purpose: "confirm"
            });
        }
    }

    const retestPoolName = getRetestPoolName();

    return pickRemediationFromBank(
        retestPoolName,
        state.objective,
        state.tag,
        state.stage === "retest" ? "challenge" : "confirm",
        state.skill
    );
}
function weightedPick(pool, options = {}){
    const {
        mode = "support",
        preferredTypes = [],
        purpose = "diversify"
    } = options;

    let totalWeight = 0;

    let weights = pool.map(q => {
        let w = 1;
        const tagAccuracy = q.tag ? getTagAccuracy(q.tag) : null;
        const typeAccuracy = (q.tag && q.type) ? getTagTypeAccuracy(q.tag, q.type) : null;
        const objectiveAccuracy = getObjectiveAccuracy(q);
        const tagFluency = q.tag ? getTagFluency(q.tag) : 0;
        const typeFluency = (q.tag && q.type) ? getTagTypeFluency(q.tag, q.type) : 0;
        const objectiveFluency = getObjectiveFluency(q);
        const conceptWeakness = q.tag ? (conceptMemory[q.tag] || 0) : 0;

        let recentCount = tagHistory.filter(t => t === q.tag).length;

        if(mode === "challenge"){
            w += clamp(tagFluency || 0, 0, 1.2) * 0.9;
            w += clamp(typeFluency || 0, 0, 1.0) * 0.6;
            w += clamp(objectiveFluency || 0, 0, 1.0) * 0.5;
            w += getTypePressure(q.type || "default");
            if(preferredTypes.includes(q.type)) w += 1.1;
            if(purpose === "stretch") w += 0.8;
        } else {
            const tagNeed = tagAccuracy === null ? 0.45 : (1 - tagAccuracy);
            const typeNeed = typeAccuracy === null ? 0.35 : (1 - typeAccuracy);
            const objectiveNeed = objectiveAccuracy === null ? 0.35 : (1 - objectiveAccuracy);
            const slowPenalty = clamp((getTimeRatio(getTypeBucket(q.tag, q.type), q.type) - 1), 0, 1.2);

            w += Math.min(conceptWeakness, 2.2);
            w += tagNeed * 0.7;
            w += typeNeed * 0.55;
            w += objectiveNeed * 0.85;
            w += slowPenalty * 0.35;

            if(purpose === "repair" && objectiveNeed > 0.35) w += 0.9;
            if(purpose === "confirm" && typeNeed > 0.25) w += 0.5;
        }

        // Coverage boost
        if(recentCount === 0){
            w += purpose === "diversify" ? 0.7 : 0.4;
        }

        w = Math.min(w, mode === "challenge" ? 5.5 : 4.5);
        totalWeight += w;
        return { q, w };
    });

    let r = Math.random() * totalWeight;

    for(let item of weights){
        r -= item.w;
        if(r <= 0){
            return item.q;
        }
    }

    return weights[weights.length - 1].q;
}

function getAdaptiveQuestion(poolName, targetTag = null, options = {}){
    let pool = questionBanks[poolName] || questionBanks.hard || questionBanks.medium || questionBanks.easy || [];
    const { mode = "support", preferredTypes = [], purpose = "diversify" } = options;

    if(!pool || pool.length === 0){
        return {
            id: 999999,
            q: "No question pool is available for this room. Check the questionBanks configuration.",
            options: ["Continue", "Continue", "Continue", "Continue"],
            a: 0,
            tag: "system",
            type: "default",
            objective: "system_check",
            feedback: "A question pool is missing."
        };
    }

    // --- 🎯 TARGET SPECIFIC TAG IF PROVIDED ---
    if(targetTag){
        let filtered = pool.filter(q => q.tag === targetTag);

        if(filtered.length >= Math.max(4, pool.length * 0.2)){
            pool = filtered;
        }
    }

    let recent = questionHistory[poolName].slice(-10);

    let available = pool.filter(q => !recent.includes(q.id));

    if(available.length < 3){
        available = pool.filter(q => !questionHistory[poolName].slice(-5).includes(q.id));
    }

    if(available.length === 0){
        available = pool.filter(q => !questionHistory[poolName].slice(-3).includes(q.id));
    }

    if(available.length === 0){
        available = pool;
    }

    let lastTags = tagHistory.slice(-2);

    let tagFiltered = available.filter(q => {
        return !(lastTags.length === 2 && lastTags.every(t => t === q.tag));
    });

    if(tagFiltered.length >= 3){
        available = tagFiltered;
    }

    console.log("AVAILABLE:", available.map(q => q.id));

    let picked = weightedPick(available, { mode, preferredTypes, purpose });

    console.log("PICKED:", picked.id);
    console.log("RECENT:", questionHistory[poolName]);

    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15){
        questionHistory[poolName].shift();
    }

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }

    return picked;
}

function getCommandNexusBossLine({ isCorrect, tag, type, objective, streak, bossHealth, responseTime }){
  const bossName = getCommandNexusBossName();

  if(isCorrect && streak >= 5){
    return `${bossName}: The model holds. Now prove the command was not luck.`;
  }

  if(isCorrect && bossHealth <= 2){
    return `${bossName}: Clean signal. The command layer is cracking.`;
  }

  if(!isCorrect && responseTime < 5000){
    return `${bossName}: Fast command. Bad command. The Nexus does not reward button mashing.`;
  }

  if(!isCorrect && (tag === "is" || tag === "lm" || tag === "is_lm" || tag === "fiscal" || tag === "monetary" || tag === "aggregate_demand" || tag === "depression")){
    return `${bossName}: Wrong curve, wrong system. Recalibrate before you wreck the model.`;
  }

  if(!isCorrect && tag){
    return `${bossName}: Weakness logged: ${tag}. The Nexus will circle back.`;
  }

  if(isCorrect){
    return `${bossName}: Correct. One clean command does not stabilize the system.`;
  }

  return `${bossName}: The checkpoint holds. Try again.`;
}

function startTimedModeClock(){
    timedModeEndTime = Date.now() + timedModeDurationMs;

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "flex";

    updateTimedModeClock();

    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
    }

    timedModeTimerInterval = setInterval(updateTimedModeClock, 250);
}

function stopTimedModeClock(){
    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
        timedModeTimerInterval = null;
    }

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "none";

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.classList.remove("timer-warning");
        timerDisplay.innerText = "10:00";
    }
}

function updateTimedModeClock(){
    if(gameMode !== "timed" || !timedModeEndTime) return;

    const remainingMs = Math.max(0, timedModeEndTime - Date.now());
    const totalSeconds = Math.ceil(remainingMs / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.innerText = `${minutes}:${String(seconds).padStart(2, "0")}`;
        timerDisplay.classList.toggle("timer-warning", remainingMs <= 60 * 1000);
    }

    if(remainingMs <= 0){
        endTimedModeRun();
    }
}

function endTimedModeRun(){

    stopTimedModeClock();
    gameMode = "timed-complete";

    if(gameMode === "legendary"){

            ? "legendaryBoss"

    }

    if(gameMode === "bossRush"){
        return (room <= 10) ? "easyBoss"
            : (room <= 20) ? "mediumBoss"
            : "finalBoss";
    }

    return (room <= 9) ? "easy"
         : (room === 10) ? "easyBoss"
         : (room <= 19) ? "medium"
         : (room === 20) ? "mediumBoss"
         : (room <= 25) ? "hard"
         : (room <= 29) ? "calculation"
         : "finalBoss";

        {"id":64,"q":"What is the money-market channel of monetary policy?","options":["taxes change consumption first","M changes move r, then I changes","G changes planned spending first","LRAS changes capacity first"],"a":1,"tag":"monetary_policy","type":"definition","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Monetary policy transmits through liquidity, interest rates, and investment."},
        {"id":65,"q":"If the Fed targets a lower interest rate, what must it generally do?","options":["decrease money supply","raise taxes","increase money supply","cut government purchases"],"a":2,"tag":"monetary_policy","type":"application","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"A lower target rate requires more real balances supplied."},
        {"id":66,"q":"What limits monetary policy in the basic IS-LM setup if investment is insensitive to r?","options":["money supply cannot shift LM","taxes stop affecting consumption","income cannot move along IS","lower r produces little extra I"],"a":3,"tag":"monetary_policy","type":"interpretation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"The policy can move r, but output needs investment to respond."},
        {"id":67,"q":"In this unit, the AD curve is derived from which model?","options":["IS-LM at different price levels","the PPF at different wages","labor supply at different taxes","LRAS at different interest rates"],"a":0,"tag":"aggregate_demand","type":"definition","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Changing P changes real balances, which shifts LM and changes Y in IS-LM."},
        {"id":68,"q":"Why does AD slope downward in the IS-LM derivation?","options":["lower P shifts IS left","lower P raises M/P & LM right","lower P lowers real balances","lower P makes LRAS horizontal"],"a":1,"tag":"aggregate_demand","type":"definition","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"A lower price level raises real balances, lowers r, and raises income."},
        {"id":69,"q":"A fall in P with fixed M first affects which curve?","options":["IS shifts left","LRAS shifts left","LM shifts right","taxes rise"],"a":2,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"The price level changes real money balances, so the first IS-LM curve affected is LM."},
        {"id":70,"q":"Which answer confuses movement along AD with a shift of AD?","options":["higher G shifts AD right","higher M shifts AD right","lower investment demand shifts AD left","a lower P moves down along AD"],"a":3,"tag":"aggregate_demand","type":"trap","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"A change in P moves along a given AD curve; policy or spending changes shift AD.","commonError":"calling a price-level movement an AD shift"},
        {"id":71,"q":"If government purchases rise at each price level, what happens to AD?","options":["AD shifts right","AD shifts left","movement down along AD","LRAS shifts left only"],"a":0,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Higher G shifts IS right at each price level, so AD shifts right."},
        {"id":72,"q":"On the AD graph, along AD1, which point is at the highest price level?","options":["4","1","7","5"],"a":1,"tag":"aggregate_demand","type":"graph","objective":"LO13.4","image":"is_lm_ad.png","primarySkill":"aggregate_demand_from_islm","feedback":"Point 1 is on the highest shown price level on AD1."},
        {"id":73,"q":"If M=2,000 and P falls from 10 to 8, what happens to M/P?","options":["it falls from 250 to 200","it stays at 200","it rises from 200 to 250","it rises from 20 to 25"],"a":2,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Real balances rise when the price level falls.","hint":"Compute M/P before and after."},
        {"id":74,"q":"If M=3,000 and P=15, what are real balances?","options":["45,000","3,015","20","200"],"a":3,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"M/P=3,000/15=200.","hint":"Real balances = M/P."},
        {"id":75,"q":"What happens to r when P falls in the AD derivation?","options":["r falls since LM right","r rises because IS shifts left","r is fixed by LRAS","r disappears from the model"],"a":0,"tag":"aggregate_demand","type":"interpretation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Higher real balances lower the interest rate in IS-LM."},
        {"id":76,"q":"A shift of AD means what?","options":["movement to another point on the same AD","different Y at each price level","a change only in graph scale","output fixed at natural output"],"a":1,"tag":"aggregate_demand","type":"definition","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"An AD shift changes aggregate demand for any given P."},
        {"id":77,"q":"A monetary expansion shifts AD right because it does what at each P?","options":["lowers real balances","cuts government purchases","raises M/P relative to the old M","raises taxes"],"a":2,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"For any price level, higher M means higher M/P and more demand."},
        {"id":78,"q":"Which mechanism says falling prices can make existing debts harder to repay?","options":["crowding out","balanced-budget expansion","money neutrality in the short run","debt-deflation"],"a":3,"tag":"great_depression","type":"definition","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Debt-deflation focuses on how deflation raises the real burden of nominal debts."},
        {"id":79,"q":"How can expected deflation reduce investment?","options":["it raises real r for a given nominal rate","it lowers real debt burdens","it shifts LM right without limit","it raises government purchases automatically"],"a":0,"tag":"great_depression","type":"definition","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"If prices are expected to fall, borrowing is more expensive in real terms."},
        {"id":80,"q":"A collapse in investment confidence during the Depression is shown first as what?","options":["LM shifts right","IS shifts left","AD shifts right","LRAS shifts right"],"a":1,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Lower investment demand reduces planned expenditure."},
        {"id":81,"q":"Bank failures that make people hold more currency can affect IS-LM how?","options":["government purchases rise","taxes fall automatically","Md rises or effective M falls","investment demand rises"],"a":2,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Banking panic can tighten monetary conditions and shift LM left."},
        {"id":82,"q":"Which explanation is too narrow for Depression analysis?","options":["monetary contraction can reduce demand","spending collapse can shift IS left","deflation can raise real debt burdens","one bad event must explain every part of the Depression"],"a":3,"tag":"great_depression","type":"trap","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"The Depression is usually taught as several reinforcing mechanisms, not one magic cause.","commonError":"single-cause explanation"},
        {"id":83,"q":"On the AD-SRAS panel, moving from A to B changes output how?","options":["Y rises from Y1 to Y2","Y falls from Y2 to Y1","Y stays at Y1","Y rises from Y2 to Y3"],"a":0,"tag":"great_depression","type":"graph","objective":"LO13.5","image":"is_lm_lras.png","primarySkill":"depression_crisis_mechanisms","feedback":"Point B lies to the right of A on the output axis."},
        {"id":84,"q":"If nominal debt is $1,000 and P falls from 100 to 80, what happens to the real debt burden measured as debt/P?","options":["it falls from 12.5 to 10","it rises from 10 to 12.5","it stays at 10","it rises from 80 to 100"],"a":1,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Debt/P rises when the price level falls.","hint":"Compute debt divided by P."},
        {"id":85,"q":"If nominal r is 2% and expected inflation is −3%, what is the approximate real interest rate?","options":["−1%","2%","5%","−5%"],"a":2,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Real interest rate ≈ nominal rate − expected inflation = 2 − (−3) = 5.","hint":"r_real ≈ i − expected inflation."},
        {"id":86,"q":"Why can falling prices fail to quickly restore full employment?","options":["falling prices always shift IS right","money demand disappears","LRAS must shift right immediately","deflation can worsen debt burdens & real rates"],"a":3,"tag":"great_depression","type":"interpretation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Several Depression mechanisms turn deflation into a contractionary force."},
        {"id":87,"q":"What does a banking panic do to credit conditions?","options":["it makes borrowing harder & spending weaker","it guarantees higher investment","it makes taxes irrelevant","it fixes output at LRAS"],"a":0,"tag":"great_depression","type":"definition","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Credit disruption can depress investment and consumption."},
        {"id":88,"q":"A money supply contraction in the Depression story shifts which curve in IS-LM?","options":["IS right","LM left","LM right","LRAS right"],"a":1,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Lower money supply reduces real balances and tightens monetary conditions."}
    ],
    "medium": [
        {"id":100,"q":"Planned expenditure is PE = 600 + 0.8(Y − 100) + 200 + 300. What is equilibrium income?","options":["4,400","5,500","1,100","5,100"],"a":3,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Set Y = 600 + 0.8(Y − 100) + 200 + 300 = 1,020 + 0.8Y, so 0.2Y = 1,020 and Y = 5,100.","hint":"Set Y = PE and solve."},
        {"id":101,"q":"If C = 250 + 0.6(Y − T), T = 100, I = 300, and G = 200, what is equilibrium Y?","options":["1,725","1,650","1,875","1,250"],"a":0,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Y = 250 + 0.6(Y−100) + 300 + 200 = 690 + 0.6Y, so Y = 1,725.","hint":"Collect the Y terms on one side."},
        {"id":102,"q":"A higher marginal propensity to consume affects the Keynesian-cross multiplier how?","options":["it makes the multiplier negative","it makes the multiplier larger","it removes autonomous spending","it turns IS into LM"],"a":1,"tag":"is_curve","type":"application","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"A higher MPC means each spending round induces more additional consumption."},
        {"id":103,"q":"Why can the simple-cross multiplier overstate the IS-LM fiscal effect?","options":["it treats taxes as zero","it assumes investment never changes with r","it ignores the interest-rate response","it makes output equal natural output"],"a":2,"tag":"is_curve","type":"interpretation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"IS-LM allows higher income to raise money demand and interest rates, which can crowd out investment."},
        {"id":104,"q":"A student says a tax cut moves the economy along IS because interest rates change afterward. What is wrong?","options":["tax cuts shift LM before IS","interest rates cannot move in IS-LM","taxes affect only LRAS","the T cut IS before r adjusts"],"a":3,"tag":"is_curve","type":"trap","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Policy changes that alter autonomous spending shift IS; the new r is an equilibrium result.","commonError":"treating a fiscal shock as a movement along IS"},
        {"id":105,"q":"In the IS graph, moving from IS1 to IS2 at the same r represents what?","options":["higher auto. PE","lower money supply","higher price level","a movement along one IS curve"],"a":0,"tag":"is_curve","type":"graph","objective":"LO12.1","image":"is_curves.png","primarySkill":"is_curve_goods_market","feedback":"A rightward IS shift means higher equilibrium income at each interest rate."},
        {"id":106,"q":"What is the role of the loanable-funds intuition in deriving IS?","options":["it fixes output at natural output","it links higher r to lower I","it makes money demand vertical","it removes consumption from PE"],"a":1,"tag":"is_curve","type":"definition","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The investment channel is the bridge from the interest rate to planned expenditure."},
        {"id":107,"q":"If investment is I = 500 − 20r, what happens when r rises by 3 points?","options":["investment rises by 60","investment falls by 20","investment falls by 60","investment is unchanged"],"a":2,"tag":"is_curve","type":"application","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The investment change is −20 × 3 = −60."},
        {"id":108,"q":"If imports or leakages rise in a Keynesian-cross setting, what happens to the multiplier?","options":["it becomes infinite","it turns negative automatically","it shifts LM right","it gets smaller"],"a":3,"tag":"is_curve","type":"application","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"More leakages reduce induced spending in later rounds, shrinking the multiplier."},
        {"id":109,"q":"How does an IS-right shift appear in a Keynesian-cross diagram?","options":["the PE line shifts upward","the 45-degree line shifts down","the money supply line rotates","the price level axis disappears"],"a":0,"tag":"is_curve","type":"integration","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Higher autonomous spending raises planned expenditure at every level of income."},
        {"id":110,"q":"Government purchases rise, then the IS-LM model solves for Y and r. What is the causal order?","options":["r changes first; G reacts; IS is unchanged","G changes first; IS shifts; the intersection gives Y & r","Y changes first; PE is ignored; LM shifts","prices change first; IS must shift left"],"a":1,"tag":"is_curve","type":"multi-step","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Start with the exogenous fiscal change, then trace the curve shift and equilibrium outcome."},
        {"id":111,"q":"Money demand is L(Y,r)=0.5Y−20r. If M/P=400 and Y=1,000, what is r?","options":["4","10","5","20"],"a":2,"tag":"lm_curve","type":"calculation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"0.5(1,000)−20r=400 gives 500−20r=400, so r=5.","hint":"Plug Y into money demand, then solve for r."},
        {"id":112,"q":"M = 3,600 and P = 9. If money demand is 520 − 30r, what is r?","options":["3","5","6","4"],"a":3,"tag":"lm_curve","type":"calculation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"M/P=400. Set 520−30r=400, so r=4.","hint":"Find M/P first."},
        {"id":113,"q":"An open-market purchase shifts LM right because it does what?","options":["raises the money supply","raises government purchases","raises tax collections","raises planned inventories"],"a":0,"tag":"lm_curve","type":"application","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Purchases of bonds add reserves and increase the money supply."},
        {"id":114,"q":"Why does higher income put upward pressure on r?","options":["investment becomes unrelated to rates","transaction demand for money rises","real balances rise automatically","prices must fall immediately"],"a":1,"tag":"lm_curve","type":"interpretation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"With real balances fixed, higher money demand requires a higher r to reduce desired money holdings."},
        {"id":115,"q":"A student says a fall in P moves the economy along LM. What is wrong?","options":["a fall in P shifts IS left directly","price changes cannot affect money markets","a fall in P raises M/P & LM right","a fall in P lowers real balances"],"a":2,"tag":"lm_curve","type":"trap","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"A price-level change alters real balances when nominal money is fixed.","commonError":"treating a real-balance change as movement along LM"},
        {"id":116,"q":"On the LM graph, moving from LM1 to LM2 at the same Y means what?","options":["the interest rate rises as money falls","IS shifts left at the same time","natural output decreases","r falls as M/P rise"],"a":3,"tag":"lm_curve","type":"graph","objective":"LO12.2","image":"lm_curves.png","primarySkill":"lm_curve_money_market","feedback":"A rightward LM shift lowers r at a given income."},
        {"id":117,"q":"What is held fixed when drawing one LM curve in the basic IS-LM model?","options":["real money balances","government purchases only","the IS intercept only","the capital stock only"],"a":0,"tag":"lm_curve","type":"definition","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"A given LM curve is drawn for a given M/P."},
        {"id":118,"q":"If money demand becomes more sensitive to income, what happens to the LM slope?","options":["LM becomes horizontal","LM becomes steeper","IS becomes steeper","AD becomes vertical"],"a":1,"tag":"lm_curve","type":"application","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"A larger income effect on money demand requires a bigger r increase when Y rises."},
        {"id":119,"q":"If money demand becomes more sensitive to the interest rate, what happens to LM?","options":["LM becomes steeper","LM shifts left automatically","LM becomes flatter","IS shifts right automatically"],"a":2,"tag":"lm_curve","type":"application","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"When money demand responds strongly to r, a smaller rate change clears the market after Y changes."},
        {"id":120,"q":"How does LM connect liquidity preference to IS-LM equilibrium?","options":["it replaces planned expenditure","it fixes natural output permanently","it removes the role of money demand","it supplies the money-market combinations for the intersection with IS"],"a":3,"tag":"lm_curve","type":"integration","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"IS and LM are separate equilibrium conditions; their intersection satisfies both."},
        {"id":121,"q":"If M rises and then investment rises, what variable links the two events?","options":["r falls first","taxes rise first","LRAS shifts first","consumption becomes zero"],"a":0,"tag":"lm_curve","type":"multi-step","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Monetary expansion lowers r, and lower r stimulates investment."},
        {"id":122,"q":"IS: Y = 2,000 − 100r. LM: Y = 800 + 200r. What are equilibrium r and Y?","options":["r = 3, Y = 1,700","r = 4, Y = 1,600","r = 5, Y = 1,500","r = 4, Y = 1,200"],"a":1,"tag":"is_lm_equilibrium","type":"calculation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Set 2,000−100r=800+200r. Then r=4 and Y=1,600.","hint":"Set IS equal to LM."},

        {"id":124,"q":"If IS shifts left while LM stays fixed, what happens in the standard case?","options":["Y rises and r rises","Y falls and r rises","Y rises and r falls","Y falls and r falls"],"a":3,"tag":"is_lm_equilibrium","type":"application","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"A fall in planned expenditure lowers Y; lower Y reduces money demand and r."},
        {"id":125,"q":"If LM shifts left while IS stays fixed, what happens in the standard case?","options":["Y falls and r rises","Y rises and r falls","Y rises and r rises","Y falls and r falls"],"a":0,"tag":"is_lm_equilibrium","type":"application","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Tighter money raises r and lowers investment and income."},
        {"id":126,"q":"On the IS-LM graph, moving from A to B means which curve shifted?","options":["LM shifted right while IS1 stayed fixed","IS shifted right while LM1 stayed fixed","IS shifted left while LM1 stayed fixed","LM shifted left while IS1 stayed fixed"],"a":1,"tag":"is_lm_equilibrium","type":"graph","objective":"LO12.3","image":"is_lm_curves.png","primarySkill":"is_lm_equilibrium","feedback":"A and B are both on LM1, but B is on a farther-right IS curve."},

        {"id":128,"q":"What does holding LM fixed mean in an IS-shock question?","options":["government purchases cannot change","investment cannot respond to r","the IS curve is vertical","M, P, & money-demand behavior are unchanged"],"a":3,"tag":"is_lm_equilibrium","type":"definition","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"A fixed LM curve means the money-market schedule itself has not shifted."},
        {"id":129,"q":"Investment confidence falls and the Fed responds with easier money. What is the output effect if the shifts are equal in strength?","options":["Y could stay near its initial level while r falls","Y must rise and r must rise","Y must fall and r must rise","Y must be fixed at natural output"],"a":0,"tag":"is_lm_equilibrium","type":"multi-step","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"IS-left lowers Y and r; LM-right raises Y and lowers r. Equal output effects can offset, while both lower r."},
        {"id":130,"q":"Why does IS-LM create crowding out after fiscal expansion?","options":["higher Y lowers money demand and r","higher Y raises Md & r, reducing I","higher G directly lowers investment by law","higher taxes shift LM left"],"a":1,"tag":"is_lm_equilibrium","type":"interpretation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"The money-market response turns part of the fiscal expansion into a higher interest rate."},

        {"id":133,"q":"A stock-market crash reduces household wealth and consumption. What is the IS-LM effect?","options":["LM shifts right; Y rises and r falls","IS shifts right; Y and r rise","IS shifts left; Y and r fall","LM shifts left; Y falls and r rises"],"a":2,"tag":"shocks","type":"application","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Lower consumption reduces planned expenditure and moves IS left."},
        {"id":134,"q":"A payment-system panic makes people hold more money at every income. What happens?","options":["IS shifts left; Y and r fall","LM shifts right; Y rises and r falls","IS shifts right; Y and r rise","LM shifts left; Y falls and r rises"],"a":3,"tag":"shocks","type":"application","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Higher liquidity demand shifts LM left."},
        {"id":135,"q":"Which response confuses a spending shock with a money shock?","options":["a collapse in investment shifts LM left","a collapse in investment shifts IS left","a rise in money demand shifts LM left","a fall in money supply shifts LM left"],"a":0,"tag":"shocks","type":"trap","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Investment demand belongs in planned expenditure, so its direct curve is IS.","commonError":"putting spending shocks on LM"},

        {"id":137,"q":"Autonomous spending falls by 50 and MPC=0.6. What is the simple-cross output effect?","options":["−80","−50","−125","−30"],"a":2,"tag":"shocks","type":"calculation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The multiplier is 2.5, so output falls by 125 before IS-LM feedback.","hint":"Use 1/(1−0.6)."},
        {"id":138,"q":"A money-demand shock raises desired real balances from 340 to 400 at the target rate. If P=6, what nominal money increase offsets it?","options":["60","2,040","2,400","360"],"a":3,"tag":"shocks","type":"calculation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Real balances must rise by 60. Nominal money must rise by 60×6=360.","hint":"Convert real balances into nominal money."},
        {"id":139,"q":"An IS-left shock and LM-right shock occur together. What is definitely true?","options":["r falls","Y rises","Y falls","r rises"],"a":0,"tag":"shocks","type":"integration","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Both shocks push r downward; the output effects oppose each other."},

        {"id":142,"q":"A shock to money demand raises r; then investment falls. What is the chain?","options":["investment falls, LM shifts right, r falls, Y rises","G rises, IS shifts left, r rises, I falls","P falls, IS shifts left, r rises, Y falls","Md rises, LM left, r rises, I falls"],"a":3,"tag":"shocks","type":"multi-step","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The monetary disturbance hits LM first; investment responds to the higher interest rate."},
        {"id":143,"q":"Why does shock analysis separate cause from result?","options":["since curve are causes & intersections are outcomes","because labels determine policy","because outcomes are chosen before shocks","because only one variable can change"],"a":0,"tag":"shocks","type":"definition","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"This keeps the model from becoming a story invented after the answer."},
        {"id":144,"q":"MPC=0.8. G rises by $25 billion. What is the simple-cross ΔY before crowding out?","options":["$100 billion","$125 billion","$25 billion","$31.25 billion"],"a":1,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Multiplier is 5, so ΔY=125.","hint":"Use 1/(1−0.8)."},
        {"id":145,"q":"MPC=0.6. Taxes fall by $40 billion. What is the simple-cross ΔY?","options":["+$100 billion","+$40 billion","+$60 billion","+$24 billion"],"a":2,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Tax multiplier is −0.6/0.4 = −1.5. A tax cut gives +60.","hint":"Tax multiplier = −MPC/(1−MPC)."},
        {"id":146,"q":"Why does a tax cut usually shift IS less than an equal rise in G?","options":["tax cuts shift LM instead of IS","G has no multiplier","taxes change natural output only","only MPC times the T cut becomes first-round spending"],"a":3,"tag":"fiscal_policy","type":"application","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Government purchases enter PE directly; tax changes work through consumption."},
        {"id":147,"q":"If fiscal contraction occurs while LM is fixed, what happens to Y and r?","options":["both fall","both rise","Y rises and r falls","Y falls and r rises"],"a":0,"tag":"fiscal_policy","type":"application","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"IS-left lowers output and reduces money demand, lowering r."},
        {"id":148,"q":"On the IS-LM graph, moving from B back to A could be caused by what?","options":["an open-market purchase","a reduction in G","a rise in money supply","a fall in money demand"],"a":1,"tag":"fiscal_policy","type":"graph","objective":"LO13.2","image":"is_lm_curves.png","primarySkill":"fiscal_policy_is_shift","feedback":"B to A is an IS-left shift along LM1."},
        {"id":149,"q":"Which answer overstates expansionary fiscal policy in IS-LM?","options":["it shifts IS right","it may raise r","it gives the full simple-cross multiplier even when LM slopes upward","it may crowd out investment"],"a":2,"tag":"fiscal_policy","type":"trap","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"The money-market response reduces the output gain when LM slopes upward.","commonError":"ignoring crowding out"},
        {"id":150,"q":"Fiscal expansion plus monetary accommodation has what effect relative to fiscal expansion alone?","options":["less Y gain and more r increase","no IS movement","a required LRAS shift","more Y gain and less r increase"],"a":3,"tag":"fiscal_policy","type":"integration","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"LM-right support reduces crowding out."},
        {"id":151,"q":"What does a balanced-budget expansion mean?","options":["G and T rise together","M and P rise together","IS and LM both fall","Y and r are fixed"],"a":0,"tag":"fiscal_policy","type":"definition","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"The government raises spending and taxes by the same amount."},
        {"id":152,"q":"MPC=0.75. G rises by 40 and T rises by 40. What is the simple balanced-budget ΔY?","options":["0","40","160","−40"],"a":1,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"G effect is +160; tax effect is −120; net is +40.","hint":"Balanced-budget multiplier is 1 in this simple setup."},
        {"id":153,"q":"Why does automatic stabilization reduce IS volatility?","options":["money demand disappears","LM becomes vertical","T & transfers move against Y changes","investment no longer responds to r"],"a":2,"tag":"fiscal_policy","type":"interpretation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Built-in fiscal responses cushion changes in disposable income."},
        {"id":154,"q":"A tax cut raises Y, then r rises, then investment falls. What is the sequence?","options":["LM right, movement along IS, lower investment","IS left, movement down LM, more investment","LRAS right, AD left, lower Y","IS right, movement up LM, partial crowding out"],"a":3,"tag":"fiscal_policy","type":"multi-step","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Fiscal expansion starts in IS; the interest-rate response comes from LM."},
        {"id":155,"q":"Money demand is L(r)=400−40r and P=20. If the Fed targets r=5, what nominal M is required?","options":["4,000","200","3,600","8,000"],"a":0,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Real demand is 400−200=200. Nominal M=200×20=4,000.","hint":"Find real demand at target r."},
        {"id":156,"q":"M=1,800 and P=9. Money demand is 320−30r. What is r?","options":["3","4","5","6"],"a":1,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"M/P=200. Set 320−30r=200, so r=4.","hint":"Calculate M/P first."},
        {"id":157,"q":"An open-market sale is contractionary because it does what?","options":["raises G directly","cuts taxes through Congress","reduces bank reserves & the M","raises investment demand directly"],"a":2,"tag":"monetary_policy","type":"application","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Selling bonds drains reserves and lowers the money supply."},
        {"id":158,"q":"If monetary expansion is successful in basic IS-LM, which variable rises through the investment channel?","options":["the price level first","taxes first","natural output first","income"],"a":3,"tag":"monetary_policy","type":"application","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Lower r raises investment and planned expenditure, increasing short-run income."},
        {"id":159,"q":"On the IS-LM graph, E to C represents what policy?","options":["monetary contraction with IS3 fixed","monetary expansion with IS3 fixed","fiscal expansion with LM3 fixed","fiscal contraction with LM3 fixed"],"a":0,"tag":"monetary_policy","type":"graph","objective":"LO13.3","image":"is_lm_curves.png","primarySkill":"monetary_policy_lm_shift","feedback":"E and C share IS3; LM moves left."},
        {"id":160,"q":"Which claim confuses a rate target with a money target?","options":["a lower rate target requires more money supply","the Fed can lower r without changing M when Md is unchanged","money demand affects how much M is needed","P matters for real balances"],"a":1,"tag":"monetary_policy","type":"trap","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"If money demand is unchanged, lower r requires more supplied balances.","commonError":"forgetting implementation of a rate target"},
        {"id":161,"q":"Monetary expansion after fiscal expansion is called accommodation because it does what?","options":["shifts IS left","raises taxes","limits the rise in r","reduces planned expenditure"],"a":2,"tag":"monetary_policy","type":"integration","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"LM-right movement offsets the interest-rate pressure from IS-right movement."},
        {"id":162,"q":"What is an interest-rate peg?","options":["a fixed value of G","a tax rule that fixes Y","a price level chosen by firms","a central bank defends a chosen r by adjusting M"],"a":3,"tag":"monetary_policy","type":"definition","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"A peg is maintained by supplying whatever money balances are needed at that rate."},
        {"id":163,"q":"M rises, r falls, investment rises, Y rises. Which curve shift starts that sequence?","options":["LM right","IS left","LRAS right","AD left"],"a":0,"tag":"monetary_policy","type":"multi-step","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"The monetary shock begins by changing real money balances."},
        {"id":164,"q":"Why does a higher P weaken monetary expansion if M does not change enough?","options":["it raises M/P","it reduces M/P","it shifts IS right","it eliminates money demand"],"a":1,"tag":"monetary_policy","type":"interpretation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"The relevant monetary stance is real balances, not nominal money alone."},
        {"id":165,"q":"If money demand rises at the same time the Fed expands M, what is ambiguous?","options":["the IS shift","the definition of M/P","the net LM shift","whether taxes change"],"a":2,"tag":"monetary_policy","type":"application","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Higher demand shifts LM left; higher supply shifts LM right."},
        {"id":166,"q":"M=2,400. If P falls from 12 to 8, what is the change in real balances?","options":["+50","−100","0","+100"],"a":3,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"M/P rises from 200 to 300, a gain of 100.","hint":"Compare old and new M/P."},
        {"id":167,"q":"M/P rises from 150 to 200 and money demand is 260−20r. What happens to r?","options":["falls from 5.5 to 3","rises from 3 to 5.5","falls from 13 to 10","stays at 5.5"],"a":0,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"At 150, r=5.5. At 200, r=3. Lower P raises real balances and lowers r.","hint":"Solve money demand at each real balance."},
        {"id":168,"q":"If taxes increase at every price level, what happens to AD?","options":["AD shifts right","AD shifts left","movement down along AD","LM shifts right at every P"],"a":1,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Higher taxes shift IS left at each price level, lowering demand."},
        {"id":169,"q":"If the nominal money supply falls, what happens to AD?","options":["AD shifts right","movement along AD only","AD shifts left","LRAS shifts right"],"a":2,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Lower M reduces M/P at each price level, shifting LM left and AD left."},
        {"id":170,"q":"On the AD graph, a movement from point 1 to point 4 on AD1 means what changed?","options":["AD shifted right","AD shifted left","LRAS shifted right","the P fell along the same AD curve"],"a":3,"tag":"aggregate_demand","type":"graph","objective":"LO13.4","image":"is_lm_ad.png","primarySkill":"aggregate_demand_from_islm","feedback":"Points 1 and 4 are on the same AD curve at different price levels."},
        {"id":171,"q":"A student says higher P shifts AD left. What is the correction?","options":["higher P moves up along AD if AD itself is unchanged","higher P shifts IS right","higher P shifts LRAS right","higher P raises M/P"],"a":0,"tag":"aggregate_demand","type":"trap","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Price-level changes explain the slope of AD, not shifts of AD.","commonError":"turning AD movements into shifts"},
        {"id":172,"q":"How does a fiscal expansion show up in the IS-LM-to-AD derivation?","options":["LM shifts left at each P, so AD shifts left","IS right at each P, so AD right","LRAS shifts right first","P changes before policy changes"],"a":1,"tag":"aggregate_demand","type":"integration","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Fiscal expansion raises equilibrium income for any given price level."},
        {"id":173,"q":"P falls, M/P rises, LM shifts right. What is the next link in deriving AD?","options":["G falls and IS shifts left","LRAS shifts right","r falls & Y rises along IS","taxes rise automatically"],"a":2,"tag":"aggregate_demand","type":"multi-step","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"The lower interest rate stimulates investment and output."},
        {"id":174,"q":"Why is AD not the same curve as IS?","options":["AD plots r against Y","AD ignores money markets","AD is a production frontier","AD plots P against Y after solving IS-LM"],"a":3,"tag":"aggregate_demand","type":"interpretation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"AD is derived by changing P and finding the resulting IS-LM equilibrium Y."},
        {"id":175,"q":"What variable is on the vertical axis of the AD diagram?","options":["price level","interest rate","government purchases","real money balances"],"a":0,"tag":"aggregate_demand","type":"definition","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"AD is plotted in P-Y space."},
        {"id":176,"q":"If investment demand falls at every r, what happens to AD?","options":["AD shifts right","AD shifts left","movement down along AD","LM shifts right"],"a":1,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Lower investment shifts IS left at each P, reducing AD."},
        {"id":177,"q":"Nominal r is 1% and expected inflation is −4%. What is the approximate real rate?","options":["−3%","1%","5%","4%"],"a":2,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Real rate ≈ 1 − (−4) = 5%.","hint":"Subtract expected inflation."},
        {"id":178,"q":"Nominal debt is 500 and P falls from 50 to 40. How much does debt/P rise?","options":["from 12.5 to 10","from 500 to 540","from 50 to 40","from 10 to 12.5"],"a":3,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Real debt burden rises as P falls.","hint":"Debt/P before and after."},
        {"id":179,"q":"A stock-market crash lowers wealth and consumption. What Depression channel is this closest to in IS-LM?","options":["IS-left spending collapse","LM-right monetary expansion","LRAS-right productivity boom","movement down along AD only"],"a":0,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Lower consumption reduces planned expenditure."},
        {"id":180,"q":"Bank failures reduce deposits and lending. Which two curves may be hit?","options":["IS right and LM right","LM left and IS left","LRAS right and AD right","LM right and SRAS right"],"a":1,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Money/credit contraction can tighten LM and reduce investment spending."},
        {"id":181,"q":"On the AD-SRAS panel, moving from C to B changes output and P how?","options":["Y rises and P falls","Y falls and P falls","Y falls and P rises","Y stays fixed and P rises"],"a":2,"tag":"great_depression","type":"graph","objective":"LO13.5","image":"is_lm_lras.png","primarySkill":"depression_crisis_mechanisms","feedback":"C to B moves left in output and up in price level."},
        {"id":182,"q":"Which claim wrongly treats deflation as always expansionary?","options":["lower P can raise M/P","expected deflation can raise real rates","debt-deflation can reduce spending","lower P always raises Y since M/P rise"],"a":3,"tag":"great_depression","type":"trap","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"The real-balance effect can be offset by debt and expectation channels.","commonError":"assuming real balances are the only deflation channel"},
        {"id":183,"q":"How can monetary contraction and expected deflation reinforce each other?","options":["LM left & IS can shift left through higher real rates","both shift IS right","both lower real rates","both reduce debt burdens"],"a":0,"tag":"great_depression","type":"integration","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Tight money raises rates; expected deflation can raise real borrowing costs further."},
        {"id":184,"q":"What is the spending-collapse view of the Depression?","options":["LRAS rose too quickly","auto. demand fell sharply","taxes were always zero","money demand vanished"],"a":1,"tag":"great_depression","type":"definition","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"A demand collapse shifts IS/AD left."},
        {"id":185,"q":"Expected deflation rises, real rates rise, investment falls. Which curve moves?","options":["LM shifts right","LRAS shifts right","IS shifts left","AD moves down only"],"a":2,"tag":"great_depression","type":"multi-step","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Higher real borrowing costs weaken investment demand."},
        {"id":186,"q":"Why does the Depression objective not reduce to one multiplier problem?","options":["multipliers never matter","graphs cannot show recessions","money has no role","it includes banking, money, expectations, debt, & spending channels"],"a":3,"tag":"great_depression","type":"interpretation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"The Depression mechanisms are several distinct causal stories."},
        {"id":187,"q":"If policy expands money enough to stop deflation expectations, what happens to demand?","options":["it can support IS & LM recovery","it must lower Y","it shifts LRAS left","it raises real debt burdens"],"a":0,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Stabilizing money and expectations can reduce contractionary pressure."}
    ],
    "hard": [
        {"id":200,"q":"Planned expenditure is PE = 900 + 0.75(Y − 400) + I + G, with I = 500 and G = 700. What is equilibrium Y?","options":["6,800","8,400","7,200","2,100"],"a":2,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"PE = 900 + 0.75Y − 300 + 500 + 700 = 1,800 + 0.75Y. Set Y=PE, so Y=7,200.","hint":"Y = autonomous spending + MPC×Y."},
        {"id":201,"q":"MPC = 0.8. Taxes rise by $25 billion. What is the simple-cross change in income?","options":["−$125 billion","−$25 billion","+$100 billion","−$100 billion"],"a":3,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The tax multiplier is −MPC/(1−MPC)=−4, so ΔY=−4×25=−100.","hint":"Tax multiplier = −MPC/(1 − MPC)."},
        {"id":202,"q":"If the IS curve is steep, what does that usually imply about investment demand?","options":["investment is not very sensitive to r","investment is extremely sensitive to r","money demand is perfectly elastic","taxes are fixed at zero"],"a":0,"tag":"is_curve","type":"application","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"A steep IS means r must change a lot to move income much, so investment is weakly interest-sensitive."},
        {"id":203,"q":"Which mistake would exaggerate the effect of a tax cut on IS?","options":["counting induced consumption after the first round","using the government-purchases multiplier instead of the tax multiplier","recognizing that disposable income rises","noting that investment may be crowded out"],"a":1,"tag":"is_curve","type":"trap","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"A tax cut first changes consumption by MPC times the tax change, not by the full tax change.","commonError":"using the wrong multiplier"},
