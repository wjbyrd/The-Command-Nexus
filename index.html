        {"id":204,"q":"On the IS graph, which movement best shows lower autonomous spending at every interest rate?","options":["from IS1 to IS2","from IS2 to IS3","from IS2 to IS1","up along IS2 only"],"a":2,"tag":"is_curve","type":"graph","objective":"LO12.1","image":"is_curves.png","primarySkill":"is_curve_goods_market","feedback":"Lower autonomous spending shifts the IS curve left."},
        {"id":205,"q":"Why does an increase in the interest rate reduce equilibrium income on IS?","options":["it raises real balances, which shifts LM","it raises consumption through taxes","it shifts LRAS left by assumption","it lowers I, which lowers PE"],"a":3,"tag":"is_curve","type":"interpretation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The IS mechanism runs through interest-sensitive investment and planned expenditure."},
        {"id":206,"q":"If autonomous consumption falls and the central bank holds the interest rate fixed, what still happens to IS?","options":["IS left; monetary policy may offset the Y loss","IS stays fixed because r is fixed","LM shifts left before IS can move","LRAS shifts right automatically"],"a":0,"tag":"is_curve","type":"multi-step","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Holding r fixed does not prevent the spending shock; it only changes the policy response."},
        {"id":207,"q":"Which policy mix shifts IS right without directly shifting LM?","options":["open-market purchases","higher government purchases","a lower price level","higher nominal money supply"],"a":1,"tag":"is_curve","type":"application","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Government purchases enter planned expenditure, so the direct curve shift is IS right."},
        {"id":208,"q":"A fall in r raises investment by 80, and MPC = 0.6. What is the total simple-cross income effect from that investment change?","options":["80","128","200","133.3"],"a":2,"tag":"is_curve","type":"integration","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The investment increase is autonomous spending. With multiplier 2.5, ΔY = 2.5×80 = 200.","hint":"Use investment change as autonomous spending."},
        {"id":209,"q":"Which statement incorrectly treats the IS curve as a supply curve?","options":["IS shows goods-market equilibrium combinations","IS is shifted by autonomous spending","IS can be derived from the Keynesian cross","IS shows how much Y firms can produce at each r"],"a":3,"tag":"is_curve","type":"trap","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"IS is about planned demand and goods-market equilibrium, not productive capacity.","commonError":"confusing demand equilibrium with productive capacity"},
        {"id":210,"q":"What information does one point on the IS curve contain?","options":["one Y-r pair where planned spending equals Y","one price-output pair on AD","one money supply chosen by the Fed","one natural-output point only"],"a":0,"tag":"is_curve","type":"definition","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Each point on IS is a goods-market equilibrium combination."},
        {"id":211,"q":"Money demand is L(Y,r)=0.25Y+120−30r. If M=3,000, P=10, and Y=960, what is r?","options":["4","2","6","8"],"a":1,"tag":"lm_curve","type":"calculation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"M/P=300. Demand is 240+120−30r=360−30r. Set equal to 300, so r=2.","hint":"Calculate M/P, then solve demand = supply."},
        {"id":212,"q":"The Fed wants r=3 when money demand is L(r)=180−30r and P=20. What nominal M is required?","options":["90","2,400","1,800","5,400"],"a":2,"tag":"lm_curve","type":"calculation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Real demand at r=3 is 90. Nominal M must be P×(M/P)=20×90=1,800.","hint":"Find real money demand at the target r, then multiply by P."},
        {"id":213,"q":"If banks become more cautious and households hold more money, what happens in liquidity preference?","options":["money demand falls and LM shifts right","IS shifts right through investment","LRAS shifts right through productivity","money demand rises and LM shifts left"],"a":3,"tag":"lm_curve","type":"application","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"A liquidity scramble raises money demand at each income and interest rate."},
        {"id":214,"q":"Which claim incorrectly describes monetary contraction?","options":["it directly lowers planned G","it lowers M/P when P is fixed","it shifts LM left","it raises r at a given Y"],"a":0,"tag":"lm_curve","type":"trap","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Monetary contraction works through the money market, not by directly changing G.","commonError":"placing monetary policy inside planned expenditure"},
        {"id":215,"q":"In the LM graph, which shift matches a decrease in nominal money supply with P fixed?","options":["LM1 to LM2","LM2 to LM1","LM2 to LM3","movement along LM2"],"a":1,"tag":"lm_curve","type":"graph","objective":"LO12.2","image":"lm_curves.png","primarySkill":"lm_curve_money_market","feedback":"A lower nominal money supply lowers M/P and shifts LM left."},
        {"id":216,"q":"Why can a higher price level tighten monetary conditions even with unchanged M?","options":["it raises real balances","it raises G directly","it lowers real balances","it lowers money demand at every r"],"a":2,"tag":"lm_curve","type":"interpretation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"When P rises, each nominal dollar buys fewer goods, so M/P falls."},
        {"id":217,"q":"Income rises after an IS-right shift while M/P is fixed. What happens inside the money market?","options":["money supply rises automatically","money demand falls, lowering r","LM shifts right before income changes","money demand rises, pushing r upward"],"a":3,"tag":"lm_curve","type":"multi-step","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"The IS shift raises Y; higher Y raises money demand and pulls the economy up along LM."},
        {"id":218,"q":"Which change shifts LM right without using open-market operations?","options":["a lower P with fixed M","a tax cut","higher government purchases","lower business confidence"],"a":0,"tag":"lm_curve","type":"application","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"A lower price level raises real money balances, shifting LM right."},
        {"id":219,"q":"If money demand is highly interest-sensitive, why is monetary policy less powerful through r?","options":["extra money shifts IS instead","extra money causes a smaller fall in r","investment no longer depends on r","prices must rise immediately"],"a":1,"tag":"lm_curve","type":"integration","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"When money demand absorbs more balances with little rate movement, the stimulus to investment is weaker."},
        {"id":220,"q":"A student uses nominal M instead of M/P to locate LM. What is the consequence?","options":["they correctly derive AD every time","they turn IS into a vertical curve","they miss price-level effects on real liquidity","they remove income from money demand"],"a":2,"tag":"lm_curve","type":"trap","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"LM depends on real balances, so P matters.","commonError":"using nominal money when real balances are needed"},
        {"id":221,"q":"Which pair of variables appears on the LM graph axes?","options":["P and Y","G and T","C and I","Y and r"],"a":3,"tag":"lm_curve","type":"definition","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"The IS-LM diagram uses income on the horizontal axis and the interest rate on the vertical axis."},
        {"id":222,"q":"C=100+0.6(Y−50), I=50−10r, G=150, and M/P=Y−r=285. What are Y and r?","options":["Y=285, r=0","Y=300, r=15","Y=320, r=35","Y=250, r=−35"],"a":1,"tag":"is_lm_equilibrium","type":"calculation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Goods market gives Y=270+0.6Y−10r, so Y=675−25r. Money market gives Y−r=285. Solving gives r=15 and Y=300.","hint":"Solve the IS equation and LM equation together."},
        {"id":223,"q":"IS: Y = 3,000 − 150r. LM: Y = 1,200 + 300r. After LM shifts to Y = 1,800 + 300r, what is new Y?","options":["2,400","2,700","2,600","2,800"],"a":2,"tag":"is_lm_equilibrium","type":"calculation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Set 3,000−150r=1,800+300r, so r=2.667 and Y=2,600."},
        {"id":224,"q":"If IS shifts left and LM shifts right, what is definitely true in the standard diagram?","options":["Y rises","Y falls","r rises","r falls"],"a":3,"tag":"is_lm_equilibrium","type":"application","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Both IS-left and LM-right push r downward; their effects on Y oppose each other."},
        {"id":225,"q":"If IS shifts right and LM shifts left, what is definitely true?","options":["r rises","Y rises","Y falls","Y stays fixed"],"a":0,"tag":"is_lm_equilibrium","type":"application","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Both shifts push the interest rate upward; income depends on the relative sizes."},
        {"id":226,"q":"On the IS-LM graph, moving from D to G uses which curve movement?","options":["IS shifts right while LM2 stays fixed","LM shifts right while IS2 stays fixed","LM shifts left while IS2 stays fixed","IS shifts left while LM2 stays fixed"],"a":1,"tag":"is_lm_equilibrium","type":"graph","objective":"LO12.3","image":"is_lm_curves.png","primarySkill":"is_lm_equilibrium","feedback":"D and G are on IS2; the movement is from LM2 to LM3."},
        {"id":227,"q":"A student says every fall in r proves monetary expansion. What is the flaw?","options":["IS-left shocks always raise r","LM-right shocks lower Y only","IS-left shocks can also lower r","r never changes in IS-LM"],"a":2,"tag":"is_lm_equilibrium","type":"trap","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"A lower interest rate can result from weaker goods demand or easier money. Check Y and the shifted curve.","commonError":"identifying policy from r alone"},
        {"id":228,"q":"Government purchases rise while the central bank reduces money supply. What is the most likely conflict?","options":["both shifts lower r","both shifts lower Y","IS and LM must both shift right","IS-right raises Y, LM-left lowers Y, & both raise r"],"a":3,"tag":"is_lm_equilibrium","type":"multi-step","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"The output effects oppose; the interest-rate effects reinforce upward."},
        {"id":229,"q":"Why does the IS-LM intersection not have to equal natural output?","options":["the P is fixed in the short run","LRAS is ignored forever","money demand is zero","investment is fixed by law"],"a":0,"tag":"is_lm_equilibrium","type":"interpretation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"With prices fixed, demand shocks can move output away from long-run potential."},
        {"id":230,"q":"If a tax cut and a rise in money demand happen together, what is ambiguous?","options":["r must fall","Y may rise or fall","IS must shift left","LM must shift right"],"a":1,"tag":"is_lm_equilibrium","type":"integration","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Tax cuts shift IS right; higher money demand shifts LM left. These have opposite effects on Y."},
        {"id":231,"q":"What does comparative statics ask in IS-LM?","options":["how to redraw axes without variables","how to keep all curves fixed forever","how eq. changes after an exogenous shift","how to calculate only natural output"],"a":2,"tag":"is_lm_equilibrium","type":"definition","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Comparative statics compares old and new equilibria after a change in policy or behavior."},
        {"id":232,"q":"IS: Y=2,500−50r. LM: r=0.02Y−30. What are equilibrium r and Y?","options":["r=8, Y=2,100","r=12, Y=1,900","r=15, Y=1,750","r=10, Y=2,000"],"a":3,"tag":"is_lm_equilibrium","type":"calculation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Substitute: Y=2,500−50(0.02Y−30)=4,000−Y, so Y=2,000 and r=10."},
        {"id":233,"q":"Oil prices rise and firms postpone investment projects. In this IS-LM framing, what is the demand-side effect?","options":["LM shifts right through real balances","IS shifts left through lower investment","IS shifts right through higher consumption","LRAS shifts right through productivity"],"a":1,"tag":"shocks","type":"application","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"When the prompt emphasizes investment demand, the IS channel is the relevant short-run demand effect."},
        {"id":234,"q":"A sudden desire for liquidity raises money demand during a recession. What policy offsets the LM effect most directly?","options":["raise taxes","cut government purchases","increase the money supply","reduce autonomous consumption"],"a":2,"tag":"shocks","type":"application","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"More money supply can shift LM right against the money-demand increase."},
        {"id":235,"q":"On the IS-LM graph, moving from E to C reflects what?","options":["IS shifts left while LM3 stays fixed","LM shifts right while IS3 stays fixed","IS shifts right while LM3 stays fixed","LM shifts left while IS3 stays fixed"],"a":3,"tag":"shocks","type":"graph","objective":"LO13.1","image":"is_lm_curves.png","primarySkill":"shock_transmission","feedback":"E and C are both on IS3, while LM moves left."},
        {"id":236,"q":"A student says a recession with falling r must be monetary contraction. What is wrong?","options":["monetary contraction raises r in the basic model","IS-left shocks raise r","falling r proves LM-left","Y cannot fall when r falls"],"a":0,"tag":"shocks","type":"trap","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Falling output with falling r is the classic IS-left pattern, not LM-left.","commonError":"wrong sign for monetary contraction"},
        {"id":237,"q":"A spending shock lowers autonomous demand by 80. MPC=0.8. Before interest-rate feedback, what is ΔY?","options":["−320","−400","−160","−80"],"a":1,"tag":"shocks","type":"calculation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The multiplier is 5, so output falls by 400.","hint":"Multiplier = 5."},
        {"id":238,"q":"Money demand becomes L=500−50r instead of 440−50r. If P=10, how much must M rise to keep the same r?","options":["60","500","600","5,000"],"a":2,"tag":"shocks","type":"calculation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Real demand is 60 higher at every r, so nominal M must rise by 60×10=600.","hint":"Hold r fixed by matching the real demand increase."},
        {"id":239,"q":"A negative IS shock and a leftward LM shock hit together. What is certain?","options":["r falls","r is unchanged","Y rises","Y falls"],"a":3,"tag":"shocks","type":"integration","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Both shocks reduce output; their interest-rate effects oppose one another."},
        {"id":240,"q":"A positive IS shock and a rightward LM shock hit together. What is certain?","options":["Y rises","r rises","r falls","Y falls"],"a":0,"tag":"shocks","type":"integration","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Both shifts raise output; the interest-rate result is ambiguous."},
        {"id":241,"q":"If confidence collapses and the Fed expands money aggressively, what determines whether Y falls?","options":["the color of the IS curve","relative size of IS-left & LM-right shifts","whether taxes are labeled first","the old equilibrium only"],"a":1,"tag":"shocks","type":"multi-step","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The output effects oppose, so the larger shift dominates."},
        {"id":242,"q":"Why can the same shock have a larger output effect in one economy than another?","options":["equilibrium points do not matter","money demand is identical everywhere","curve slopes & interest sensitivities differ","all shocks move LRAS first"],"a":2,"tag":"shocks","type":"interpretation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The transmission from curve shifts to Y depends on IS and LM slopes."},
        {"id":243,"q":"Which answer treats all shocks as policy?","options":["a central-bank bond sale is monetary contraction","higher G is fiscal expansion","higher money demand is a liquidity shock","a private I collapse is called monetary contraction"],"a":3,"tag":"shocks","type":"trap","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Not every curve shift is a policy choice; private behavior can shift curves too.","commonError":"calling every shock policy"},
        {"id":244,"q":"PE = 500 + 0.8(Y−200)+300+G. If G rises from 400 to 450, what is simple-cross ΔY?","options":["250","50","200","400"],"a":0,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"ΔG=50 and multiplier=5, so ΔY=250.","hint":"Only the change in G matters."},
        {"id":245,"q":"MPC=0.7. Taxes rise by 30. What is the simple-cross change in Y?","options":["−30","−70","−100","−21"],"a":1,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Tax multiplier is −0.7/0.3≈−2.333, so ΔY≈−70.","hint":"Use the tax multiplier."},
        {"id":246,"q":"A student treats a tax cut as if it enters PE dollar-for-dollar. What is wrong?","options":["tax cuts never affect consumption","tax cuts shift LM only","C rises by MPC times the T cut first","tax cuts reduce disposable income"],"a":2,"tag":"fiscal_policy","type":"trap","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Taxes affect consumption through disposable income, not direct government purchases.","commonError":"using G multiplier for taxes"},
        {"id":247,"q":"If LM is very steep, what happens to fiscal expansion?","options":["crowding out disappears","IS cannot shift","r cannot change","crowding out is stronger"],"a":3,"tag":"fiscal_policy","type":"application","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"A steep LM means Y increases create large interest-rate pressure."},
        {"id":248,"q":"If LM is horizontal, what happens to crowding out from G?","options":["little or none through r","complete crowding out","IS shifts left","taxes rise automatically"],"a":0,"tag":"fiscal_policy","type":"application","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"If r does not rise, investment is not crowded out through the interest-rate channel."},
        {"id":249,"q":"On the IS-LM graph, A to B followed by B to E represents what mix?","options":["monetary contraction followed by fiscal contraction","fiscal expansion followed by monetary expansion","fiscal contraction followed by monetary contraction","no policy change"],"a":1,"tag":"fiscal_policy","type":"graph","objective":"LO13.2","image":"is_lm_curves.png","primarySkill":"fiscal_policy_is_shift","feedback":"A to B is IS-right; B to E is LM-right at the new IS."},
        {"id":250,"q":"Fiscal expansion and monetary contraction together have what definite effect?","options":["Y rises","Y falls","r rises","r falls"],"a":2,"tag":"fiscal_policy","type":"integration","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Both shifts raise r; output depends on which shift dominates."},
        {"id":251,"q":"What is the policy goal of fiscal stimulus in a recessionary gap?","options":["shift LM left to raise r","shift LRAS left to lower capacity","make money demand higher","shift IS right to raise short-run Y"],"a":3,"tag":"fiscal_policy","type":"definition","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Fiscal stimulus attempts to increase aggregate demand through planned expenditure."},
        {"id":252,"q":"A rise in G is financed by higher taxes of the same amount. Why can Y still rise?","options":["G enters PE fully while T reduce C by MPC times T","taxes shift LM right","G has no spending effect","consumption rises when taxes rise"],"a":0,"tag":"fiscal_policy","type":"multi-step","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"The balanced-budget result depends on MPC being less than one."},
        {"id":253,"q":"Why does fiscal policy affect r even though it does not directly change money supply?","options":["G enters the money supply equation","higher Y changes money demand","taxes set the price level","investment demand vanishes"],"a":1,"tag":"fiscal_policy","type":"interpretation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Money demand responds to income, so goods-market changes spill into r."},
        {"id":254,"q":"MPC=0.8. G rises by 50, and crowding out later reduces investment by 80 in simple-cross terms. What is net ΔY before further feedback?","options":["250","80","170","330"],"a":2,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"G multiplier effect is +250. Subtract 80 to get +170.","hint":"Keep the crowding-out adjustment separate."},
        {"id":255,"q":"Money demand is L(Y,r)=0.25Y+300−50r. Y=1,600, P=10, target r=6. What M is needed?","options":["400","5,000","3,000","4,000"],"a":3,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Real demand is 400+300−300=400. Nominal M=400×10=4,000.","hint":"Compute real demand at Y and r."},
        {"id":256,"q":"The Fed raises M from 2,400 to 3,000 while P=12. Money demand is 350−25r. What happens to r?","options":["falls from 6 to 4","rises from 4 to 6","falls from 8 to 6","stays at 6"],"a":0,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Old M/P=200 gives r=6. New M/P=250 gives r=4.","hint":"Solve r before and after."},
        {"id":257,"q":"If IS is very steep, what happens to monetary policy output effects?","options":["they are stronger because r cannot move","they are weaker since Y responds little to r","LM cannot shift","investment demand is more sensitive"],"a":1,"tag":"monetary_policy","type":"application","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"A steep IS means lower r produces a smaller change in income."},
        {"id":258,"q":"Which statement ignores the price-level assumption?","options":["with fixed P, higher M raises M/P","with higher P, the same M buys fewer goods","a higher M always raises M/P by the same amount regardless of P","LM depends on real balances"],"a":2,"tag":"monetary_policy","type":"trap","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Real balances depend on both M and P.","commonError":"ignoring P in M/P"},
        {"id":259,"q":"On the IS-LM graph, moving from B to E after an IS-right shift shows what?","options":["monetary contraction","fiscal contraction","money-demand increase","monetary accommodation"],"a":3,"tag":"monetary_policy","type":"graph","objective":"LO13.3","image":"is_lm_curves.png","primarySkill":"monetary_policy_lm_shift","feedback":"B to E shifts LM right on the new IS curve."},
        {"id":260,"q":"Monetary contraction during fiscal expansion has what definite result?","options":["r rises","Y rises","Y falls","r falls"],"a":0,"tag":"monetary_policy","type":"integration","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"IS-right and LM-left both raise the interest rate."},
        {"id":261,"q":"A lower money supply raises r, which lowers investment. What curve records the final reduction in Y?","options":["shift of IS right","movement along IS","movement along LRAS","shift of taxes"],"a":1,"tag":"monetary_policy","type":"multi-step","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"The LM shift changes r; the economy moves along the existing IS curve as investment responds."},
        {"id":262,"q":"Why might monetary policy have little effect in a liquidity trap?","options":["IS must be vertical at all rates","taxes cannot affect demand","LM may be very flat at low r","money demand is zero"],"a":2,"tag":"monetary_policy","type":"interpretation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Additional money may not lower rates much when people willingly hold it."},
        {"id":263,"q":"If the central bank offsets a money-demand increase exactly, what happens to LM?","options":["it shifts left","it shifts right","it becomes IS","it remains in its original position"],"a":3,"tag":"monetary_policy","type":"application","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"The rightward money-supply response cancels the leftward money-demand shock."},
        {"id":264,"q":"What is the direct variable controlled by open-market operations in the model?","options":["nominal money supply","government purchases","autonomous consumption","natural output"],"a":0,"tag":"monetary_policy","type":"definition","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Open-market operations change reserves and the money supply."},
        {"id":265,"q":"M/P must rise by 75 to hit a lower target r. If P=16, what nominal M increase is needed?","options":["75","1,200","480","1600"],"a":1,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Nominal money must rise by 75×16=1,200.","hint":"ΔM = P × Δ(M/P)."},
        {"id":266,"q":"M=4,000. P falls from 20 to 16. If money demand is 300−25r, what happens to r?","options":["rises from 2 to 4","falls from 5 to 4","falls from 4 to 2","stays at 4"],"a":2,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"M/P rises from 200 to 250. Set 300−25r to each value: r falls from 4 to 2.","hint":"Lower P raises M/P."},
        {"id":267,"q":"At P=10, Y=1,500. At P=5, real balances double and Y rises to 1,900. Which AD slope logic is shown?","options":["lower P is associated with lower Y","P changes shift LRAS only","Y is unrelated to P","lower P is associated with higher Y"],"a":3,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"The AD curve slopes downward because lower P raises demand-side output in IS-LM."},
        {"id":268,"q":"A rise in expected future income raises consumption at each P. What happens to AD?","options":["AD right through IS","AD shifts left through LM","movement up along AD","LRAS shifts left"],"a":0,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Higher consumption shifts IS right at every price level."},
        {"id":269,"q":"Which answer wrongly says AD slopes down because goods are cheaper only?","options":["using M/P in the derivation","ignoring real-balance & interest-rate channel","tracing LM shifts as P changes","connecting lower r to higher investment"],"a":1,"tag":"aggregate_demand","type":"trap","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"In this IS-LM derivation, the formal channel is M/P, LM, r, and investment.","commonError":"using a vague price story instead of IS-LM logic"},
        {"id":270,"q":"In the AD panel, moving from AD1 to AD2 at price P2 changes output from what to what?","options":["Y3 to Y2","Y1 to Y2","Y2 to Y3","Y4 to Y3"],"a":2,"tag":"aggregate_demand","type":"graph","objective":"LO13.4","image":"is_lm_ad.png","primarySkill":"aggregate_demand_from_islm","feedback":"At P2, AD2 lies to the right of AD1."},
        {"id":271,"q":"If P falls but taxes rise at the same time, what is ambiguous?","options":["M/P because P fell","the direction of IS from taxes","whether AD has axes","Y since LM-right & IS-left oppose"],"a":3,"tag":"aggregate_demand","type":"integration","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Lower P stimulates through LM; higher taxes contract through IS."},
        {"id":272,"q":"How do you derive one point on AD from IS-LM?","options":["choose P, compute M/P, solve IS-LM for Y, plot P-Y","choose r, plot it against taxes, then infer P","choose G, ignore LM, plot r-Y","choose LRAS, set all demand shocks to zero"],"a":0,"tag":"aggregate_demand","type":"multi-step","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Each AD point comes from an IS-LM equilibrium at a particular price level."},
        {"id":273,"q":"Why does monetary expansion shift AD rather than move along AD?","options":["P changes with no policy shift","M changes at every price level","the economy moves to another point on AD","LRAS changes automatically"],"a":1,"tag":"aggregate_demand","type":"interpretation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"A new nominal money supply changes real balances for every possible P."},
        {"id":274,"q":"What happens to AD if money demand rises at each Y and r?","options":["AD shifts right","movement down AD","AD shifts left","LRAS shifts right"],"a":2,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Higher money demand shifts LM left at each price level, lowering Y."},
        {"id":275,"q":"What does “derived demand curve” mean here?","options":["AD is guessed from consumer tastes only","AD is a supply curve with a new name","AD is independent of IS-LM","AD is built from eq. outcomes in another model"],"a":3,"tag":"aggregate_demand","type":"definition","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"The AD curve is generated by solving IS-LM at different price levels."},
        {"id":276,"q":"Which answer incorrectly shifts LRAS during AD derivation?","options":["lower P raises productive capacity immediately","lower P raises M/P","lower P shifts LM right","lower P raises Y through demand"],"a":0,"tag":"aggregate_demand","type":"trap","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Changing P in this short-run derivation changes demand conditions, not potential output.","commonError":"confusing demand with long-run supply"},
        {"id":277,"q":"Nominal r is 0% and expected inflation is −6%. What is the approximate real interest rate?","options":["0%","6%","−6%","3%"],"a":1,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Real rate ≈ 0 − (−6)=6%.","hint":"Deflation raises real rates."},
        {"id":278,"q":"Debt is 2,000. P falls from 100 to 75. By what percent does debt/P rise?","options":["25%","75%","about 33.3%","100%"],"a":2,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Debt/P rises from 20 to 26.67, a 33.3% increase.","hint":"Compare 26.67 to 20."},
        {"id":279,"q":"If banking panic raises money demand and reduces lending, what IS-LM pattern is likely?","options":["LM-right plus IS-right","IS-right only","LM-right only","LM-left plus IS-left"],"a":3,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Liquidity demand tightens money markets; credit disruption lowers spending."},
        {"id":280,"q":"Which response misuses the AD graph for Depression mechanisms?","options":["label any fall in Y as a movement along AD caused by lower P","show AD shifting left from spending collapse","show LM-left from money contraction","show IS-left from investment collapse"],"a":0,"tag":"great_depression","type":"trap","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"A recessionary demand collapse is an AD shift, not merely movement along AD.","commonError":"turning demand collapse into AD movement"},
        {"id":281,"q":"On the AD-SRAS panel, which point has output Y1?","options":["B","A","C","D"],"a":1,"tag":"great_depression","type":"graph","objective":"LO13.5","image":"is_lm_lras.png","primarySkill":"depression_crisis_mechanisms","feedback":"Point A is plotted at Y1."},
        {"id":282,"q":"Why can monetary expansion fight a Depression slump through two channels?","options":["it raises taxes and lowers consumption","it reduces real balances","LM-right lowers r & expectations may improve IS","it shifts LRAS left"],"a":2,"tag":"great_depression","type":"integration","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Money growth can ease current rates and reduce deflation expectations."},
        {"id":283,"q":"Deflation raises real debt burdens, defaults rise, banks fail, lending falls. What is the demand effect?","options":["IS shifts right","LM shifts right only","LRAS shifts right","IS shifts left"],"a":3,"tag":"great_depression","type":"multi-step","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Credit distress reduces spending and investment."},
        {"id":284,"q":"Why is “prices fell” not a complete Depression explanation?","options":["the effect depends on M/P, debts, expectations, & banking","prices cannot affect demand","prices always fix recessions","prices only change LRAS"],"a":0,"tag":"great_depression","type":"interpretation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Falling prices can help through M/P but hurt through other channels."},
        {"id":285,"q":"If the central bank lets M fall while P also falls, what happens to M/P?","options":["must rise","ambiguous without magnitudes","must fall","must stay fixed"],"a":1,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"M/P depends on the relative changes in nominal money and the price level."},
        {"id":286,"q":"What does debt-deflation shift most directly through?","options":["government purchases only","labor productivity only","spending & financial distress","the graph scale only"],"a":2,"tag":"great_depression","type":"definition","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Higher real debt burdens weaken borrower spending and balance sheets."},
        {"id":287,"q":"M falls from 1,000 to 800 while P falls from 10 to 8. What happens to M/P?","options":["it falls to 80","it rises to 125","it falls to 64","it stays at 100"],"a":3,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Old M/P=100; new M/P=100.","hint":"Both M and P fell by 20%."}
    ],
    "elite": [
        {"id":300,"q":"C = 400 + 0.8(Y − 500), I = 700 − 40r, G = 900. What is the IS equation solved for Y?","options":["Y = 6,000 − 40r","Y = 8,000 − 200r","Y = 8,000 + 200r","Y = 2,000 − 160r"],"a":1,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Set Y = C+I+G = 400+0.8Y−400+700−40r+900 = 1,600+0.8Y−40r. Thus 0.2Y=1,600−40r.","hint":"Collect Y terms after substituting C, I, and G."},
        {"id":301,"q":"In the IS equation Y = 5,000 − 100r, what happens to goods-market equilibrium income if r rises from 3 to 5?","options":["Y rises by 200","Y falls by 100","Y falls by 200","Y rises by 500"],"a":2,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The interest-rate increase is 2 points, and −100×2 = −200."},
        {"id":302,"q":"If investment becomes less interest-sensitive while autonomous spending is unchanged, what changes on the IS diagram?","options":["IS shifts right automatically","IS shifts left by the multiplier","LM rotates into IS","IS becomes steeper without a required shift"],"a":3,"tag":"is_curve","type":"integration","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Changing interest sensitivity alters the slope; changing autonomous spending shifts the curve."},
        {"id":303,"q":"Which answer best avoids double-counting a fiscal shock in IS-LM?","options":["shift IS once, then let the new intersection determine r & Y","shift IS and then add the full multiplier again","shift LM because G is government policy","move along IS and also shift IS left"],"a":0,"tag":"is_curve","type":"trap","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The curve shift summarizes the spending effect. The intersection handles the endogenous variables.","commonError":"double-counting the multiplier after shifting IS"},
        {"id":304,"q":"On the IS graph, suppose the economy moves from a point on IS1 to the same interest rate on IS3. What changed?","options":["r fell along IS1 only","auto. spending rose enough to shift IS right twice","money demand fell along LM","the axis scale changed but behavior did not"],"a":1,"tag":"is_curve","type":"graph","objective":"LO12.1","image":"is_curves.png","primarySkill":"is_curve_goods_market","feedback":"A new IS curve at the same interest rate indicates a shift in planned spending, not a movement along one curve."},
        {"id":305,"q":"A firm tax credit raises investment at each interest rate. In IS-LM, what is the first curve movement?","options":["LM shifts right","AD moves down along itself","IS shifts right","LRAS shifts left"],"a":2,"tag":"is_curve","type":"application","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The credit changes investment demand directly, which is an IS shift."},
        {"id":306,"q":"A cut in taxes raises consumption, then higher income raises money demand. Which curve shift comes first?","options":["LM shifts right before IS moves","LRAS shifts first because taxes changed","AD moves along before IS-LM changes","IS right before the movement along LM"],"a":3,"tag":"is_curve","type":"multi-step","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Taxes act through spending first; money demand rises after income increases."},
        {"id":307,"q":"Why is the IS curve not the same as the investment demand curve?","options":["IS includes the multiplier effect on total Y","IS excludes consumption and government spending","IS uses price instead of interest rate","IS is vertical whenever investment slopes down"],"a":0,"tag":"is_curve","type":"interpretation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Investment demand is one component; IS maps interest-rate changes through spending into equilibrium income."},
        {"id":308,"q":"A student argues that an IS-right shift must raise output by the full simple multiplier in IS-LM. What is missing?","options":["prices must be flexible immediately","higher r can crowd out part of I","LRAS must also shift right","money demand must be zero"],"a":1,"tag":"is_curve","type":"trap","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"With an upward-sloping LM curve, the interest-rate increase dampens the output gain."},
        {"id":309,"q":"If desired saving rises at each income level, what happens to the IS curve in the standard setup?","options":["IS shifts right because saving is investment","LM shifts right because money balances rise","IS shifts left because spending falls","LRAS shifts right because thrift raises capacity"],"a":2,"tag":"is_curve","type":"application","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Higher desired saving means lower consumption demand at a given income, reducing planned expenditure."},
        {"id":310,"q":"Which phrase best captures the IS curve?","options":["money-market equilibrium traced across income","long-run output determined by technology","inflation adjustment through expected prices","goods-market eq. traced across rs"],"a":3,"tag":"is_curve","type":"definition","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"IS connects interest rates to goods-market equilibrium income."},
        {"id":311,"q":"Money demand is L(Y,r)=0.4Y−25r. M=2,500 and P=10. Solve LM for r as a function of Y.","options":["r = 0.016Y − 10","r = 0.4Y − 250","r = 10 − 0.016Y","r = 0.025Y − 16"],"a":0,"tag":"lm_curve","type":"calculation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Set 0.4Y−25r=250. Then 25r=0.4Y−250, so r=0.016Y−10.","hint":"Set L(Y,r)=M/P and solve for r."},
        {"id":312,"q":"Money demand is 500 + 0.2Y − 40r. If Y=1,500 and P=8, what M is needed for r=5?","options":["600","4,800","5,600","3,200"],"a":1,"tag":"lm_curve","type":"calculation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Real demand is 500+300−200=600. Nominal M = 600×8=4,800.","hint":"Target r fixes real money demand; multiply by P."},
        {"id":313,"q":"A money-demand shock raises r while output falls. Which curve moved first?","options":["IS shifted right","AD shifted right first","LM shifted left","LRAS shifted right"],"a":2,"tag":"lm_curve","type":"integration","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Higher money demand tightens money markets, raising r and lowering income through investment."},
        {"id":314,"q":"Which response confuses a money-demand shock with a money-supply shock?","options":["higher money demand shifts LM left","higher M shifts LM right","lower M shifts LM left","higher Md is treated as if the Fed increased M"],"a":3,"tag":"lm_curve","type":"trap","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"A rise in money demand and a rise in money supply move LM in opposite directions.","commonError":"mixing money demand and money supply shocks"},
        {"id":315,"q":"On the LM graph, if the economy is at a given Y and moves from LM3 to LM1, what happens to r?","options":["r rises","r falls","r is fixed by IS","Y must be zero"],"a":0,"tag":"lm_curve","type":"graph","objective":"LO12.2","image":"lm_curves.png","primarySkill":"lm_curve_money_market","feedback":"Moving leftward across LM curves at a fixed income means tighter real balances and a higher interest rate."},
        {"id":316,"q":"If the central bank prevents r from rising after an IS-right shock, what must happen to LM?","options":["LM shifts left","LM shifts right","IS shifts left","LRAS shifts left"],"a":1,"tag":"lm_curve","type":"application","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"To hold r down when money demand rises with income, the central bank expands money supply."},
        {"id":317,"q":"P rises, M is unchanged, and investment later falls. What links those events?","options":["M/P rises, LM shifts right, and r falls","IS shifts right before money changes","M/P falls, LM shifts left, and r rises","LRAS shifts right and lowers r"],"a":2,"tag":"lm_curve","type":"multi-step","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"A higher price level reduces real balances, tightening the money market."},
        {"id":318,"q":"Why is LM not a money-supply curve?","options":["LM ignores money demand","LM plots price against output","LM only shows government purchases","LM is an eq. locus using both M & Md"],"a":3,"tag":"lm_curve","type":"interpretation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"LM combines the fixed real money supply with the money-demand schedule to find equilibrium rates."},
        {"id":319,"q":"Which answer incorrectly says LM shifts because Y changes?","options":["higher Y shifts LM left","higher M shifts LM right","higher P shifts LM left","higher money demand shifts LM left"],"a":0,"tag":"lm_curve","type":"trap","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"Y is on the horizontal axis. A new Y is movement along LM unless M/P or money demand behavior changes.","commonError":"shifting LM when moving along LM"},
        {"id":320,"q":"What makes LM steep in the classic diagram?","options":["investment changes strongly with r","Md changes strongly with Y & weakly with r","taxes respond to inflation","consumption is independent of income"],"a":1,"tag":"lm_curve","type":"application","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"A steep LM means income changes require large rate movements to clear the money market."},
        {"id":321,"q":"What does an LM-right shift mean at the same income level?","options":["a higher equilibrium interest rate","a lower price level is impossible","a lower equilibrium interest rate","planned spending is unchanged by definition"],"a":2,"tag":"lm_curve","type":"definition","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"More real balances or lower money demand reduce the rate needed to clear the money market."},
        {"id":322,"q":"IS: Y=4,000−200r. LM: r=0.005Y−6. If autonomous spending raises the IS intercept to 4,600, what is new Y?","options":["2,900","2,700","3,100","3,300"],"a":0,"tag":"is_lm_equilibrium","type":"calculation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"New IS: Y=4,600−200(0.005Y−6)=5,800−Y, so Y=2,900."},
        {"id":323,"q":"IS: Y=3,200−160r. LM: Y=800+240r. What is the equilibrium interest rate?","options":["5","6","7","8"],"a":1,"tag":"is_lm_equilibrium","type":"calculation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Set 3,200−160r = 800+240r. Then 2,400=400r and r=6."},
        {"id":324,"q":"A fiscal expansion with full monetary accommodation does what compared with no accommodation?","options":["raises r more and Y less","leaves IS unchanged","raises Y more & raises r less","moves only along AD"],"a":2,"tag":"is_lm_equilibrium","type":"integration","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Accommodation shifts LM right, reducing crowding out."},
        {"id":325,"q":"Which interpretation incorrectly treats policy accommodation as the original fiscal shock?","options":["calling higher G the IS-right shock","calling LM-right the central-bank response","calling the new point the equilibrium","calling the LM-right shift the cause of higher G"],"a":3,"tag":"is_lm_equilibrium","type":"trap","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"The fiscal shock and monetary response are separate steps.","commonError":"merging the shock with the policy response"},
        {"id":326,"q":"On the IS-LM graph, which point is consistent with IS3 and LM2?","options":["C","B","E","G"],"a":0,"tag":"is_lm_equilibrium","type":"graph","objective":"LO12.3","image":"is_lm_curves.png","primarySkill":"is_lm_equilibrium","feedback":"Point C is the intersection of IS3 and LM2."},
        {"id":327,"q":"If the economy begins below natural output, what can IS-LM show?","options":["LRAS must instantly shift right","demand-side policy can raise short-run Y","the price level cannot matter later","money demand is irrelevant"],"a":1,"tag":"is_lm_equilibrium","type":"application","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"IS-LM explains short-run demand management before long-run price adjustment is complete."},
        {"id":328,"q":"A negative IS shock lowers Y. Automatic stabilizers raise transfers. What does that response do in IS-LM?","options":["shifts LM left by definition","moves the economy down a fixed IS curve","partly shifts IS back right","shifts LRAS left immediately"],"a":2,"tag":"is_lm_equilibrium","type":"multi-step","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Transfers raise disposable income and consumption, cushioning the IS-left movement."},
        {"id":329,"q":"Why can the same final Y appear after different shocks?","options":["the axes have no meaning","IS and LM cannot both shift","Y alone identifies every shock","r & curve positions may differ"],"a":3,"tag":"is_lm_equilibrium","type":"interpretation","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"A full diagnosis uses both variables and the shifted curves, not output alone."},
        {"id":330,"q":"Which answer ignores the endogeneity of r?","options":["assume r stays fixed after IS unless the prompt says otherwise","read r from the new IS-LM intersection","let LM determine how r changes","use r to infer investment changes"],"a":0,"tag":"is_lm_equilibrium","type":"trap","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"In the standard model, r is solved inside the system unless policy pegs it.","commonError":"holding r fixed without a reason"},
        {"id":331,"q":"Which combination most clearly raises Y without changing r much?","options":["IS shifts right and LM shifts left","IS right & LM right together","IS shifts left and LM shifts left","LM shifts left alone"],"a":1,"tag":"is_lm_equilibrium","type":"application","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"The two rightward shifts both raise output while their interest-rate effects offset."},
        {"id":332,"q":"What makes IS-LM a simultaneous-equilibrium model?","options":["the price level changes every second","only the goods market is solved","Y & r must satisfy both markets at once","natural output is chosen first"],"a":2,"tag":"is_lm_equilibrium","type":"definition","objective":"LO12.3","primarySkill":"is_lm_equilibrium","feedback":"Neither curve alone gives the full short-run equilibrium."},
        {"id":333,"q":"A foreign recession reduces exports in a closed-economy-style IS-LM practice item. Which domestic curve moves first?","options":["IS shifts left","LM shifts left","LM shifts right","LRAS shifts right"],"a":0,"tag":"shocks","type":"application","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Lower net export demand acts like lower autonomous spending."},
        {"id":334,"q":"A safe-asset panic raises money demand while firms cut investment. What happens to Y?","options":["Y rises from both forces","Y falls from both IS-left & LM-left forces","Y is unchanged by definition","Y rises unless P changes"],"a":1,"tag":"shocks","type":"application","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Both curve shifts reduce output."},
        {"id":335,"q":"On the IS-LM graph, which move shows a liquidity shock at unchanged IS2?","options":["D to B","D to F","D to C","A to B"],"a":2,"tag":"shocks","type":"graph","objective":"LO13.1","image":"is_lm_curves.png","primarySkill":"shock_transmission","feedback":"D and C share IS2; the LM curve shifts left."},
        {"id":336,"q":"Which diagnosis is underidentified from the observation “Y fell”?","options":["identifying LM-left when r rose","identifying IS-left when r fell","using both Y and r to infer a curve","choosing IS-left without checking r"],"a":3,"tag":"shocks","type":"trap","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Output alone is not enough; the interest-rate direction helps identify the shock.","commonError":"using one outcome to identify the shock"},
        {"id":337,"q":"A negative investment shock is 90, MPC=0.7, and the LM response crowds out none because r falls enough to support I. What is the simple-cross ΔY?","options":["−300","−90","−210","−270"],"a":0,"tag":"shocks","type":"calculation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The multiplier is 1/(0.3)=3.333, so 90×3.333=300.","hint":"Round to the nearest whole number."},
        {"id":338,"q":"At the initial r, a money-demand shock raises desired real balances by 45. P=12. The central bank increases M by 360. How much real shock remains?","options":["0","15","30","45"],"a":1,"tag":"shocks","type":"calculation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The money increase supplies 360/12=30 real balances. The remaining excess demand is 45−30=15.","hint":"Convert nominal policy into real balances."},
        {"id":339,"q":"A shock lowers Y and raises r. Which policy can offset both movements?","options":["tax increase","money-supply cut","monetary expansion","lower transfers"],"a":2,"tag":"shocks","type":"integration","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The initial pattern is LM-left; monetary expansion shifts LM back right."},
        {"id":340,"q":"A shock lowers Y and lowers r. Which policy most directly offsets the original curve shift?","options":["money-supply cut","tax increase","higher money demand","fiscal expansion"],"a":3,"tag":"shocks","type":"integration","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The initial pattern is IS-left; fiscal expansion pushes IS back right."},
        {"id":341,"q":"A spending shock lowers Y, which lowers money demand, which changes r. What is endogenous in that chain?","options":["Y and r","the initial spending shock","the policy label","the axis names"],"a":0,"tag":"shocks","type":"multi-step","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"The shock is imposed; income and interest rates are solved inside the model."},
        {"id":342,"q":"Why can an IS-left shock look like “easier money” if you only watch r?","options":["money supply must have increased","r falls since Md falls with Y","LM must have shifted right","prices must have risen"],"a":1,"tag":"shocks","type":"interpretation","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"Lower income reduces transactions demand for money, lowering r along LM."},
        {"id":343,"q":"Which answer would corrupt an adaptive diagnosis of shocks?","options":["separating money-demand and IS shocks","using r to distinguish curve shifts","tagging a pure multiplier exercise as a Depression banking shock","recording the objective tied to the causal mechanism"],"a":2,"tag":"shocks","type":"trap","objective":"LO13.1","primarySkill":"shock_transmission","feedback":"A diagnostic tag should match the mechanism being tested, not just any calculation.","commonError":"cross-tagging unrelated skills"},
        {"id":344,"q":"C=300+0.75(Y−400), I=500−40r, G rises by 80. What is the horizontal IS shift before LM feedback?","options":["80","240","400","320"],"a":3,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"The multiplier is 4, so the IS curve shifts right by 320 in income units.","hint":"Horizontal IS shift = multiplier × ΔG."},
        {"id":345,"q":"MPC=0.6. A tax cut of 75 is paired with a G cut of 30. What is simple-cross net ΔY?","options":["37.5","75","112.5","−37.5"],"a":0,"tag":"fiscal_policy","type":"calculation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Tax cut effect is +112.5; G cut effect is −75; net +37.5.","hint":"Compute fiscal components separately."},
        {"id":346,"q":"Which answer hides the financing side of fiscal policy?","options":["noting G shifts IS right","claiming deficits have no possible effect beyond the initial IS shift","noting taxes affect consumption","noting r may crowd out investment"],"a":1,"tag":"fiscal_policy","type":"trap","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"IS-LM often abstracts from debt dynamics, but financing assumptions can matter in broader analysis.","commonError":"ignoring stated financing assumptions"},
        {"id":347,"q":"If households expect future taxes after a deficit-financed G increase, what can weaken IS-right movement?","options":["higher money supply automatically","lower money demand by law","higher saving out of current Y","a required LM-right shift"],"a":2,"tag":"fiscal_policy","type":"application","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Forward-looking saving can offset some consumption response."},
        {"id":348,"q":"On the IS-LM graph, which point shows fiscal expansion with no monetary accommodation from A?","options":["E","G","H","B"],"a":3,"tag":"fiscal_policy","type":"graph","objective":"LO13.2","image":"is_lm_curves.png","primarySkill":"fiscal_policy_is_shift","feedback":"A to B shifts IS right while LM1 stays fixed."},
        {"id":349,"q":"A fiscal expansion aimed at raising Y while holding r fixed requires what mix?","options":["IS right & LM right","IS right and LM left","IS left and LM right","IS left and LM left"],"a":0,"tag":"fiscal_policy","type":"integration","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"The LM-right shift offsets upward pressure on r."},
        {"id":350,"q":"G rises, Y rises, money demand rises, and r rises. Which part is endogenous?","options":["the initial G increase","Y and r adjustments","the policy announcement only","the axis labels"],"a":1,"tag":"fiscal_policy","type":"multi-step","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Fiscal policy shifts IS; income and interest rates are solved after the shift."},
        {"id":351,"q":"Why is a tax multiplier smaller in absolute value than the G multiplier?","options":["taxes do not affect disposable income","G changes money supply directly","T work through MPC before the multiplier process","investment ignores interest rates"],"a":2,"tag":"fiscal_policy","type":"interpretation","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"A dollar of tax change changes first-round consumption by less than a dollar."},
        {"id":352,"q":"If the economy is at the zero lower bound in a richer model, what happens to fiscal crowding out?","options":["it must be complete","IS cannot shift","taxes stop affecting consumption","it may be weaker since r cannot rise much"],"a":3,"tag":"fiscal_policy","type":"application","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"When interest rates are constrained, the usual r-based crowding-out channel weakens."},
        {"id":353,"q":"Which answer confuses deficit size with the IS shift?","options":["larger deficit always means a larger IS-right shift","larger G can shift IS right","higher T can shift IS left","transfers may raise consumption"],"a":0,"tag":"fiscal_policy","type":"trap","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"The composition of the deficit matters: G, T, and transfers have different demand effects.","commonError":"using deficit size instead of policy composition"},
        {"id":354,"q":"What is the clean IS-LM statement of crowding out?","options":["fiscal expansion lowers r, reducing money supply","fiscal expansion raises r, reducing interest-sensitive I","tax cuts lower consumption through MPC","G changes LRAS immediately"],"a":1,"tag":"fiscal_policy","type":"definition","objective":"LO13.2","primarySkill":"fiscal_policy_is_shift","feedback":"Crowding out is the investment offset created by the interest-rate response."},
        {"id":355,"q":"Money demand is 600+0.1Y−40r. At Y=2,000 and P=5, what M supports r=10?","options":["400","3,000","2,000","4,000"],"a":2,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Real demand is 600+200−400=400. Nominal M=400×5=2,000.","hint":"Target r pins down real demand."},
        {"id":356,"q":"Money demand is 700−50r. P=10. To lower r from 8 to 6, how much must M increase?","options":["100","500","2,000","1,000"],"a":3,"tag":"monetary_policy","type":"calculation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Real demand rises from 300 to 400; nominal money must rise by 100×10=1,000.","hint":"Lower r requires more supplied real balances."},
        {"id":357,"q":"Which answer wrongly treats monetary expansion as increasing output without an investment channel?","options":["Y rises even if r & I do not change","lower r can raise investment","higher M/P shifts LM right","investment response affects Y"],"a":0,"tag":"monetary_policy","type":"trap","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"In IS-LM, output rises because lower r stimulates planned expenditure.","commonError":"skipping the transmission channel"},
        {"id":358,"q":"If expected inflation rises, how can monetary policy transmission change in a richer model?","options":["nominal money stops mattering","real rs may fall for a given nominal r","G must fall automatically","IS becomes irrelevant"],"a":1,"tag":"monetary_policy","type":"application","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Expected inflation affects real borrowing costs, which influence investment."},
        {"id":359,"q":"On the IS-LM graph, which point shows monetary expansion from D while IS2 stays fixed?","options":["C","B","G","F"],"a":2,"tag":"monetary_policy","type":"graph","objective":"LO13.3","image":"is_lm_curves.png","primarySkill":"monetary_policy_lm_shift","feedback":"D to G is LM2 to LM3 on IS2."},
        {"id":360,"q":"A central bank defending r after money demand rises must do what?","options":["cut M to reduce liquidity","raise G to shift IS","raise taxes to lower consumption","increase M enough to satisfy higher demand"],"a":3,"tag":"monetary_policy","type":"integration","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"At the same target rate, higher demand requires more supplied balances."},
        {"id":361,"q":"M rises but P rises proportionally at the same time. What happens to LM?","options":["it may not shift if M/P is unchanged","it must shift right","it must shift left","it becomes vertical"],"a":0,"tag":"monetary_policy","type":"multi-step","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"LM depends on real balances, not nominal money by itself."},
        {"id":362,"q":"Why can a contractionary monetary policy lower inflationary pressure later?","options":["it raises G directly","it reduces AD by lowering I & Y","it shifts LRAS right","it raises consumption immediately"],"a":1,"tag":"monetary_policy","type":"interpretation","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Tighter money lowers demand through the interest-rate channel."},
        {"id":363,"q":"If investment demand is extremely interest-sensitive, monetary expansion does what to Y?","options":["barely changes Y","must lower Y","raises Y strongly for a given fall in r","only changes taxes"],"a":2,"tag":"monetary_policy","type":"application","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"A given rate reduction produces a large investment response."},
        {"id":364,"q":"Which statement misreads an LM-right shift?","options":["it means r is lower at each income","it can result from higher M/P","it can support higher Y through lower r","it means Y is higher at every r on the LM graph"],"a":3,"tag":"monetary_policy","type":"trap","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"LM is drawn with r as a function of Y; rightward means lower r at the same Y.","commonError":"reading the LM shift at the wrong fixed variable"},
        {"id":365,"q":"What separates monetary policy from a money-demand shock?","options":["policy changes supply; demand shocks change desired holdings","both always shift IS","both always raise G","neither affects r"],"a":0,"tag":"monetary_policy","type":"definition","objective":"LO13.3","primarySkill":"monetary_policy_lm_shift","feedback":"Supply and demand changes can move LM in opposite directions."},
        {"id":366,"q":"M=5,000. P falls from 25 to 20. Money demand is 350−30r. What happens to r?","options":["rises from 3.33 to 5","falls from 5 to 3.33","falls from 6 to 5","stays at 5"],"a":1,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"M/P rises from 200 to 250. Set 350−30r equal to each; r falls from 5 to about 3.33.","hint":"Compute both real balances first."},
        {"id":367,"q":"At P=8, M/P=300. At P=6, M/P=400. If IS gives ΔY=2×Δ(M/P) through the LM channel in this simplified item, what is ΔY?","options":["+100","−200","+200","+50"],"a":2,"tag":"aggregate_demand","type":"calculation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Real balances rise by 100; the simplified output response is 2×100=200.","hint":"Use the response rule stated in the question."},
        {"id":368,"q":"Expansionary fiscal policy and a higher price level occur together. What is ambiguous?","options":["r because both forces lower it","M/P because P does not matter","IS because fiscal policy cannot shift it","Y because IS-right and LM-left oppose"],"a":3,"tag":"aggregate_demand","type":"integration","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"Fiscal expansion raises demand; higher P lowers real balances."},
        {"id":369,"q":"Which answer confuses an AD shift with a movement along AD?","options":["saying a lower P shifts AD right","saying higher G shifts AD right","saying lower M shifts AD left","saying lower investment shifts AD left"],"a":0,"tag":"aggregate_demand","type":"trap","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"A lower P moves along AD unless another determinant changes.","commonError":"price-level movement mistaken for AD shift"},
        {"id":370,"q":"On the AD graph, which point is on AD3 at P1?","options":["1","3","2","6"],"a":1,"tag":"aggregate_demand","type":"graph","objective":"LO13.4","image":"is_lm_ad.png","primarySkill":"aggregate_demand_from_islm","feedback":"Point 3 lies on AD3 at the highest shown price level."},
        {"id":371,"q":"If the central bank raises M exactly as P rises, what happens to the LM position for AD derivation?","options":["it must shift left","it must shift right","it may stay unchanged if M/P is unchanged","IS must shift left"],"a":2,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"LM depends on real balances, so proportional M and P changes can leave M/P unchanged."},
        {"id":372,"q":"A fall in P raises real balances. Why does that not shift IS directly?","options":["P directly changes G","P directly changes taxes","P makes investment autonomous","P affects money markets first in this derivation"],"a":3,"tag":"aggregate_demand","type":"multi-step","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"The IS effect comes after r changes; the first curve movement is LM."},
        {"id":373,"q":"Why does a demand shock shift the entire AD curve?","options":["it changes eq. Y at any given P","it changes only the current P point","it changes the vertical axis","it fixes Y at LRAS"],"a":0,"tag":"aggregate_demand","type":"interpretation","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"A shift means the P-Y relationship changes for every price level."},
        {"id":374,"q":"If investment becomes more sensitive to r, how can the AD curve change?","options":["AD becomes vertical","AD becomes flatter since P-induced r changes move Y more","AD shifts left automatically","LRAS becomes horizontal"],"a":1,"tag":"aggregate_demand","type":"application","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"The real-balance channel has a stronger output response when investment reacts more to r."},
        {"id":375,"q":"What two diagrams are being connected in the AD derivation graph?","options":["PPF and labor market","money demand and loanable funds only","IS-LM and P-Y aggregate demand","LRAS and Phillips curve only"],"a":2,"tag":"aggregate_demand","type":"definition","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"The derivation maps IS-LM equilibria into points in P-Y space."},
        {"id":376,"q":"Which answer loses the fixed-M assumption behind downward AD?","options":["computing M/P after P changes","holding IS fixed while P changes","moving along AD after a price change","assuming M changes whenever P changes"],"a":3,"tag":"aggregate_demand","type":"trap","objective":"LO13.4","primarySkill":"aggregate_demand_from_islm","feedback":"To derive a given AD curve, nominal M is held fixed while P varies.","commonError":"letting M move during movement along AD"},
        {"id":377,"q":"Nominal r is 1%, expected inflation moves from 0% to −5%. How much does the real rate change?","options":["it rises by 5 pp","it falls by 5 points","it rises by 1 point","it is unchanged"],"a":0,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Real r moves from 1% to 6%.","hint":"Real r ≈ i − πe."},
        {"id":378,"q":"Debt/P rises from 40 to 50 after deflation. What is the percentage increase in real debt burden?","options":["10%","25%","20%","50%"],"a":1,"tag":"great_depression","type":"calculation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"The increase is 10/40 = 25%.","hint":"Percentage change = change/original."},
        {"id":379,"q":"Money contraction lowers M, but falling P partly offsets it. What must you compare?","options":["nominal debt and taxes only","G and LRAS only","percentage changes in M and P","the old equilibrium point only"],"a":2,"tag":"great_depression","type":"integration","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Real balances depend on M/P."},
        {"id":380,"q":"Which answer turns a Depression mechanism into a generic IS-LM slogan?","options":["banking panic can shift LM left","spending collapse can shift IS left","expected deflation can shift IS left","all bad events shift LM left"],"a":3,"tag":"great_depression","type":"trap","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Different mechanisms hit different curves.","commonError":"generic curve assignment"},
        {"id":381,"q":"On the AD-SRAS panel, moving from A to C along AD changes what?","options":["both P and Y rise","P rises and Y falls","P falls and Y rises","Y stays at natural output"],"a":0,"tag":"great_depression","type":"graph","objective":"LO13.5","image":"is_lm_lras.png","primarySkill":"depression_crisis_mechanisms","feedback":"A to C moves to a higher price level and higher output on the shown AD line."},
        {"id":382,"q":"If expected deflation is severe while nominal rates are near zero, what happens to real rates?","options":["they must be negative","they can remain high","they equal zero automatically","they stop affecting investment"],"a":1,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Zero nominal rates do not guarantee low real rates when expected inflation is negative."},
        {"id":383,"q":"A bank panic causes deposit losses, money contraction, and weaker lending. Which combined effect is plausible?","options":["LM right and IS right, raising Y","AD right only","LM left & IS left, reducing Y strongly","LRAS right only"],"a":2,"tag":"great_depression","type":"multi-step","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"The monetary and credit channels reinforce the downturn."},
        {"id":384,"q":"Why should Depression feedback not be tagged as a plain fiscal-policy item?","options":["fiscal tags are always better","calculations cannot use Depression data","IS-LM cannot discuss history","the mechanism is debt, banking, money, or expectations, not G/T"],"a":3,"tag":"great_depression","type":"interpretation","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Diagnostic tags should match the causal channel being tested."},
        {"id":385,"q":"A credible reflation policy can help by doing what?","options":["lowering expected real rates & raising demand","raising real debt burdens","shifting IS left","reducing M/P"],"a":0,"tag":"great_depression","type":"application","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Higher expected inflation lowers real borrowing costs for a given nominal rate."},
        {"id":386,"q":"What is the monetary explanation associated with a severe slump?","options":["government spending rose too much","money contraction & banking failure reduced aggregate demand","LRAS grew too fast","tax cuts overheated demand"],"a":1,"tag":"great_depression","type":"definition","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"The monetary channel emphasizes falling money supply/credit and tighter LM conditions."},
        {"id":387,"q":"Which claim confuses correlation with mechanism?","options":["expected deflation can reduce investment","debt-deflation can reduce spending","prices fell, so falling prices alone caused every change","lower P can raise real balances"],"a":2,"tag":"great_depression","type":"trap","objective":"LO13.5","primarySkill":"depression_crisis_mechanisms","feedback":"Observed timing is not enough; the model channel must be specified.","commonError":"correlation without mechanism"}
    ],
    "legendary": [
        {"id":9000,"q":"C = 300 + 0.75(Y − 400), I = 900 − 50r, G = 700. If r = 4, what is goods-market equilibrium Y?","options":["5,600","5,400","5,800","6,000"],"a":0,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"At r=4, I=700. Y=300+0.75Y−300+700+700 = 1,400+0.75Y, so Y=5,600.","hint":"Substitute r first, then solve Y=PE."},
        {"id":9001,"q":"The IS equation is Y = 7,500 − 250r. If autonomous spending rises by 150 and MPC = 0.75, what is the new IS equation?","options":["Y = 7,650 − 250r","Y = 8,100 − 250r","Y = 8,100 + 250r","Y = 7,500 − 100r"],"a":1,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The spending multiplier is 4, so the intercept rises by 600. The interest sensitivity term is unchanged."},
        {"id":9002,"q":"Investment demand becomes more interest-sensitive while the Fed holds the money supply fixed. What is most likely true after an IS-right fiscal shock?","options":["IS must shift left instead of right","LM becomes horizontal automatically","crowding-out pressure depends more sharply on r response","fiscal policy no longer affects goods demand"],"a":2,"tag":"is_curve","type":"integration","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"A flatter IS means r changes translate into larger investment changes, so the feedback matters more."},
        {"id":9003,"q":"Which answer incorrectly mixes the Keynesian-cross and IS diagrams?","options":["a lower r raises investment and shifts PE up","higher G shifts PE up at each Y","lower taxes raise consumption and shift PE up","a higher r the PE line up since borrowing is costlier"],"a":3,"tag":"is_curve","type":"trap","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"A higher r reduces investment, shifting PE down, not up.","commonError":"wrong sign on interest-sensitive investment"},
        {"id":9004,"q":"Using the IS graph, which comparison identifies a pure shift rather than movement along a curve?","options":["same r, different IS curves","different r, same IS curve","same point, different label","same curve, different axis title"],"a":0,"tag":"is_curve","type":"graph","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"A curve shift changes income at a given interest rate."},
        {"id":9005,"q":"A tax cut raises consumption by 60, and the spending multiplier is 5 before crowding out. What is the initial IS shift in Y-units?","options":["60 to the right","300 to right","300 to the left","12 to the right"],"a":1,"tag":"is_curve","type":"multi-step","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The initial demand expansion is 60×5 = 300 before the LM response."},
        {"id":9006,"q":"Why can two economies with the same IS intercept respond differently to monetary policy?","options":["their IS curves must have identical slopes","the money market never affects IS-LM","their investment sensitivity can differ","taxes cannot affect consumption"],"a":2,"tag":"is_curve","type":"application","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Monetary policy moves r; the IS slope determines how strongly Y responds through investment."},
        {"id":9007,"q":"In deriving IS from the Keynesian cross, what does each lower interest rate do before the IS point is plotted?","options":["lowers investment and shifts PE downward","raises money demand and shifts LM left","changes LRAS and fixes Y","raises investment and shifts PE upward"],"a":3,"tag":"is_curve","type":"interpretation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Each r produces a separate Keynesian-cross equilibrium level of income."},
        {"id":9008,"q":"A higher G and a higher T of equal size occur together. Which simple-cross result is most consistent when MPC<1?","options":["Y rises by less than the G-only multiplier effect","income must fall by the tax multiplier alone","income is unchanged because G equals T","LM shifts right by the balanced-budget amount"],"a":0,"tag":"is_curve","type":"trap","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"G enters PE dollar-for-dollar; taxes reduce consumption only by MPC times the tax change."},
        {"id":9009,"q":"Planned expenditure has autonomous spending of 1,200, MPC = 0.7, and investment term −30r. What is the IS slope term in Y = a − br?","options":["−30r","−100r","−70r","−300r"],"a":1,"tag":"is_curve","type":"calculation","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"The interest term is multiplied by 1/(1−0.7)=3.333, so −30r becomes −100r.","hint":"The multiplier scales the investment term too."},
        {"id":9010,"q":"What is the cleanest way to tell whether an IS change is slope or intercept?","options":["check whether the curve is drawn in blue","assume every policy changes both slope and intercept","ask whether interest sensitivity or auto. spending changed","look only at the final interest rate"],"a":2,"tag":"is_curve","type":"integration","objective":"LO12.1","primarySkill":"is_curve_goods_market","feedback":"Interest sensitivity changes slope; autonomous spending changes the intercept."},
        {"id":9011,"q":"L(Y,r)=0.5Y−50r, M=3,000, P=10. If Y rises from 800 to 1,000 along LM, how much must r change?","options":["fall by 2","rise by 4","fall by 4","rise by 2"],"a":3,"tag":"lm_curve","type":"calculation","objective":"LO12.2","primarySkill":"lm_curve_money_market","feedback":"M/P=300. At Y=800, r=2. At Y=1,000, r=4. The rate rises by 2.","hint":"Solve r at each income."},
