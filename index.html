<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
    
<!-- Title can be changed to whatever the game needs -->
<title>The Command Nexus</title>
   
<style>
/* =========================================
   1. VISUAL DESIGN — SAFE TO EDIT

You can change:
- Colors
- Background images
- Fonts
- Glow effects

Do NOT rename IDs (#gameBox, #mazeTrack, etc.)
or you will break JavaScript connections.
========================================= */
/* =========================================
   1. VISUAL DESIGN — THE COMMAND NEXUS
========================================= */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    color: #e6ecf5;
    background: url('question_background_image.png');
    background-size: cover;
    background-position: center;
}

/* Macro Review overlay — onyx, ivory, restrained gold */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center,
            rgba(245, 214, 130, 0.09),
            rgba(30, 24, 18, 0.34) 48%,
            rgba(3, 5, 12, 0.82) 100%);
    pointer-events:none;
    z-index:-1;
}

.dungeon-container {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
}

/* CENTER BLOCK */
.start-content{
    width: 100%;
    max-width: 460px;
    display:flex;
    flex-direction:column;
    align-items:center;   
    text-align:center;
    padding: 28px 30px;
    border-radius: 18px;
}

/* TITLE — sharper, colder */
.title{
  font-size:64px;
  letter-spacing:4px;
  margin-bottom:10px;
  color:#f0c86a;
  text-align:center;
  text-shadow:
    0 0 10px rgba(240,200,106,0.7),
    0 0 25px rgba(40,90,160,0.5),
    0 3px 8px rgba(0,0,0,0.9);
}

/* SUBTITLE — shift to blue tone */
.subtitle{
  font-size:34px;
  margin-bottom:35px;
  letter-spacing:2px;
  text-align:center;
  color:#7fa8d6;
  text-shadow:
    0 0 12px rgba(80,130,200,0.45),
    0 0 34px rgba(64,96,142,0.55),
    0 3px 8px rgba(0,0,0,0.9);
}

/* TAGLINE */
.tagline{
  margin-bottom:30px;
  font-style:italic;
  opacity:0.9;
  text-align:center;
  color:#c9d4e6;
  text-shadow: 
	  0 2px 6px rgba(0,0,0,0.85),
      0 2px 6px rgba(0,0,0,0.88);
}

/* INPUT — looks like a console panel now */
.name-input{
  width:100%;
  max-width:320px;
  text-align:center;
  padding:15px;
  border-radius:10px;
  border:1px solid rgba(120,170,255,0.45);   
  background: rgba(8,14,28,0.9);          
  color:#e6ecf5;                             
  font-size:20px;
  margin-bottom:20px;
  outline:none;
  box-shadow:
    0 0 12px rgba(80,130,200,0.35),
    inset 0 0 12px rgba(0,0,0,0.7);
}

.name-input:focus{
  border-color: rgba(140,190,255,0.8);
  box-shadow:
    0 0 18px rgba(120,180,255,0.6),
    0 0 35px rgba(40,90,160,0.5),
    inset 0 0 12px rgba(0,0,0,0.8);
}

.start-btn{
  width:100%;
  max-width:320px;
}

.secondary-start-btn{
  margin-top: 10px;
  background: linear-gradient(180deg, #1b5b98, #09213d);
  border-color: rgba(240,200,106,0.56);

/* PLACEHOLDER */
#emailInput::placeholder,
#username::placeholder{
    color: rgba(180,200,230,0.55);
    font-style: italic;
    letter-spacing: 0.5px;
    text-align: center;
}
	
/* =========================================
   2. CORE GAME CONTAINER (#gameBox) — SAFE TO STYLE
========================================= */

#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    margin: 0;
    padding: 18px 20px;
    text-align: center;

    background:
        radial-gradient(circle at center,
            rgba(80,140,220,0.18) 0%,
            rgba(25,70,120,0.42) 46%,
            rgba(8,16,32,0.94) 74%,
            rgba(2,4,10,0.99) 100%);

    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-sizing: border-box;

    box-shadow:
        0 0 22px rgba(80,140,220,0.22),
        0 0 58px rgba(240,200,106,0.10),
        0 0 72px rgba(10,45,95,0.46),
        inset 0 0 42px rgba(0,0,0,0.78);

    border: 1px solid rgba(240,200,106,0.34);
    animation: torchFlicker 6s infinite;
    transition: box-shadow .3s ease, border-color .3s ease;
    position: relative;
}

/* Boss state styling — triggered during boss fights (DO NOT REMOVE) */	
#gameBox.boss-mode {
    border: 2px solid #f0c86a;
    box-shadow:
        0 0 32px rgba(240,200,106,0.52),
        0 0 64px rgba(60,130,220,0.45),
        inset 0 0 42px rgba(0,0,0,0.82);
}

.boss-icon{
    width: 28px;
    height: 28px;
    object-fit: contain;
    pointer-events: none;
}

/* Tier 1 — Demand Cartographer */
.boss10 .boss-icon{
    filter:
        drop-shadow(0 0 6px rgba(240,200,106,0.85))
        drop-shadow(0 0 12px rgba(70,140,220,0.55));
}

/* Tier 2 — Rate Engineer */
.boss20 .boss-icon{
    filter:
        drop-shadow(0 0 8px rgba(110,180,255,0.9))
        drop-shadow(0 0 18px rgba(240,200,106,0.55));
}

/* Tier 3 — Shock Forecaster */
.boss30 .boss-icon{
    filter:
        drop-shadow(0 0 10px rgba(240,200,106,1))
        drop-shadow(0 0 24px rgba(127,29,29,0.85));
}

/* Damage effect when boss/player is hit (visual feedback) */	
.hit {
    box-shadow:
        0 0 60px rgba(127,29,29,0.95),
        0 0 28px rgba(240,200,106,0.35),
        inset 0 0 42px rgba(80,10,18,0.85) !important;
    animation: hitshake 0.4s ease;
}

/* Autosave indicator — positioned relative to gameBox */	
#autosave {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 11px;
    opacity: 0.5;
    font-style: italic;
    color: #c9d4e6;
    text-shadow: 0 0 6px rgba(100,170,255,0.38);
}

/* Adds a graph box for questions with graphs */	
#questionImageBox{
  margin: 0 auto 12px auto;
  text-align: center;
  display: none;
}

#questionImageBox img{
  max-width: 100%;
  width: 420px;
  height: auto;
  border-radius: 10px;
  border: 1px solid rgba(240,200,106,0.24);
  box-shadow:
    0 0 14px rgba(80,140,220,0.22),
    0 0 28px rgba(0,0,0,0.68);
}

	
/* =========================================
   3. TEXT & TYPOGRAPHY SYSTEM — SAFE TO CUSTOMIZE
========================================= */

h2 {
    text-shadow:
        0 0 10px rgba(180,210,255,0.24),

}

    color: #e6ecf5;

/* Boss/summary title — high emphasis text */	
.boss-title {
    font-size: 28px;

    margin-bottom: 15px;

    text-shadow:

/* Area/zone label — subtle contextual info */

    color: #8fb6e6;

    letter-spacing: 3px;

}

/* Boss summary text — left-aligned for readability */	
.boss-q {
    font-style: normal;
    line-height: 1.5;
    font-size: 24px;
    border-left: 3px solid #f0c86a;
    padding-left: 15px;
    margin: 20px 0;
    text-align: left;
    color: #e6ecf5;

.hint-box {
    font-size: 13px;

    margin-top: 15px;
    opacity: 0.84;
    height: 18px;
    text-shadow: 
		0 0 6px rgba(240,200,106,0.28);
}

/* Temporary feedback text (auto fades out) */	
.fade-out-text {
    animation: fadeOut 5s forwards;
    font-weight: bold;
    color: #f0c86a;
    text-shadow:
        0 0 8px rgba(240,200,106,0.55),

        0 2px 5px rgba(0,0,0,0.85);

/* Add styling to Custodian text */	
#message {
    margin-top: 10px;
    font-style: italic;
    letter-spacing: 0.5px;
    text-align: center;
    color: #c9d4e6;

    text-shadow:
        0 0 7px rgba(100,170,255,0.22),

/* Command Nexus override */
.nexus #message,

    color: #9fc7f5;
    font-size: 17px;
    font-style: italic;
    margin-top: 12px;
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: 1px;
    text-shadow:
        0 0 8px rgba(100,170,255,0.45),
        0 0 18px rgba(240,200,106,0.18),
        0 2px 6px rgba(0,0,0,0.85);

/* =========================================
   4. BUTTONS & INTERACTION — SAFE TO CUSTOMIZE
========================================= */

/* Base button styling — applies to all buttons */
button {
    padding: 12px 22px;
    margin: 6px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(180deg, #12345a, #07111f);
    color: #e6ecf5;
    border: 1px solid rgba(240,200,106,0.38);
    border-radius: 8px;
    box-shadow:
       0 0 12px rgba(80,140,220,0.28),
       0 0 24px rgba(10,45,95,0.22),
       inset 0 0 10px rgba(0,0,0,0.68);
    transition: all 0.15s ease;
}

/* Hover feedback — improves interactivity */
button:hover {
    background: linear-gradient(180deg, #1b4f86, #0b1f38);
    border-color: rgba(240,200,106,0.72);
    box-shadow:
        0 0 18px rgba(100,170,255,0.5),
        0 0 34px rgba(240,200,106,0.22),
        inset 0 0 12px rgba(0,0,0,0.7);
    transform: translateY(-2px) scale(1.02);
}

/* Click feedback — simulates button press */	
button:active {
    transform: scale(0.96);
}

/* Answer container — controls layout of choices */	
.answers {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
    width: 100%;
}

/* Individual answer buttons — flexible sizing */		
.answers button {
    flex: 1 1 100%;
    min-height: 60px;
    max-width: 100%;
    padding: 15px;
    font-size: 18px;
    margin: 0;
    background: linear-gradient(180deg,
        rgba(18,54,92,0.98),
        rgba(7,18,34,0.98));
    color: #e6ecf5;
    border: 1px solid rgba(120,180,255,0.34);
    box-shadow:
        0 0 10px rgba(80,140,220,0.18),
        0 0 18px rgba(240,200,106,0.12),
        inset 0 0 14px rgba(0,0,0,0.74);
}

/* Answer hover — a little brighter than base */	
.answers button:hover {
    background: linear-gradient(180deg,
        rgba(28,82,135,0.98),
        rgba(10,34,62,0.98));
    border-color: rgba(240,200,106,0.68);
    box-shadow:
        0 0 18px rgba(100,170,255,0.42),
        0 0 34px rgba(240,200,106,0.22),
        inset 0 0 14px rgba(0,0,0,0.7);
}
	
/* Utility button (fullscreen toggle) — safe to restyle or move */
.fullscreenBtn {

    left: 12px;
    padding: 6px 12px;
    font-size: 12px;

}

.fullscreenBtn:hover {
    background: linear-gradient(180deg, #1a4d82, #0b1d34);
    border-color: rgba(240,200,106,0.62);
    box-shadow:
        0 0 16px rgba(100,170,255,0.44),
        inset 0 0 8px rgba(0,0,0,0.74);
}

.fullscreenBtn:active {
    transform: scale(0.95);
    box-shadow:
        0 0 8px rgba(80,140,220,0.3),
        inset 0 0 10px rgba(0,0,0,0.86);
}

.return-menu-btn{

.continue-btn {

    color: #e6ecf5;
    font-weight: bold;
    padding: 14px 40px;
    font-size: 18px;

.continue-btn:hover {

/* =========================================
   5. PROGRESS & MAZE TRACK — SAFE TO CUSTOMIZE (WITH RULES)
========================================= */

/* Progress bar container — background track */	
#progressBar {
    width: 100%;
    height: 22px;
    background: linear-gradient(180deg,
        rgba(6,14,28,0.96),
        rgba(2,5,12,0.98));
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
    border: 1px solid rgba(120,180,255,0.24);
    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.84),
        0 0 10px rgba(80,140,220,0.18);
}

/* Progress fill — width controlled by JS */		
#progressFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg,
        #123a66,
        #4f9fe8,
        #f0c86a);
    box-shadow:
        0 0 12px rgba(100,170,255,0.46),
        0 0 22px rgba(240,200,106,0.26);
    transition: width 0.4s ease;
}

/* Maze grid layout — 10 columns = 30 total rooms */		
#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 36px);
    justify-content: center;
    gap: 10px;
    margin: 25px auto;
}

/* Individual room cell — default state */		
.maze-box {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border-radius: 6px;
    background: linear-gradient(180deg,
        rgba(10,24,46,0.76),
        rgba(3,8,18,0.9));
    border: 1px solid rgba(120,180,255,0.18);
    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.76),
        0 0 5px rgba(80,140,220,0.1);
    transition: all 0.3s ease;
}

/* Current room highlight — animated pulse */		
.maze-box.active {
    background: radial-gradient(circle,
        rgba(100,170,255,0.48),
        rgba(18,58,102,0.42),
        rgba(3,8,18,0.94));
    border: 2px solid #f0c86a;
    box-shadow:
        0 0 12px rgba(100,170,255,0.78),
        0 0 24px rgba(240,200,106,0.36),
        inset 0 0 12px rgba(0,0,0,0.66);
    z-index: 10;
    animation: activePulse 1s infinite alternate;
}

/* Completed tile */		
.maze-box.completed {
    background: linear-gradient(180deg,
        rgba(24,82,135,0.62),
        rgba(8,24,44,0.9));
    border-color: rgba(240,200,106,0.36);
    box-shadow:
        0 0 8px rgba(80,140,220,0.32),
        inset 0 0 10px rgba(0,0,0,0.72);
}

/* Boss room highlights: 10 Demand, 20 Rate, 30 Shock */
.maze-box:nth-child(10) {
    text-shadow:
        0 0 8px #f0c86a,
        0 0 18px rgba(80,140,220,0.78);
}

.maze-box:nth-child(20) {
    text-shadow:
        0 0 8px #6eb4ff,
        0 0 18px rgba(240,200,106,0.58);
}

.maze-box:nth-child(30) {
    text-shadow:
        0 0 10px #f0c86a,
        0 0 24px rgba(127,29,29,0.9),
        0 0 34px rgba(80,140,220,0.35);
}

/* Streak styling — Command Nexus */
.streak {
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    letter-spacing:0.5px;
    color: rgba(230,236,245,0.95);
    text-shadow:
        0 0 7px rgba(100,170,255,0.34),
        0 2px 5px rgba(0,0,0,0.85);
}

.streak-icon {
    width:22px;
    height:22px;
    object-fit:contain;
    border-radius:50%;
    filter:
        drop-shadow(0 0 8px rgba(100,170,255,0.76))
        drop-shadow(0 0 15px rgba(240,200,106,0.42));
    background: radial-gradient(circle,
        rgba(100,170,255,0.48) 0%,
        rgba(240,200,106,0.28) 42%,
        transparent 72%);
    animation: pulseControl 2.2s ease-in-out infinite;
}

/* Layout container for artifact slots */	
.vaultRow {
    display: flex;
    justify-content: center;
    align-items:flex-end;
    gap: 15px;
    flex-wrap:wrap;
}

/* Individual artifact slot (default = locked state) */  	
.artifactSlot {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 70px;
    text-align:center;
    opacity: .26;
    transition: all .4s ease;
}

/* Locked artifact image (dimmed effect) */   	
.artifactSlot img {
    width: 45px;
    margin-bottom:4px;
    filter:
        brightness(0.28)
        contrast(0.86)
        saturate(0.75);
    transition: all .4s ease;
}

/* Artifact label text */	
.artifactSlot span {
    display: block;
    font-size: 13px;
    color: rgba(180,200,230,0.42);
    margin-top: 8px;
    line-height: 1.2;
}

/* Glow + animation for unlocked artifacts */	
.artifactSlot.unlocked {
    opacity: 1;
    transform: scale(1.05);
}

.artifactSlot.unlocked img {
    filter:
        drop-shadow(0 0 14px rgba(100,170,255,0.86))
        drop-shadow(0 0 26px rgba(240,200,106,0.42))
        drop-shadow(0 0 34px rgba(80,140,220,0.24));
    animation: relicPulse 2.5s ease-in-out infinite;
    backface-visibility: hidden;
    transform: translateZ(0);
}

.artifactSlot.unlocked span {
    color: #e6ecf5;
    font-weight: 600;
    text-shadow:
        0 0 7px rgba(100,170,255,0.38),
        0 0 14px rgba(240,200,106,0.18),
        0 2px 5px rgba(0,0,0,0.85);
}

/* =========================================
   7. BOSS EFFECTS & ATMOSPHERE — SAFE TO CUSTOMIZE
========================================= */

/* Hit animation — triggered when boss takes damage */		
.boss-shake {
    animation: bossShake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

/* Boss image display — includes floating animation */		
.bossIcon {
    width: 96px;
    height: auto;
    display: block;
    margin: 0 auto 12px auto;
    animation: bossFloat 4s ease-in-out infinite;
}

/* Boss 1 — The Demand Cartographer */
.cartographerGlow {
    filter:
        drop-shadow(0 0 12px rgba(240,200,106,0.82))
        drop-shadow(0 0 24px rgba(80,140,220,0.58))
        drop-shadow(0 0 34px rgba(0,0,0,0.8));
}

	
/* Boss 2 — The Rate Engineer */
.rateEngineerGlow {
    filter:
        drop-shadow(0 0 14px rgba(110,180,255,0.88))
        drop-shadow(0 0 28px rgba(240,200,106,0.44))
        drop-shadow(0 0 38px rgba(0,0,0,0.82));
}


	
/* Boss 3 — The Shock Forecaster */
.shockForecasterGlow {
    filter:
        drop-shadow(0 0 16px rgba(240,200,106,0.96))
        drop-shadow(0 0 34px rgba(127,29,29,0.76))
        drop-shadow(0 0 46px rgba(80,140,220,0.26))
        drop-shadow(0 0 52px rgba(0,0,0,0.86));
}


/* Ambient torch effect — decorative, shown during gameplay */	
.torch {
    position: absolute;
    width: 70px;
    top: 30px;
    z-index: 10;
    animation: torchFlicker 3s infinite alternate;
    pointer-events: none;
    opacity: .9;

/* =========================================
   9. ANIMATION SYSTEM — SAFE TO CUSTOMIZE (WITH CARE)
========================================= */

/* Ambient civic-light flicker */	
@keyframes torchFlicker {
  0%, 100% {
    filter: brightness(1);
  }
  25% {
    filter: brightness(1.05) saturate(1.05);
  }
  50% {
    filter: brightness(0.96) saturate(0.98);
  }
  75% {
    filter: brightness(1.04) saturate(1.04);
  }
}

/* Damage feedback */	
@keyframes hitshake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  50% { transform: translateX(8px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

/* Boss-specific hit feedback (stronger shake) */    	
@keyframes bossShake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}

/* Current room highlight animation (maze tracker) */   	
@keyframes activePulse {
  0% {
    transform: scale(1.06);
    box-shadow:
      0 0 8px rgba(100,170,255,0.68),
      inset 0 0 10px rgba(0,0,0,0.62);
  }
  45% {
    transform: scale(1.13);
    box-shadow:
      0 0 18px rgba(100,170,255,0.92),
      0 0 32px rgba(240,200,106,0.42),
      0 0 42px rgba(24,82,135,0.3),
      inset 0 0 12px rgba(0,0,0,0.66);
  }
  70% {
    transform: scale(1.09);
    box-shadow:
      0 0 12px rgba(100,170,255,0.78),
      0 0 24px rgba(240,200,106,0.22),
      inset 0 0 11px rgba(0,0,0,0.66);
  }
  100% {
    transform: scale(1.11);
    box-shadow:
      0 0 15px rgba(100,170,255,0.72),
      0 0 30px rgba(240,200,106,0.32),
      inset 0 0 12px rgba(0,0,0,0.68);
  }
}



	
/* Victory text animation (end screen emphasis) */   
@keyframes victoryGlow {
  0%, 100% {
    transform: scale(1);
    text-shadow:
      0 0 10px rgba(240,200,106,0.72),
      0 0 18px rgba(100,170,255,0.24),
      0 2px 6px rgba(0,0,0,0.9);
  }
  50% {
    transform: scale(1.08);
    text-shadow:
      0 0 24px rgba(240,200,106,0.95),
      0 0 42px rgba(100,170,255,0.58),
      0 0 52px rgba(24,82,135,0.38),
      0 3px 8px rgba(0,0,0,0.9);
  }
}

/* Idle boss movement */	
@keyframes bossFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* Temporary feedback text fade-out */   
@keyframes fadeOut {
  0%, 70% { opacity: 1; }
  100% { opacity: 0; }
}

/* Wizard idle animation (subtle movement) */  
@keyframes wizardFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}


@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* General pulse animation for relics */   	
@keyframes relicPulse {
  0%,100% {
    transform: scale(1.05);
    filter:
      drop-shadow(0 0 8px rgba(100,170,255,0.68))
      drop-shadow(0 0 18px rgba(240,200,106,0.32))
      drop-shadow(0 0 24px rgba(0,0,0,0.58));
  }
  50% {
    transform: scale(1.1);
    filter:
      drop-shadow(0 0 16px rgba(100,170,255,0.94))
      drop-shadow(0 0 30px rgba(240,200,106,0.48))
      drop-shadow(0 0 38px rgba(24,82,135,0.26));
  }
}

/* Streak icon pulse */
@keyframes pulseControl {
  0%,100% {
    transform: scale(1);
    opacity: 0.9;
  }
  50% {
    transform: scale(1.08);
    opacity: 1;
  }
}

/* =========================================
   12. MOBILE RESPONSIVE SYSTEM — SAFE TO EDIT (WITH LIMITS)
=========================================

This section controls how the game behaves on phones.

GOAL:
- Fit gameplay into a single screen as much as possible
- Reduce vertical scrolling
- Keep buttons thumb-friendly

-----------------------------------------
SAFE TO EDIT:
- font sizes (clamp values)
- spacing (gap, padding, margin)
- grid layout (answers: 1fr 1fr vs 1fr)
- wizard size (make smaller/larger)

-----------------------------------------
USE CAUTION:
- removing elements entirely (may break flow)
- changing flex direction randomly
- making buttons too small (hurts usability)

-----------------------------------------
DO NOT MODIFY:
- IDs (#gameShell, #gameBox, #wizardBox)
- core layout structure

-----------------------------------------
COMMON CUSTOM CHANGES:
- Want bigger buttons? Increase min-height
- Want less scrolling? Reduce padding/gaps
- Want simpler UI? Hide artifact labels

-----------------------------------------
TIP:
Mobile design is about SPACE, not style.
Every pixel matters.

========================================= */

  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 50;
}

  position: absolute;
  left: 50%;
  top: var(--score-float-top, 42%);
  transform: translateX(-50%);
  font-size: 25px;
  font-weight: 900;
  letter-spacing: 1px;
  white-space: nowrap;
  animation: scoreFloatUp 1.2s ease-out forwards;
  text-shadow:
    0 0 10px rgba(0,0,0,0.96),
    0 0 18px rgba(56,189,248,0.42);
}

.score-float.positive{ color: #f7d982; }
.score-float.negative{ color: #f87171; }
.score-float.neutral{ color: #c7ecff; }

@keyframes scoreFloatUp{
  0%{ opacity: 0; transform: translate(-50%, 12px) scale(.85); }
  15%{ opacity: 1; transform: translate(-50%, 0) scale(1.08); }
  100%{ opacity: 0; transform: translate(-50%, -58px) scale(1); }

function getScoreAttackSpeedBonus(responseTime){
    const bonus = SCORE_ATTACK_CONFIG.speedBonuses.find(item => responseTime <= item.maxMs);
    return bonus ? bonus.points : 0;
}

function getScoreAttackStreakBonus(currentStreak){
    const bonus = SCORE_ATTACK_CONFIG.streakBonuses.find(item => currentStreak >= item.minStreak);
    return bonus ? bonus.points : 0;
}

function applyScoreAttackEvent(label, amount){
    if(!modeUsesScoreAttack()) return;

    const numericAmount = Number(amount || 0);
    if(!Number.isFinite(numericAmount) || numericAmount === 0) return;

    scoreAttackScore += numericAmount;

    // No negative scoreboard. Punishment hurts, but it does not turn into comedy.
    if(scoreAttackScore < 0){
        scoreAttackScore = 0;
    }

    scoreAttackEvents.push({
        label,
        amount: numericAmount,
        scoreAfter: scoreAttackScore,
        room,
        questionId: currentQuestion?.id || 0,
        time: Date.now()
    });

    if(scoreAttackEvents.length > 120){
        scoreAttackEvents.shift();
    }

    if(scoreAttackScore > scoreAttackBestScore){
        scoreAttackBestScore = scoreAttackScore;
        localStorage.setItem(`${SCORE_ATTACK_STORAGE_PREFIX}_bestScore`, String(scoreAttackBestScore));
    }

    updateScoreAttackHud();
    showScoreAttackFloat(label, numericAmount);
}

function applyScoreAttackForAnswer(isCorrect, responseTime){
    if(!modeUsesScoreAttack()) return;

    if(isCorrect){
        applyScoreAttackEvent("Correct", SCORE_ATTACK_CONFIG.correct);

        const speedBonus = getScoreAttackSpeedBonus(responseTime);
        if(speedBonus > 0){
            applyScoreAttackEvent("Speed", speedBonus);
        }

        const streakBonus = getScoreAttackStreakBonus(streak);
        if(streakBonus > 0){
            applyScoreAttackEvent("Streak", streakBonus);
        }

        return;
    }

    const penalty = responseTime < 4000
        ? SCORE_ATTACK_CONFIG.rapidMissPenalty
        : SCORE_ATTACK_CONFIG.wrongPenalty;

    applyScoreAttackEvent(responseTime < 4000 ? "Rapid Miss" : "Wrong", penalty);
}

    if(!modeUsesScoreAttack()) return;

    applyScoreAttackEvent("Rapid Guess", SCORE_ATTACK_CONFIG.rapidMissPenalty);
}

function generatePseudonymFromEmail(email) {
    const prefixes = [
        "Nominal", "Real", "Indexed", "Fiscal", "Monetary", "Aggregate",
        "Capital", "Labor", "Inflation", "Output", "Reserve", "Cyclical",
        "Structural", "Productive", "National", "Treasury", "Deflator", "Ledger"
    ];

    const roles = [
        "Registrar", "Comptroller", "Forecaster", "Auditor", "Indexer", "Calibrator",
        "Engineer", "Archivist", "Surveyor", "Inspector", "Operator", "Analyst",
        "Custodian", "Mechanist", "Steward", "Technician", "Keeper", "Marshal"
    ];

    let hash = 0;
    const cleanEmail = email.trim().toLowerCase();

    for (let i = 0; i < cleanEmail.length; i++) {
        hash = ((hash << 5) - hash) + cleanEmail.charCodeAt(i);
        hash |= 0;
    }

    const positiveHash = Math.abs(hash);

    const prefix = prefixes[positiveHash % prefixes.length];
    const role = roles[Math.floor(positiveHash / prefixes.length) % roles.length];
    const number = 1000 + (positiveHash % 9000);

    return `${prefix}${role}${number}`;
}

    calculation: 32000,
    trap: 28000,
    "multi-step": 38000,
    interaction: 30000,
    integration: 36000,
    default: 24000
};

const ELITE_PREFERRED_TYPES = ["trap", "multi-step", "interaction", "integration", "calculation"];

function getTypeTargetMs(type){
    return TYPE_TIME_TARGETS[type] || TYPE_TIME_TARGETS.default;
}

function getTypePressure(type){
    if(["integration","multi-step"].includes(type)) return 1.2;
    if(["trap","interaction","calculation"].includes(type)) return 0.8;
    return 0.2;
}

function clamp(value, min, max){
    return Math.min(max, Math.max(min, value));
}

function getTagBucket(tag){
    if(!tag) return null;
    if(!masteryState.byTag[tag]){
        masteryState.byTag[tag] = {
            attempts: 0,
            correct: 0,
            avgTime: 0,
            byType: {}
        };
    }
    return masteryState.byTag[tag];
}

function getTypeBucket(tag, type){
    const tagBucket = getTagBucket(tag);
    if(!tagBucket) return null;
    const key = type || "default";
    if(!tagBucket.byType[key]){
        tagBucket.byType[key] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };
    }
    return tagBucket.byType[key];
}

function getSkillKey(question){
    return question?.primarySkill || question?.repairSkill || inferSkill(question) || null;
}

function getSkillBucket(question){
    const skill = getSkillKey(question);
    if(!skill) return null;

    if(!masteryState.bySkill){
        masteryState.bySkill = {};
    }

    if(!masteryState.bySkill[skill]){
        masteryState.bySkill[skill] = {
            attempts: 0,
            correct: 0,
            avgTime: 0,
            byType: {}
        };
    }

    return masteryState.bySkill[skill];
}

function inferSkill(question){
    if(!question) return null;

    const q = (question.q || "").toLowerCase();
    const tag = (question.tag || "").toLowerCase();
    const objective = (question.objective || "").toLowerCase();

    if(tag.includes("is") || tag.includes("goods_market") || tag.includes("keynesian") || q.includes("is curve") || q.includes("keynesian cross") || q.includes("planned expenditure")) return "is_curve_goods_market";
    if(tag.includes("lm") || tag.includes("money_market") || tag.includes("liquidity") || q.includes("lm curve") || q.includes("money demand") || q.includes("money supply")) return "lm_curve_money_market";
    if(tag.includes("is_lm") || tag.includes("equilibrium") || q.includes("is-lm") || q.includes("intersection")) return "is_lm_equilibrium";
    if(tag.includes("shock") || tag.includes("business_cycle") || q.includes("shock") || q.includes("shift left") || q.includes("shift right")) return "macro_shock_tracing";
    if(tag.includes("fiscal") || q.includes("government spending") || q.includes("tax cut") || q.includes("tax increase") || q.includes("crowding out")) return "fiscal_policy_is_shift";
    if(tag.includes("monetary") || tag.includes("fed") || q.includes("open market") || q.includes("fed") || q.includes("monetary")) return "monetary_policy_lm_shift";
    if(tag.includes("aggregate") || tag === "ad" || q.includes("aggregate demand") || q.includes("price level")) return "aggregate_demand_from_islm";
    if(tag.includes("depression") || tag.includes("crisis") || tag.includes("deflation") || q.includes("great depression") || q.includes("deflation")) return "depression_crisis_mechanisms";

    if(tag.includes("interaction") || objective.includes("11.1")) return "linked_market_spillovers";
    if(tag.includes("efficiency") || objective.includes("11.2") || objective.includes("11.4")) return "efficiency_pareto_contract_curve";
    if(tag.includes("failure") || objective.includes("11.3")) return "market_failure_externalities";
    if(tag.includes("power") || objective.includes("12.")) return "monopoly_power_pricing";
    if(tag.includes("strategy") || objective.includes("13.")) return "strategic_interdependence";
    if(tag.includes("equity") || objective.includes("11.5")) return "efficiency_equity_tradeoff";

    return tag || null;
}

function inferObjective(question){
    if(!question) return "general";
    if(question.objective) return question.objective;

    const q = (question.q || "").toLowerCase();
    const tag = (question.tag || "general").toLowerCase();
    const type = (question.type || "default").toLowerCase();

  // =============================================
// COMMAND NEXUS OBJECTIVE INFERENCE
// Chapters 12–13: IS-LM, shocks, policy, AD, Great Depression
// =============================================

if(tag === "is" || tag === "is_curve" || tag === "goods_market" || tag === "keynesian_cross" || tag === "loanable_funds"){

    if(q.includes("shift left") || q.includes("leftward")) return "LO12.1_is_shift_left";

}

if(tag === "lm" || tag === "lm_curve" || tag === "money_market" || tag === "liquidity_preference" || tag === "interest_rate"){

if(tag === "is_lm" || tag === "islm" || tag === "equilibrium" || tag === "short_run_equilibrium"){

if(tag === "fiscal" || tag === "fiscal_policy" || tag === "government_spending" || tag === "taxes"){

if(tag === "monetary" || tag === "monetary_policy" || tag === "fed" || tag === "money_supply"){

if(tag === "aggregate_demand" || tag === "ad" || tag === "ad_curve" || tag === "price_level"){
    if(q.includes("derive aggregate demand") || q.includes("derived from is-lm") || q.includes("derive ad")) return "LO13.4_derive_aggregate_demand";
    if(q.includes("price level") && q.includes("money supply")) return "LO13.4_price_level_real_money_balances";
    if(q.includes("price level") && q.includes("lm")) return "LO13.4_price_level_lm_shift";
    if(q.includes("price level") && q.includes("income")) return "LO13.4_price_level_income_relationship";

if(tag === "depression" || tag === "great_depression" || tag === "crisis" || tag === "deflation"){

    if(q.includes("great depression")) return "LO13.5_great_depression";
    if(q.includes("is curve")) return "LO13.5_depression_is_shift";

    return `${tag}_${type}`;

function getObjectiveBucket(question){
    const objectiveKey = inferObjective(question);
    if(!masteryState.byObjective[objectiveKey]){
        masteryState.byObjective[objectiveKey] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };
    }
    return masteryState.byObjective[objectiveKey];
}

function getObjectiveAccuracy(question){
    return getAccuracy(getObjectiveBucket(question));
}

function getObjectiveFluency(question){
    return getFluency(getObjectiveBucket(question), question?.type || "default");
}

function updateBucket(bucket, isCorrect, responseTime){
    if(!bucket) return;
    bucket.attempts++;
    if(isCorrect) bucket.correct++;
    bucket.avgTime = bucket.avgTime === 0
        ? responseTime
        : Math.round((bucket.avgTime * 0.7) + (responseTime * 0.3));
}

function getAccuracy(bucket){
    if(!bucket || !bucket.attempts) return null;
    return bucket.correct / bucket.attempts;
}

function getTimeRatio(bucket, type){
    if(!bucket || !bucket.attempts || !bucket.avgTime) return 1;
    return bucket.avgTime / getTypeTargetMs(type);
}

function getFluency(bucket, type){
    const acc = getAccuracy(bucket);
    if(acc === null) return 0;
    const timeRatio = getTimeRatio(bucket, type);
    return acc - clamp((timeRatio - 1) * 0.25, 0, 0.35);
}

function getTagAccuracy(tag){
    return getAccuracy(getTagBucket(tag));
}

function getTagTypeAccuracy(tag, type){
    return getAccuracy(getTypeBucket(tag, type));
}

function getTagFluency(tag){
    return getFluency(getTagBucket(tag), "default");
}

function getTagTypeFluency(tag, type){
    return getFluency(getTypeBucket(tag, type), type || "default");
}

function recordAdaptiveAttempt(question, isCorrect, responseTime){
    if(!question || !question.tag) return;

    const tagBucket = getTagBucket(question.tag);
    const typeBucket = getTypeBucket(question.tag, question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const skillBucket = getSkillBucket(question);

    updateBucket(tagBucket, isCorrect, responseTime);
    updateBucket(typeBucket, isCorrect, responseTime);
    updateBucket(objectiveBucket, isCorrect, responseTime);
    updateBucket(skillBucket, isCorrect, responseTime);

    masteryState.recent.push({
        correct: !!isCorrect,
        responseTime,
        tag: question.tag,
        type: question.type || "default",
        objective: currentQuestion.objective || inferObjective(currentQuestion),
        skill: getSkillKey(question)
    });

    if(masteryState.recent.length > 20){
        masteryState.recent.shift();
    }
}

function getRecentPerformance(windowSize = 8){
    const recent = masteryState.recent.slice(-windowSize);
    if(recent.length === 0){
        return { accuracy: 0, avgCorrectRatio: 1.2, count: 0 };
    }

    const correct = recent.filter(x => x.correct);
    const avgCorrectRatio = correct.length
        ? correct.reduce((sum, item) => sum + (item.responseTime / getTypeTargetMs(item.type)), 0) / correct.length
        : 2;

    return {
        accuracy: recent.filter(x => x.correct).length / recent.length,
        avgCorrectRatio,
        count: recent.length
    };
}

function getWeakestTag(){
    const entries = Object.keys(masteryState.byTag);

    if(entries.length === 0){
        const fallback = Object.entries(conceptMemory || {}).sort((a,b) => b[1]-a[1])[0];
        return fallback ? fallback[0] : null;
    }

    let weakestTag = null;
    let weakestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const weakness = (conceptMemory[tag] || 0) + (1 - (fluency ?? 0));

        if(weakness > weakestScore){
            weakestScore = weakness;
            weakestTag = tag;
        }
    });

    return weakestTag;
}

function getStrongestTag(){
    const entries = Object.keys(masteryState.byTag);
    if(entries.length === 0) return null;

    let strongestTag = null;
    let strongestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const strength = (fluency === null ? 0 : fluency) - ((conceptMemory[tag] || 0) * 0.15);
        if(strength > strongestScore){
            strongestScore = strength;
            strongestTag = tag;
        }
    });

    return strongestTag;
}

function getSelectionProfile(){
    const recent = getRecentPerformance(8);
    const strongestTag = getStrongestTag();
    const strongestFluency = strongestTag ? getTagFluency(strongestTag) : 0;

    return {
        recentAccuracy: recent.accuracy,
        avgCorrectRatio: recent.avgCorrectRatio,
        strongestTag,
        strongestFluency,
        mediumReady: streak >= 5 && recent.count >= 5 && recent.accuracy >= 0.8,
        hardReady: streak >= 8 && recent.count >= 6 && recent.accuracy >= 0.88 && recent.avgCorrectRatio <= 1.2 && strongestFluency >= 0.72,
        eliteReady: streak >= 14 && recent.count >= 8 && recent.accuracy >= 0.92 && recent.avgCorrectRatio <= 1.05 && strongestFluency >= 0.82
    };
}

function determineSelectionPurpose(profile){
    if(profile.recentAccuracy === 0 && getRecentPerformance(8).count === 0) return "support";
    if(profile.eliteReady) return "stretch";
    if(profile.recentAccuracy < 0.65) return "repair";
    if(profile.recentAccuracy < 0.8) return "confirm";
    if(profile.hardReady) return "challenge";
    return "diversify";
}

function shouldTriggerDetour(question){
    if(!question || !question.tag) return false;
    const tagWeakness = conceptMemory[question.tag] || 0;
    const typeBucket = getTypeBucket(question.tag, question.type);
    const typeAccuracy = getAccuracy(typeBucket);
    const objectiveAccuracy = getObjectiveAccuracy(question);

    return tagWeakness >= 2.2
        || (typeBucket && typeBucket.attempts >= 2 && typeAccuracy !== null && typeAccuracy < 0.6)
        || (objectiveAccuracy !== null && objectiveAccuracy < 0.5 && getObjectiveBucket(question).attempts >= 2);
}

function resetRemediationState(){
    remediationState = {
        active: false,
        stage: null,
        tag: null,
        objective: null,
        skill: null,
        commonError: null,
        sourceType: null,
        returnRoom: null,
        originQuestionId: null,
        careless: false
    };
    detourActive = false;
    detourReturnRoom = null;
}

function planRemediation(question, responseTime){
    if(!question || !question.tag) return null;

    const expected = getTypeTargetMs(question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const objectiveAccuracy = getAccuracy(objectiveBucket);
    const objectiveAttempts = objectiveBucket?.attempts || 0;
    const carelessMiss = responseTime < expected * 0.55 && (objectiveAccuracy === null || objectiveAccuracy >= 0.45);
    const repeatedObjectiveMiss = objectiveAttempts >= 2 && objectiveAccuracy !== null && objectiveAccuracy < 0.6;
    const slowStruggle = responseTime > expected * 1.2;
    const skill = getSkillKey(question);

    return {
        active: true,
        stage: carelessMiss ? "bridge" : "repair",
        tag: question.tag,
        objective: currentQuestion.objective || inferObjective(currentQuestion),
        skill: skill,
        commonError: question.commonError || null,
        sourceType: question.type || "default",
        returnRoom: room,
        originQuestionId: question.id || null,
        careless: carelessMiss,
        repeatedObjectiveMiss,
        slowStruggle
    };
}

function getRemediationStageLabel(stage){
    if(stage === "repair") return "Concept Repair";
    if(stage === "bridge") return "Bridge Repair";
    return "Recovery Retest";
}

function getQuestionsMatchingNeed(pool, objectiveKey, tag, excludeIds = [], skillKey = null){
    if(!Array.isArray(pool) || pool.length === 0) return [];

    let candidates = pool.filter(q => !excludeIds.includes(q.id));

    if(skillKey){
        let skillMatches = candidates.filter(q =>
            q.primarySkill === skillKey || q.repairSkill === skillKey || inferSkill(q) === skillKey
        );
        if(skillMatches.length > 0) return skillMatches;
    }

    let objectiveMatches = candidates.filter(q => inferObjective(q) === objectiveKey);
    if(objectiveMatches.length > 0) return objectiveMatches;

    let tagMatches = candidates.filter(q => q.tag === tag);
    if(tagMatches.length > 0) return tagMatches;

    return candidates;
}

function getRetestPoolName(){
    if(room <= 9) return "easy";
    if(room <= 19) return "medium";
    if(room <= 25) return "hard";
    if(room <= 29) return "hard";
    return "elite";
}

function pickRemediationFromBank(poolName, objectiveKey, tag, purpose = "confirm", skillKey = null){
    const pool = questionBanks[poolName] || [];
    const recentIds = (questionHistory[poolName] || []).slice(-10);
    let candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, recentIds, skillKey);

    if(candidates.length === 0){
        candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, [], skillKey);
    }

    if(candidates.length === 0) return null;

    const picked = weightedPick(candidates, {
        mode: purpose === "challenge" ? "challenge" : "support",
        preferredTypes: purpose === "challenge" ? ELITE_PREFERRED_TYPES : [],
        purpose
    });

    if(!questionHistory[poolName]) questionHistory[poolName] = [];
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15) questionHistory[poolName].shift();

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10) tagHistory.shift();
    }

    return picked;
}

function getRemediationQuestion(state){
    if(!state || !state.active) return null;

    const excludeIds = [state.originQuestionId].filter(Boolean);

    if(state.stage === "repair"){
        if(state.skill && microSkillRepairPools[state.skill]){
            const skillRepairPool = microSkillRepairPools[state.skill] || [];
            const skillRepairCandidates = getQuestionsMatchingNeed(
                skillRepairPool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillRepairCandidates.length > 0){
                return weightedPick(skillRepairCandidates, {
                    mode: "support",
                    purpose: "repair"
                });
            }
        }

        const repairPool = microSkillRepairPools[state.skill] || [];
        const repairCandidates = getQuestionsMatchingNeed(
            repairPool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(repairCandidates.length > 0){
            return weightedPick(repairCandidates, {
                mode: "support",
                purpose: "repair"
            });
        }
    }

    if(state.stage === "bridge"){
        if(state.skill && microSkillBridgePools[state.skill]){
            const skillBridgePool = microSkillBridgePools[state.skill] || [];
            const skillBridgeCandidates = getQuestionsMatchingNeed(
                skillBridgePool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillBridgeCandidates.length > 0){
                return weightedPick(skillBridgeCandidates, {
                    mode: "support",
                    purpose: "confirm"
                });
            }
        }

        const bridgePool = microSkillBridgePools[state.skill] || [];
        const allBridgePool = Object.values(microSkillBridgePools || {})
            .reduce((all, pool) => all.concat(pool), []);

        const bridgeCandidates = getQuestionsMatchingNeed(
            allBridgePool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(bridgeCandidates.length > 0){
            return weightedPick(bridgeCandidates, {
                mode: "support",
                purpose: "confirm"
            });
        }
    }

    const retestPoolName = getRetestPoolName();

    return pickRemediationFromBank(
        retestPoolName,
        state.objective,
        state.tag,
        state.stage === "retest" ? "challenge" : "confirm",
        state.skill
    );
}
function weightedPick(pool, options = {}){
    const {
        mode = "support",
        preferredTypes = [],
        purpose = "diversify"
    } = options;

    let totalWeight = 0;

    let weights = pool.map(q => {
        let w = 1;
        const tagAccuracy = q.tag ? getTagAccuracy(q.tag) : null;
        const typeAccuracy = (q.tag && q.type) ? getTagTypeAccuracy(q.tag, q.type) : null;
        const objectiveAccuracy = getObjectiveAccuracy(q);
        const tagFluency = q.tag ? getTagFluency(q.tag) : 0;
        const typeFluency = (q.tag && q.type) ? getTagTypeFluency(q.tag, q.type) : 0;
        const objectiveFluency = getObjectiveFluency(q);
        const conceptWeakness = q.tag ? (conceptMemory[q.tag] || 0) : 0;

        let recentCount = tagHistory.filter(t => t === q.tag).length;

        if(mode === "challenge"){
            w += clamp(tagFluency || 0, 0, 1.2) * 0.9;
            w += clamp(typeFluency || 0, 0, 1.0) * 0.6;
            w += clamp(objectiveFluency || 0, 0, 1.0) * 0.5;
            w += getTypePressure(q.type || "default");
            if(preferredTypes.includes(q.type)) w += 1.1;
            if(purpose === "stretch") w += 0.8;
        } else {
            const tagNeed = tagAccuracy === null ? 0.45 : (1 - tagAccuracy);
            const typeNeed = typeAccuracy === null ? 0.35 : (1 - typeAccuracy);
            const objectiveNeed = objectiveAccuracy === null ? 0.35 : (1 - objectiveAccuracy);
            const slowPenalty = clamp((getTimeRatio(getTypeBucket(q.tag, q.type), q.type) - 1), 0, 1.2);

            w += Math.min(conceptWeakness, 2.2);
            w += tagNeed * 0.7;
            w += typeNeed * 0.55;
            w += objectiveNeed * 0.85;
            w += slowPenalty * 0.35;

            if(purpose === "repair" && objectiveNeed > 0.35) w += 0.9;
            if(purpose === "confirm" && typeNeed > 0.25) w += 0.5;
        }

        // Coverage boost
        if(recentCount === 0){
            w += purpose === "diversify" ? 0.7 : 0.4;
        }

        w = Math.min(w, mode === "challenge" ? 5.5 : 4.5);
        totalWeight += w;
        return { q, w };
    });

    let r = Math.random() * totalWeight;

    for(let item of weights){
        r -= item.w;
        if(r <= 0){
            return item.q;
        }
    }

    return weights[weights.length - 1].q;
}

function getAdaptiveQuestion(poolName, targetTag = null, options = {}){
    let pool = questionBanks[poolName] || questionBanks.hard || questionBanks.medium || questionBanks.easy || [];
    const { mode = "support", preferredTypes = [], purpose = "diversify" } = options;

    if(!pool || pool.length === 0){
        return {
            id: 999999,
            q: "No question pool is available for this room. Check the questionBanks configuration.",
            options: ["Continue", "Continue", "Continue", "Continue"],
            a: 0,
            tag: "system",
            type: "default",
            objective: "system_check",
            feedback: "A question pool is missing."
        };
    }

    // --- 🎯 TARGET SPECIFIC TAG IF PROVIDED ---
    if(targetTag){
        let filtered = pool.filter(q => q.tag === targetTag);

        if(filtered.length >= Math.max(4, pool.length * 0.2)){
            pool = filtered;
        }
    }

    let recent = questionHistory[poolName].slice(-10);

    let available = pool.filter(q => !recent.includes(q.id));

    if(available.length < 3){
        available = pool.filter(q => !questionHistory[poolName].slice(-5).includes(q.id));
    }

    if(available.length === 0){
        available = pool.filter(q => !questionHistory[poolName].slice(-3).includes(q.id));
    }

    if(available.length === 0){
        available = pool;
    }

    let lastTags = tagHistory.slice(-2);

    let tagFiltered = available.filter(q => {
        return !(lastTags.length === 2 && lastTags.every(t => t === q.tag));
    });

    if(tagFiltered.length >= 3){
        available = tagFiltered;
    }

    console.log("AVAILABLE:", available.map(q => q.id));

    let picked = weightedPick(available, { mode, preferredTypes, purpose });

    console.log("PICKED:", picked.id);
    console.log("RECENT:", questionHistory[poolName]);

    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15){
        questionHistory[poolName].shift();
    }

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }

    return picked;
}

  }

  if(isCorrect && bossHealth <= 2){

  }

  if(!isCorrect && responseTime < 5000){
    return `${bossName}: Fast command. Bad command. The Nexus does not reward button mashing.`;
  }

  if(!isCorrect && (tag === "is" || tag === "lm" || tag === "is_lm" || tag === "fiscal" || tag === "monetary" || tag === "aggregate_demand" || tag === "depression")){

  }

  }

}

function startTimedModeClock(){
    timedModeEndTime = Date.now() + timedModeDurationMs;

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "flex";

    updateTimedModeClock();

    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
    }

    timedModeTimerInterval = setInterval(updateTimedModeClock, 250);
}

function stopTimedModeClock(){
    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
        timedModeTimerInterval = null;
    }

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "none";

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.classList.remove("timer-warning");
        timerDisplay.innerText = "10:00";
    }
}

function updateTimedModeClock(){
    if(gameMode !== "timed" || !timedModeEndTime) return;

    const remainingMs = Math.max(0, timedModeEndTime - Date.now());
    const totalSeconds = Math.ceil(remainingMs / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.innerText = `${minutes}:${String(seconds).padStart(2, "0")}`;
        timerDisplay.classList.toggle("timer-warning", remainingMs <= 60 * 1000);
    }

    if(remainingMs <= 0){
        endTimedModeRun();
    }
}

        {id:69,q:"On a standard AD graph, the horizontal axis is usually what?",options:["income","price level","the tax rate","the money multiplier"],a:0,tag:"aggregate_demand",type:"interpretation",objective:"LO13.4",image:"is_lm_ad.png",primarySkill:"aggregate_demand_from_islm",feedback:"The horizontal axis is usually income."},
        {id:70,q:"What causes a rightward shift in aggregate demand from IS-LM?",options:["an IS expansion or monetary expansion that raises demand at each price level","a change in the price level moving along AD","a change in the graph color","a movement from one point to another on the same curve only"],a:0,tag:"aggregate_demand",type:"interpretation",objective:"LO13.4",image:"is_lm_ad.png",primarySkill:"aggregate_demand_from_islm",feedback:"A rightward shift reflects an IS expansion or monetary expansion that raises demand at each price level."},

        {id:76,q:"Nominal money is M = 2,000. If P falls from 10 to 8, what happens to real balances, and why does this help explain a downward-sloping AD curve?",options:["M/P rises from 200 to 250, shifting LM right and raising Y","M/P falls from 250 to 200, shifting LM left and lowering Y","M/P stays at 200, so AD is vertical","M/P rises from 200 to 250, shifting IS left"],a:0,tag:"aggregate_demand",type:"calculation",objective:"LO13.4",image:"is_lm_ad.png",primarySkill:"aggregate_demand_from_islm",feedback:"A lower price level raises real balances. Higher real balances shift LM right, lowering r and raising income.",hint:"Compute M/P before and after."},
        {id:77,q:"When reading the graph for aggregate demand from IS-LM, what should come first?",options:["Identify which curve or line moved, then read the new outcome.","Choose the answer with the largest number.","Assume output always rises.","Ignore the axis labels."],a:0,tag:"aggregate_demand",type:"graph",objective:"LO13.4",image:"is_lm_ad.png",primarySkill:"aggregate_demand_from_islm",feedback:"Graph questions start with the curve movement and axis labels. Do that first and most traps die immediately."},

        {id:81,q:"What causes a rightward shift in Great Depression mechanisms?",options:["recovery from spending or monetary expansion","movement toward a depressed short-run equilibrium","a change in the graph color","a movement from one point to another on the same curve only"],a:0,tag:"great_depression",type:"interpretation",objective:"LO13.5",image:"is_lm_lras.png",primarySkill:"depression_crisis_mechanisms",feedback:"A rightward shift reflects recovery from spending or monetary expansion."},

    medium: [
        {id:100,q:"A student says, “a change in the interest rate shifts the IS curve.” What is the best response?",options:["No. a change in the interest rate is a movement or adjustment within the model, not automatically a shift.","Yes. Every variable change shifts every curve.","No. Curves never shift in this model.","Yes, but only in the long run."],a:0,tag:"is_curve",type:"trap",objective:"LO12.1",primarySkill:"is_curve_goods_market",commonError:"confuses movement along IS with a shift of IS",feedback:"The issue is movement versus shift. The relevant trap is calling every change in income a shift of IS."},

        {id:105,q:"In the IS curve, a shock lowers planned spending by $30 billion and MPC = 0.6. What is the simple Keynesian-cross change in equilibrium income before interest-rate feedback?",options:["-$75 billion","-$30 billion","-$50 billion","-$18 billion"],a:0,tag:"is_curve",type:"calculation",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"The multiplier is 1/(1 - 0.6) = 2.5. Income changes by 2.5 × -$30 billion = -$75 billion.",hint:"Use the spending multiplier first."},

        {id:119,q:"In the LM curve, why is it not enough to say “income changes”?",options:["The model also needs the curve shift or intersection that explains why income changed.","Income is never shown in this model.","Interest rates are always fixed by law.","Income only matters in microeconomics."],a:0,tag:"lm_curve",type:"interpretation",objective:"LO12.2",primarySkill:"lm_curve_money_market",feedback:"A correct answer ties the outcome to the model mechanism, not just the direction of income."},
        {id:120,q:"What should feedback emphasize after a miss on the LM curve?",options:["The missed skill is lm_curve_money_market: identify the mechanism, curve movement, and outcome.","The student should memorize the answer letter.","The graph should be ignored next time.","The question type cannot be diagnosed."],a:0,tag:"lm_curve",type:"definition",objective:"LO12.2",primarySkill:"lm_curve_money_market",feedback:"Repair should target the actual skill, not just repeat the same wording."},
        {id:121,q:"Which answer best avoids the usual trap in the LM curve?",options:["Identify whether the event is a change in income that changes money demand, an increase in the real money supply, or a decrease in the real money supply or an increase in money demand.","Assume the curve always shifts right.","Assume the interest rate always rises.","Ignore whether the price level is fixed."],a:0,tag:"lm_curve",type:"trap",objective:"LO12.2",primarySkill:"lm_curve_money_market",commonError:"confuses money supply shifts with money demand movements",feedback:"The common error is: confuses money supply shifts with money demand movements."},

    elite: [
        {id:300,q:"Elite: A student gets the direction of income right in the IS curve but identifies the wrong curve. What is the grading problem?",options:["The conclusion may be lucky, but the mechanism is wrong.","The answer is fully correct because only income matters.","The graph cannot distinguish mechanisms.","The interest rate should be ignored."],a:0,tag:"is_curve",type:"trap",objective:"LO12.1",primarySkill:"is_curve_goods_market",commonError:"confuses movement along IS with a shift of IS",feedback:"A correct result with the wrong mechanism is still weak reasoning. The Nexus is not handing out participation trophies."},
        {id:301,q:"Elite: In the IS curve, what is the safest way to avoid confusing correlation with model logic?",options:["Start with the exogenous change, identify the curve shift, then read the endogenous outcomes.","Start with the final answer and invent a story.","Assume every bad event shifts LM left.","Assume every good event shifts IS right."],a:0,tag:"is_curve",type:"multi-step",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"The exogenous shock comes first. Endogenous outcomes come after the model adjusts."},
        {id:302,q:"In the IS curve, a shock lowers planned spending by $30 billion and MPC = 0.6. What is the simple Keynesian-cross change in equilibrium income before interest-rate feedback?",options:["-$75 billion","-$30 billion","-$50 billion","-$18 billion"],a:0,tag:"is_curve",type:"calculation",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"The multiplier is 1/(1 - 0.6) = 2.5. Income changes by 2.5 × -$30 billion = -$75 billion.",hint:"Use the spending multiplier first."},
        {id:303,q:"Elite: The graph shows the IS curve shifting right, but the answer choices mix up causes and outcomes. Which option is correctly framed?",options:["Cause: an increase in planned spending or fiscal expansion; result: income rises at each interest rate.","Cause: income rises at each interest rate; result: an increase in planned spending or fiscal expansion.","Cause: a fall in autonomous spending or fiscal contraction; result: income rises at each interest rate.","Cause: the new equilibrium; result: the old curve."],a:0,tag:"is_curve",type:"graph",objective:"LO12.1",image:"is_curves.png",primarySkill:"is_curve_goods_market",feedback:"Do not reverse cause and result. That is how decent graphs get butchered."},
        {id:304,q:"Elite: The graph shows the IS curve shifting left, but the answer choices mix up causes and outcomes. Which option is correctly framed?",options:["Cause: a fall in autonomous spending or fiscal contraction; result: income falls at each interest rate.","Cause: income falls at each interest rate; result: a fall in autonomous spending or fiscal contraction.","Cause: an increase in planned spending or fiscal expansion; result: income falls at each interest rate.","Cause: the graph image; result: no economic change."],a:0,tag:"is_curve",type:"graph",objective:"LO12.1",image:"is_curves.png",primarySkill:"is_curve_goods_market",feedback:"Cause first, outcome second. Fancy wording does not change the model."},
        {id:305,q:"Elite: Which answer best handles a mixed shock involving the IS curve?",options:["Identify each curve shift separately; if effects conflict, say the ambiguous variable is indeterminate.","Average the answer choices.","Assume fiscal policy always dominates monetary policy.","Assume the interest rate can never be indeterminate."],a:0,tag:"is_curve",type:"integration",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"Mixed shocks can give clear movement in one variable and ambiguous movement in another. Do not fake precision."},
        {id:306,q:"Elite: What is the strongest explanation of the IS curve for an exam answer?",options:["the IS curve uses planned spending and investment demand to produce negative relationship between the interest rate and income, then the graph maps that mechanism into outcomes.","the IS curve says output changes because output changes.","the IS curve is a memorized slope with no behavioral logic.","the IS curve works only when all variables are constant."],a:0,tag:"is_curve",type:"integration",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"The strongest answer links mechanism to graph to outcome. For this topic, the mechanism is planned spending and investment demand."},
        {id:307,q:"Elite: Which close answer is wrong because it treats an endogenous outcome as an exogenous shock in the IS curve?",options:["“Income rises at each interest rate causes an increase in planned spending or fiscal expansion.”","“an increase in planned spending or fiscal expansion causes income rises at each interest rate.”","“The first step is to identify the curve shift.”","“The new intersection reports the outcome.”"],a:0,tag:"is_curve",type:"trap",objective:"LO12.1",primarySkill:"is_curve_goods_market",commonError:"reverses cause and outcome",feedback:"Endogenous outcomes are what the model solves for. They are not the first shock unless the prompt says so."},
        {id:308,q:"Elite: Which statement is most precise about short-run versus long-run reasoning in the IS curve?",options:["The short run uses the fixed-price or sticky-price setup; long-run adjustment needs additional price/output-gap logic.","The short run and long run always give the same output immediately.","Long-run output shifts every time IS or LM shifts.","The price level is never relevant to AD derivation."],a:0,tag:"is_curve",type:"integration",objective:"LO12.1",image:"is_curves.png",primarySkill:"is_curve_goods_market",feedback:"Short-run IS-LM reasoning is not the same as long-run adjustment. Mixing them is a reliable way to eat concrete."},
        {id:309,q:"Elite: Which answer best describes what the graph can and cannot prove for the IS curve?",options:["It can show directional model implications, but the prompt supplies the economic shock.","It proves the real-world shock by itself.","It replaces the need to understand the axes.","It proves all answer choices are equally likely."],a:0,tag:"is_curve",type:"graph",objective:"LO12.1",image:"is_curves.png",primarySkill:"is_curve_goods_market",feedback:"A graph is not a mind reader. The prompt gives the shock; the graph shows the implications."},
        {id:310,q:"Elite: Which answer is the best final check before submitting a the IS curve question?",options:["Does the chosen answer match the curve movement, the mechanism, and both axes?","Does the answer sound familiar?","Did the answer choice mention policy?","Is it the longest option?"],a:0,tag:"is_curve",type:"trap",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"The final check is curve, mechanism, axes. Anything else is vibes. Vibes lose."},
        {id:311,q:"Elite: A student gets the direction of income right in the LM curve but identifies the wrong curve. What is the grading problem?",options:["The conclusion may be lucky, but the mechanism is wrong.","The answer is fully correct because only income matters.","The graph cannot distinguish mechanisms.","The interest rate should be ignored."],a:0,tag:"lm_curve",type:"trap",objective:"LO12.2",primarySkill:"lm_curve_money_market",commonError:"confuses money supply shifts with money demand movements",feedback:"A correct result with the wrong mechanism is still weak reasoning. The Nexus is not handing out participation trophies."},

    legendary: [
        {id:9000,q:"Legendary: A student gets the direction of income right in the IS curve but identifies the wrong curve. What is the grading problem?",options:["The conclusion may be lucky, but the mechanism is wrong.","The answer is fully correct because only income matters.","The graph cannot distinguish mechanisms.","The interest rate should be ignored."],a:0,tag:"is_curve",type:"trap",objective:"LO12.1",primarySkill:"is_curve_goods_market",commonError:"confuses movement along IS with a shift of IS",feedback:"A correct result with the wrong mechanism is still weak reasoning. The Nexus is not handing out participation trophies."},
        {id:9001,q:"Legendary: In the IS curve, what is the safest way to avoid confusing correlation with model logic?",options:["Start with the exogenous change, identify the curve shift, then read the endogenous outcomes.","Start with the final answer and invent a story.","Assume every bad event shifts LM left.","Assume every good event shifts IS right."],a:0,tag:"is_curve",type:"multi-step",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"The exogenous shock comes first. Endogenous outcomes come after the model adjusts."},
        {id:9002,q:"In the IS curve, a shock lowers planned spending by $30 billion and MPC = 0.6. What is the simple Keynesian-cross change in equilibrium income before interest-rate feedback?",options:["-$75 billion","-$30 billion","-$50 billion","-$18 billion"],a:0,tag:"is_curve",type:"calculation",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"The multiplier is 1/(1 - 0.6) = 2.5. Income changes by 2.5 × -$30 billion = -$75 billion.",hint:"Use the spending multiplier first."},
        {id:9003,q:"Legendary: The graph shows the IS curve shifting right, but the answer choices mix up causes and outcomes. Which option is correctly framed?",options:["Cause: an increase in planned spending or fiscal expansion; result: income rises at each interest rate.","Cause: income rises at each interest rate; result: an increase in planned spending or fiscal expansion.","Cause: a fall in autonomous spending or fiscal contraction; result: income rises at each interest rate.","Cause: the new equilibrium; result: the old curve."],a:0,tag:"is_curve",type:"graph",objective:"LO12.1",image:"is_curves.png",primarySkill:"is_curve_goods_market",feedback:"Do not reverse cause and result. That is how decent graphs get butchered."},
        {id:9004,q:"Legendary: The graph shows the IS curve shifting left, but the answer choices mix up causes and outcomes. Which option is correctly framed?",options:["Cause: a fall in autonomous spending or fiscal contraction; result: income falls at each interest rate.","Cause: income falls at each interest rate; result: a fall in autonomous spending or fiscal contraction.","Cause: an increase in planned spending or fiscal expansion; result: income falls at each interest rate.","Cause: the graph image; result: no economic change."],a:0,tag:"is_curve",type:"graph",objective:"LO12.1",image:"is_curves.png",primarySkill:"is_curve_goods_market",feedback:"Cause first, outcome second. Fancy wording does not change the model."},
        {id:9005,q:"Legendary: Which answer best handles a mixed shock involving the IS curve?",options:["Identify each curve shift separately; if effects conflict, say the ambiguous variable is indeterminate.","Average the answer choices.","Assume fiscal policy always dominates monetary policy.","Assume the interest rate can never be indeterminate."],a:0,tag:"is_curve",type:"integration",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"Mixed shocks can give clear movement in one variable and ambiguous movement in another. Do not fake precision."},
        {id:9006,q:"Legendary: What is the strongest explanation of the IS curve for an exam answer?",options:["the IS curve uses planned spending and investment demand to produce negative relationship between the interest rate and income, then the graph maps that mechanism into outcomes.","the IS curve says output changes because output changes.","the IS curve is a memorized slope with no behavioral logic.","the IS curve works only when all variables are constant."],a:0,tag:"is_curve",type:"integration",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"The strongest answer links mechanism to graph to outcome. For this topic, the mechanism is planned spending and investment demand."},
        {id:9007,q:"Legendary: Which close answer is wrong because it treats an endogenous outcome as an exogenous shock in the IS curve?",options:["“Income rises at each interest rate causes an increase in planned spending or fiscal expansion.”","“an increase in planned spending or fiscal expansion causes income rises at each interest rate.”","“The first step is to identify the curve shift.”","“The new intersection reports the outcome.”"],a:0,tag:"is_curve",type:"trap",objective:"LO12.1",primarySkill:"is_curve_goods_market",commonError:"reverses cause and outcome",feedback:"Endogenous outcomes are what the model solves for. They are not the first shock unless the prompt says so."},
        {id:9008,q:"Legendary: Which statement is most precise about short-run versus long-run reasoning in the IS curve?",options:["The short run uses the fixed-price or sticky-price setup; long-run adjustment needs additional price/output-gap logic.","The short run and long run always give the same output immediately.","Long-run output shifts every time IS or LM shifts.","The price level is never relevant to AD derivation."],a:0,tag:"is_curve",type:"integration",objective:"LO12.1",image:"is_curves.png",primarySkill:"is_curve_goods_market",feedback:"Short-run IS-LM reasoning is not the same as long-run adjustment. Mixing them is a reliable way to eat concrete."},
        {id:9009,q:"Legendary: Which answer best describes what the graph can and cannot prove for the IS curve?",options:["It can show directional model implications, but the prompt supplies the economic shock.","It proves the real-world shock by itself.","It replaces the need to understand the axes.","It proves all answer choices are equally likely."],a:0,tag:"is_curve",type:"graph",objective:"LO12.1",image:"is_curves.png",primarySkill:"is_curve_goods_market",feedback:"A graph is not a mind reader. The prompt gives the shock; the graph shows the implications."},
        {id:9010,q:"Legendary: Which answer is the best final check before submitting a the IS curve question?",options:["Does the chosen answer match the curve movement, the mechanism, and both axes?","Does the answer sound familiar?","Did the answer choice mention policy?","Is it the longest option?"],a:0,tag:"is_curve",type:"trap",objective:"LO12.1",primarySkill:"is_curve_goods_market",feedback:"The final check is curve, mechanism, axes. Anything else is vibes. Vibes lose."},

// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    let q = {
        id: question.id,
        q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type,
        objective: question.objective,
        image: question.image,
        primarySkill: question.primarySkill,
        repairSkill: question.repairSkill,
        commonError: question.commonError
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

function getMoneyDemandTargetCalc(){ let intercept = rand(180, 320); let slope = rand(20, 60); let r = rand(2, 6); let P = rand(5, 20); let real = intercept - slope * r; if(real <= 0){ real = 100; intercept = real + slope * r; } let M = real * P; let pack = shuffleCalcOptions(`$${M}`, [`$${real}`, `$${M + slope * P}`, `$${Math.max(P * (real - slope), 0)}`]); return {id:10000,q:`Money demand is L(r) = ${intercept} - ${slope}r and P = ${P}. If the Fed wants r = ${r}, what nominal money supply is needed?`,options:pack.options,a:pack.a,tag:"monetary_policy",type:"calculation",objective:"LO13.3",primarySkill:"monetary_policy_lm_shift",feedback:"Use the target interest rate to find real money demand, then multiply by the price level to get nominal money supply.",hint:"Find M/P first, then multiply by P."}; }

function getISLMSystemCalc(){ let r = rand(2, 6); let Y = rand(800, 1600); let isSlope = rand(20, 80); let lmSlope = rand(50, 120); let isIntercept = Y + isSlope * r; let lmIntercept = Y - lmSlope * r; let pack = shuffleCalcOptions(`Y = ${Y} and r = ${r}`, [`Y = ${Y + 100} and r = ${r}`, `Y = ${Y} and r = ${r + 1}`, `Y = ${Math.max(Y - 100, 0)} and r = ${Math.max(r - 1, 0)}`]); return {id:10004,q:`Suppose the IS curve is Y = ${isIntercept} - ${isSlope}r and the LM curve is Y = ${lmIntercept} + ${lmSlope}r. What are equilibrium income and the interest rate?`,options:pack.options,a:pack.a,tag:"is_lm_equilibrium",type:"calculation",objective:"LO12.3",primarySkill:"is_lm_equilibrium",feedback:"Set the IS equation equal to the LM equation, solve for r, then plug r into either equation to get Y.",hint:"Set IS equal to LM."}; }

// RANDOMIZATION SYSTEM — DO NOT MODIFY CORE LOGIC
// =============================================
// Controls fair, non-repeating selection of:
// - calculation generators
// - question pools
//
// Uses "shuffle + bag" system to ensure:
// - no immediate repeats
// - full coverage before reuse
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding new generators (calculationGenerators)
// - modifying pool content
//
// DO NOT MODIFY:
// - shuffle logic
// - bag system (calcBag, _remaining)
// - pop() usage
//
// Breaking this WILL cause:
// - repeated questions
// - uneven distribution
// - predictable patterns
//
// This ensures randomness WITHOUT repetition.
// =============================================     

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Bag system for calculation generators
// Ensures all generators are used before repeating
let calcBag = [];

// Pulls one calculation generator from the bag
// Refills bag when empty (reshuffled)
function pickCalcGenerator(){
    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }
    return calcBag.pop();
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

function checkRapidGuessing(isCorrect, responseTime){
    rapidGuessHistory.push({
        correct: isCorrect ? 1 : 0,
        responseTime: responseTime
    });

    if(rapidGuessHistory.length > RAPID_GUESS_CONFIG.windowSize){
        rapidGuessHistory.shift();
    }

    if(rapidGuessHistory.length < RAPID_GUESS_CONFIG.minAttempts){
        return {
            triggered: false,
            avgTime: responseTime,
            accuracy: isCorrect ? 1 : 0
        };
    }

    const recent = rapidGuessHistory.slice(-RAPID_GUESS_CONFIG.windowSize);

    const avgTime = recent.reduce((sum, item) => sum + item.responseTime, 0) / recent.length;
    const accuracy = recent.reduce((sum, item) => sum + item.correct, 0) / recent.length;

    return {
        triggered: avgTime < RAPID_GUESS_CONFIG.avgTimeMs && accuracy < RAPID_GUESS_CONFIG.maxAccuracy,
        avgTime,
        accuracy
    };
}

// COMPLETION CODE GENERATOR — DO NOT MODIFY
// =============================================
// This function creates a unique verification code
// based on player performance:
//
// Inputs:
// - name (player)
// - accuracy (% correct)
// - streak (max streak)
// - total (questions answered)
//
// It generates a deterministic hash so that:
// - codes are reproducible
// - codes cannot be easily faked manually
//
// ---------------------------------------------
// DO NOT CHANGE:
// - string structure (name|acc|streak|total|ARCHIVE42)
// - hashing logic
// - return format ("ARCH-...")
//
// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|NEXUS99`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "NEXUS-" + Math.abs(hash).toString(36).toUpperCase();
}
